function driveThumbUrl(fileId, size) {
  if (!fileId) return null;
  return 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=' + (size||'w300');
}

function driveViewUrl(fileId) {
  if (!fileId) return null;
  return 'https://drive.google.com/file/d/' + fileId + '/view';
}

async function asegurarCarpetaEmpleado(emp) {
  // Si ya tiene carpetaExpId, devolverlo
  if (emp.carpetaExpId) return emp.carpetaExpId;
  // Crear carpeta
  const nombre = emp.id + '_' + emp.apellidos.toUpperCase().replace(/\s/g,'_').slice(0,20)
                 + '_' + emp.nombres.toUpperCase().replace(/\s/g,'_').slice(0,15);
  const res = await apiCall({ accion:'crearCarpetaEmpleado', empleadoId: emp.id, nombreCarpeta: nombre });
  if (res.carpetaId) {
    emp.carpetaExpId = res.carpetaId;
    return res.carpetaId;
  }
  throw new Error('No se pudo crear carpeta del empleado: ' + (res.message||''));
}

async function subirArchivoDrive(file, empId, carpetaId, tipoDoc) {
  // file: File object del input
  // Devuelve: { fileId, viewUrl, thumbnailUrl }
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = async function(ev) {
      try {
        const b64 = ev.target.result; // incluye prefijo data:...
        const mime = file.type || 'application/octet-stream';
        const ts   = new Date().toISOString().slice(0,10);
        const nombre = tipoDoc + '_' + ts + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const res = await apiCall({
          accion: 'subirDrive',
          base64: b64,
          mimeType: mime,
          nombre: nombre,
          carpetaId: carpetaId,
          empleadoId: empId,
          tipoDoc: tipoDoc
        });
        if (res.fileId) resolve(res);
        else reject(new Error(res.message || 'Error subiendo a Drive'));
      } catch(e) { reject(e); }
    };
    reader.onerror = function() { reject(new Error('Error leyendo archivo')); };
    reader.readAsDataURL(file);
  });
}

async function subirBase64ADrive(b64, mimeType, nombre, empId, carpetaId, tipoDoc) {
  // Para subir desde base64 ya existente (fotos tomadas con cámara)
  const ts = new Date().toISOString().slice(0,10);
  const nombreFinal = tipoDoc + '_' + ts + '.' + (mimeType.split('/')[1]||'jpg');
  const res = await apiCall({
    accion: 'subirDrive',
    base64: b64,
    mimeType: mimeType,
    nombre: nombreFinal,
    carpetaId: carpetaId,
    empleadoId: empId,
    tipoDoc: tipoDoc
  });
  if (res.fileId) return res;
  throw new Error(res.message || 'Error subiendo a Drive');
}

async function eliminarArchivoDrive(fileId) {
  if (!fileId) return;
  try {
    await apiCall({ accion: 'eliminarDrive', fileId: fileId });
  } catch(e) {
    console.warn('No se pudo eliminar archivo de Drive:', fileId, e.message);
  }
}

// Registrar documento en tabla Sheets (solo metadatos)
async function registrarDocumentoSheets(empleadoId, tipo, fileId, viewUrl, nombre, tamaño) {
  const docReg = {
    id: 'DOC_' + Date.now(),
    empleadoId, tipo, nombre,
    fileId, viewUrl,
    fecha: new Date().toISOString().slice(0,10),
    tamaño: tamaño || ''
  };
  try { await apiCall({ accion:'insertar', tabla:'documentos', valores: docReg }); }
  catch(e) { console.warn('Error registrando doc en Sheets:', e.message); }
}

// Obtener foto de empleado como URL (Drive thumbnail o base64 local)
function getFotoUrl(emp, doc, tipo) {
  // tipo: 'empleado' o 'carnet'
  if (tipo === 'empleado') {
    if (emp.fotoEmpleadoId) return driveThumbUrl(emp.fotoEmpleadoId, 'w300');
    if (doc && doc.fotoEmpleado) return doc.fotoEmpleado; // fallback local
  } else {
    if (emp.fotoCarnetId) return driveThumbUrl(emp.fotoCarnetId, 'w300');
    if (doc && doc.fotoCarnet) return doc.fotoCarnet; // fallback local
  }
  return null;
}

function getCertMedicoStatus(emp){
  const doc=STATE.documentos[emp.id]||{};
  if(!doc.certMedicoFecha)return{status:'sin',label:'Sin certificado',color:'text-muted'};
  const exp=new Date(doc.certMedicoFecha);
  exp.setMonth(exp.getMonth()+6);
  const hoy=new Date();
  const diff=Math.ceil((exp-hoy)/(1000*60*60*24));
  if(diff<0)return{status:'vencido',label:`Vencido hace ${Math.abs(diff)} días`,color:'cert-exp',exp};
  if(diff<=30)return{status:'proximo',label:`Vence en ${diff} días`,color:'cert-warn',exp};
  return{status:'ok',label:`Vigente (vence ${fmtDate(exp.toISOString())})`,color:'cert-ok',exp};
}

function applyFilters(){
  const nom=(document.getElementById('f-nombre')||{}).value||'';
  const dept=(document.getElementById('f-dept')||{}).value||'';
  const est=(document.getElementById('f-estado')||{}).value||'';

  const ant=(document.getElementById('f-ant')||{}).value||'';
  const orden=(document.getElementById('f-orden')||{}).value||'nombre';
  const showSalary=currentRole==='admin'||currentRole==='contabilidad';
  const canEdit=currentRole==='admin'||currentRole==='rrhh';
  let emps=STATE.empleados.filter(e=>{
    if(nom&&!`${e.nombres} ${e.apellidos}`.toLowerCase().includes(nom.toLowerCase()))return false;
    if(dept&&e.departamento!==dept)return false;
    if(est==='Activo'&&!e.activo)return false;
    if(est==='Baja'&&e.activo)return false;

    if(ant){const a=calcAntiguedad(e.fechaAlta);if(ant==='0-4'&&a>=5)return false;if(ant==='5-9'&&(a<5||a>=10))return false;if(ant==='10+'&&a<10)return false}
    return true;
  });
  emps.sort((a,b)=>{
    if(orden==='dept') return (a.departamento||'').localeCompare(b.departamento||'')||`${a.nombres} ${a.apellidos}`.localeCompare(`${b.nombres} ${b.apellidos}`);
    if(orden==='alta_asc') return (a.fechaAlta||'').localeCompare(b.fechaAlta||'');
    if(orden==='alta_desc') return (b.fechaAlta||'').localeCompare(a.fechaAlta||'');
    if(orden==='salario_desc') return (b.salarioBase||0)-(a.salarioBase||0);
    return `${a.nombres} ${a.apellidos}`.localeCompare(`${b.nombres} ${b.apellidos}`);
  });
  const tbody=document.getElementById('emp-tbody');
  const cards=document.getElementById('emp-cards');
  if(!tbody)return;
  if(!emps.length){
    const empty=`<div class="text-center text-muted" style="padding:40px">No hay empleados con esos filtros</div>`;
    tbody.innerHTML=`<tr><td colspan="20">${empty}</td></tr>`;
    if(cards)cards.innerHTML=empty;
    return;
  }
  const rows=emps.map(e=>({e,a:calcAntiguedad(e.fechaAlta)}));
  tbody.innerHTML=rows.map(({e,a})=>`<tr onclick="verFicha('${e.id}')" style="cursor:pointer" onmouseover="this.style.background='#f5f0e8'" onmouseout="this.style.background=''">
    <td><strong>${e.nombres} ${e.apellidos}</strong></td>
    <td class="col-hide-md"><code style="font-size:12px">${e.carnet}</code></td>
    <td class="col-hide-mobile"><span class="chip">${e.departamento||'—'}</span></td>
    <td class="col-hide-md">${e.plaza||'—'}</td>
    <td class="col-hide-md">${a} año${a===1?'':'s'}</td>
    <td><span class="badge ${e.activo?'badge-active':'badge-inactive'}">${e.activo?'Activo':'Baja'}</span></td>
    <td style="white-space:nowrap" onclick="event.stopPropagation()">
      ${canEdit?`<button class="btn btn-primary btn-xs" onclick="editarEmpleado('${e.id}')">✏️</button>`:''}
    </td>
  </tr>`).join('');
  if(cards) cards.innerHTML=rows.map(({e,a})=>`
    <div class="emp-card" onclick="verFicha('${e.id}')" style="cursor:pointer">
      <div class="emp-card-info">
        <div class="emp-card-name">${e.nombres} ${e.apellidos}</div>
        <div class="emp-card-sub">${e.departamento||'—'} · ${e.plaza||'—'}</div>
        <div class="emp-card-foot">
          <span class="badge ${e.activo?'badge-active':'badge-inactive'}" style="font-size:11px">${e.activo?'Activo':'Baja'}</span>
          <span style="font-size:11px;color:var(--text-mid)">${a} año${a===1?'':'s'}</span>
        </div>
      </div>
      <div class="emp-card-actions" onclick="event.stopPropagation()">
        ${canEdit?`<button class="btn btn-primary btn-xs" onclick="editarEmpleado('${e.id}')">✏️</button>`:''}
      </div>
    </div>`).join('');
}

function exportEmpleados(){
  const data=STATE.empleados.map(e=>({Nombre:`${e.nombres} ${e.apellidos}`,Carnet:e.carnet,Departamento:e.departamento,Plaza:e.plaza,'Salario Base':e.salarioBase||0,Jornada:getLabelJornada(e.jornada),Estado:e.activo?'Activo':'Baja','Fecha Alta':fmtDate(e.fechaAlta),'Años':calcAntiguedad(e.fechaAlta)}));
  exportToExcel(data,'Empleados_LaCatedral_'+new Date().toISOString().slice(0,10));
  showToast('Exportado a Excel','success');
}

function verFicha(id, tabInicial){
  const e=STATE.empleados.find(x=>x.id===id);

  const doc=STATE.documentos[id]||{};
  const anos=calcAntiguedad(e.fechaAlta);

  const bon=calcBonificacion(e.salarioBase||0,e.fechaAlta);
  const total=(e.salarioBase||0)+bon;
  const traslados=STATE.traslados.filter(t=>t.empleadoId===id).sort((a,b)=>a.fecha>b.fecha?1:-1);
  const sanciones=(currentRole==='admin'||currentRole==='juridico')?STATE.sanciones.filter(s=>s.empleadoId===id):[];
  const histSal=currentRole==='admin'?STATE.historialSalarial.filter(h=>h.empleadoId===id):[];
  const bajas=STATE.bajas?STATE.bajas.filter(b=>b.empleadoId===id):[];
  const anoActual=new Date().getFullYear();
  const vacTomadas=STATE.incidencias.filter(i=>i.empleadoId===id&&i.tipo==='Vacaciones'&&new Date(i.fechaInicio).getFullYear()===anoActual).reduce((s,i)=>s+parseInt(i.diasAfectados||0),0);
  const vacPend=Math.max(0,STATE.config.diasVacaciones-vacTomadas);
  const canEditData=currentRole==='admin'||currentRole==='rrhh';
  const canEditCuenta=currentRole==='admin'||currentRole==='contabilidad'||currentRole==='rrhh';

  const showEco=currentRole==='admin'||currentRole==='contabilidad';

  const initials=((e.nombres||'?')[0]+(e.apellidos||'?')[0]).toUpperCase();

  </div>`;

  const body=`
    ${heroHtml}
    <div style="padding:20px">
      ${accionesHtml}
      <div class="ficha-pane active" id="fpane-resumen-${id}">${tabResumen}</div>
      <div class="ficha-pane" id="fpane-expediente-${id}">${tabExpediente}</div>
      <div class="ficha-pane" id="fpane-documentos-${id}">${tabDocumentos}</div>

  // Abrir sin header propio (la ficha tiene su propio hero)
  const modalBox=document.getElementById('modal-box');
  const modalHeader=document.querySelector('.modal-header');
  document.getElementById('modal-title').textContent='';
  if(modalHeader) modalHeader.style.display='none';
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-body').style.padding='0';
  const mf=document.getElementById('modal-footer');
  mf.innerHTML=`<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`;
  mf.style.display='flex';
  modalBox.className='modal modal-xl';
  document.getElementById('modal-overlay').classList.add('open');

  // Activar pestaña inicial
  setTimeout(()=>fichaTab(id, tabInicial||'resumen'),50);
}

function fichaTab(id, tab){
  ['resumen','expediente','documentos'].forEach(t=>{
    const pane=document.getElementById('fpane-'+t+'-'+id);
    const tabEl=document.getElementById('ftab-'+t+'-'+id);
    if(pane) pane.classList.toggle('active', t===tab);
    if(tabEl) tabEl.classList.toggle('active', t===tab);
  });
}

function editarCuenta(id){
  const e=STATE.empleados.find(x=>x.id===id);
  openModal('🏦 Editar Cuenta Bancaria',
    `<p style="margin-bottom:12px"><b>${e.nombres} ${e.apellidos}</b></p>
    <div class="form-group">
      <label class="field-label required" data-tip="Exactamente 16 dígitos numéricos">Número de Cuenta (16 dígitos)</label>
      <input type="text" id="cuenta-input" value="${e.cuenta||''}" maxlength="16" placeholder="1234567890123456" oninput="this.value=this.value.split('').filter(c=>c>='0'&&c<='9').join('').slice(0,16)">
      <div class="input-hint" id="cuenta-hint">${e.cuenta?e.cuenta.length+'/16 dígitos':'0/16 dígitos'}</div>
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" onclick="guardarCuenta('${id}')">💾 Guardar</button>`,'sm');
  setTimeout(()=>{
    const inp=document.getElementById('cuenta-input');
    if(inp)inp.addEventListener('input',()=>{document.getElementById('cuenta-hint').textContent=inp.value.length+'/16 dígitos'});
  },100);
}

function guardarCuenta(id){
  const val=document.getElementById('cuenta-input').value;
  if(val.length!==16||!/^\d{16}$/.test(val)){showToast('La cuenta debe tener exactamente 16 dígitos numéricos','error');return}
  const emp=STATE.empleados.find(e=>e.id===id);
  emp.cuenta=val;
  saveState();
  pushToSheets('empleados','actualizar',emp,emp.id);
  addAuditLog('EDICION_CUENTA',`Cuenta bancaria actualizada para ${emp.nombres} ${emp.apellidos} por ${getRoleName(currentRole)}`);
  showToast('Cuenta bancaria actualizada','success');
  closeModal();
}

function exportFichaExcel(id){
  const e=STATE.empleados.find(x=>x.id===id);
  if(!e)return;
  exportToExcel([{Nombre:`${e.nombres} ${e.apellidos}`,Carnet:e.carnet,Teléfono:e.telefono,Correo:e.email||'—','F.Nacimiento':fmtDate(e.fechaNacimiento),Dirección:e.direccion,Banco:e.banco,Cuenta:e.cuenta,'Tipo Contrato':e.tipoContrato,Departamento:e.departamento,Plaza:e.plaza,Clasificación:e.clasificacion,Jornada:getLabelJornada(e.jornada),'Fecha Alta':fmtDate(e.fechaAlta),'Antigüedad':calcAntiguedad(e.fechaAlta)+' años','Salario Base':e.salarioBase,Estado:e.activo?'Activo':'Baja'}],`Ficha_${e.nombres.replace(/ /g,'_')}`);
  showToast('Ficha exportada','success');
}

function previewContrato(id){
  const e=STATE.empleados.find(x=>x.id===id);
  if(!e)return;
  const hoy=new Date();
  const dia=hoy.getDate();
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// Temp store for new licencias being added in form
let tempLicencias = [];
let tempFotoCarnet = null;

// Auto-fill fecha de nacimiento desde carnet (AAMMDD en primeros 6 dígitos)
function autoFillFechaNacimiento(carnet){
  if(!carnet||carnet.length<6)return;
  const aa=parseInt(carnet.substring(0,2),10);
  const mm=carnet.substring(2,4);
  const dd=carnet.substring(4,6);
  if(isNaN(aa)||isNaN(parseInt(mm))||isNaN(parseInt(dd)))return;
  if(parseInt(mm)<1||parseInt(mm)>12)return;
  if(parseInt(dd)<1||parseInt(dd)>31)return;
  // Lógica de siglo: si aa >= 55 → siglo XX (1900s), si aa < 55 → siglo XXI (2000s)
  // Nadie que trabaje tiene más de 70 años → si aa > (año actual - 1900 - 70) usamos 19xx
  const aaActual=new Date().getFullYear()%100;
  let yyyy;
  if(aa>(aaActual+5)){yyyy=1900+aa;}else{yyyy=2000+aa;}
  // Verificar que no resulte en más de 70 años
  const hoy=new Date();
  const fechaNac=new Date(yyyy,parseInt(mm)-1,parseInt(dd));
  const edadCalc=Math.floor((hoy-fechaNac)/31536000000);
  if(edadCalc>70){yyyy=1900+aa;}
  const isoDate=`${yyyy}-${mm}-${dd}`;
  const campo=document.getElementById('a-fechaNacimiento');
  if(campo&&!campo.dataset.manual){campo.value=isoDate;}
}

function previewFotoCarnet(input){
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=function(ev){
    tempFotoCarnet=ev.target.result;
    const prev=document.getElementById('preview-carnet');
    const nameEl=document.getElementById('carnet-scan-name');
    if(prev){prev.src=ev.target.result;prev.style.display='block';}
    if(nameEl)nameEl.textContent='\u2705 '+input.files[0].name;
  };
  reader.readAsDataURL(input.files[0]);
}
function clearFoto(){
  tempFotoCarnet='__clear__';
  const prev=document.getElementById('preview-carnet');
  const nameEl=document.getElementById('carnet-scan-name');
  if(prev){prev.src='';prev.style.display='none';}
  if(nameEl)nameEl.textContent='Sin archivo';
}

function previewLicencias(input){

  files.forEach(file=>{

    reader.onload=e=>{
      const idx=tempLicencias.length;
      tempLicencias.push({nombre:file.name,data:e.target.result});
      const div=document.createElement('div');div.className='img-thumb';div.id='lic-'+idx;
      const isPdf=file.type==='application/pdf';
      div.innerHTML=`${isPdf?`<div style="width:80px;height:80px;background:var(--cream-dark);border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px">📄</div>`:`<img src="${e.target.result}" title="${file.name}">`}<button class="img-remove" onclick="removeTempLic(${idx})">✕</button>`;
      if(container)container.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}

function updatePlazas(){
  const dept=document.getElementById('a-departamento');
  const plaza=document.getElementById('a-plaza');
  if(!dept||!plaza)return;
  const catalogo=getCatalogoPlazas();
  const opciones=[...new Set([
    ...Object.values(catalogo).filter(p=>p.departamento===dept.value).map(p=>p.nombre),
    ...(PLAZAS[dept.value]||[])
  ])].sort();
  plaza.innerHTML=opciones.map(p=>`<option>${p}</option>`).join('');
  autoFillDesdePlaza();
}
function autoFillDesdePlaza(){
  const deptEl=document.getElementById('a-departamento');
  const plazaEl=document.getElementById('a-plaza');
  if(!deptEl||!plazaEl)return;
  const p=getPlaza(deptEl.value,plazaEl.value);
  const hint=document.getElementById('salario-hint');
  if(hint){
    hint.innerHTML=p&&p.salarioBase
      ?`<span style="color:var(--success);font-weight:600;">💰 Salario base de esta plaza: ${fmtMoney(p.salarioBase)}</span>${p.descripcion?`<br><small class="text-muted">${p.descripcion}</small>`:''}`
      :`<span style="color:var(--muted)">💰 Sin salario asignado para esta plaza</span>`;
  }
  if(!p)return;
  // Auto-fill jornada, tipo contrato
  const jorEl=document.getElementById('a-jornada');
  if(jorEl&&p.jornada){for(let o of jorEl.options){if(o.value===p.jornada){o.selected=true;break;}}updateJornadaInfo();}
  const contEl=document.getElementById('a-contrato');
  if(contEl&&p.tipoContrato){for(let o of contEl.options){if(o.value===p.tipoContrato||o.text===p.tipoContrato){o.selected=true;break;}}}
}

function updateJornadaInfo(){
  const sel = document.getElementById('a-jornada');
  const hint = document.getElementById('jornada-hint');
  if(!sel||!hint) return;
  const j = getJornada(sel.value);
  hint.innerHTML = '<span style="color:var(--burgundy);font-weight:600;">' + j.horas + ' horas diarias × ' + j.dias + ' días/mes</span> — ' + j.textoContrato.slice(0,60) + '...';
}

async function guardarAlta(){
  const nombres=document.getElementById('a-nombres').value.trim();
  const apellidos=document.getElementById('a-apellidos').value.trim();
  const carnet=document.getElementById('a-carnet').value.trim();
  const fechaAlta=document.getElementById('a-fechaAlta').value;
  if(!nombres||!apellidos||!carnet||!fechaAlta){showToast('Complete los campos obligatorios','warning');return}
  if(!/^\d{11}$/.test(carnet)){showToast('El carnet debe tener exactamente 11 dígitos','error');return}
  if(STATE.empleados.find(e=>e.carnet===carnet)){showToast('Ya existe un empleado con ese carnet','error');return}
  function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}

  // Validar edad mínima 18 años
  const fechaNacVal=document.getElementById('a-fechaNacimiento').value;
  if(fechaNacVal){
    const hoy=new Date();
    const nac=new Date(fechaNacVal);
    const edad=Math.floor((hoy-nac)/31536000000);
    if(edad<18){showToast('El trabajador debe tener al menos 18 años','error');return}
    if(edad>70){showToast('Verifique la fecha de nacimiento (más de 70 años)','warning');}
  }

  const id='E'+uid();
  const emp={
    id,fechaAlta,nombres,apellidos,carnet,
    telefono:val('a-telefono'),
    fechaNacimiento:val('a-fechaNacimiento'),
    direccion:val('a-direccion'),
    provincia:val('a-provincia'),
    municipio:val('a-municipio'),
    tipoContrato:val('a-contrato'),
    jornada:val('a-jornada')||'8x24',
    departamento:val('a-departamento'),
    plaza:val('a-plaza'),
    salarioBase:(()=>{const pz=getPlaza(val('a-departamento'),val('a-plaza'));return pz&&pz.salarioBase?pz.salarioBase:null;})(),activo:true,
    fotoCarnetId:'',carpetaExpId:'',contratoId:'',obligacionesId:''
  };

  STATE.empleados.push(emp);
  const docData={};
  STATE.documentos[id]=docData;
  saveState();

  showSyncIndicator('⏳ Guardando...','syncing');

  // 1. Supabase primero (primario)
  try {
    await sbUpsert('empleados', emp);
    DB_ONLINE=true; updateSyncBadge(true);
    showSyncIndicator('✅ Guardado','ok');
  } catch(e){
    console.error('Error Supabase alta:',e);
    DB_PENDING_OPS.push({tabla:'empleados',accion:'insertar',valores:emp,id:emp.id});
    DB_ONLINE=false; updateSyncBadge(false);
    showSyncIndicator('⚠️ Guardado local — se reintentará al sincronizar','offline');
  }

  // 2. Drive y Sheets en segundo plano (no bloquean)
  (async()=>{
    try{
      // Carpeta del empleado en Drive
      try{
        const carpetaId=await asegurarCarpetaEmpleado(emp);
        emp.carpetaExpId=carpetaId;
      }catch(e){console.warn('Carpeta Drive no creada:',e.message);}

      // Subir escaneo carnet si existe
      const docData=STATE.documentos[id]||{};
      if(tempFotoCarnet&&tempFotoCarnet!=='__clear__'){
        try{
          const carnetMime=tempFotoCarnet.match(/^data:([^;]+);/)?.[1]||'image/jpeg';
          const res=await subirBase64ADrive(tempFotoCarnet,carnetMime,'foto_carnet',id,emp.carpetaExpId||'','foto_carnet');
          emp.fotoCarnetId=res.fileId;
          docData.fotoCarnetThumb=res.thumbnailUrl;
          await registrarDocumentoSheets(id,'foto_carnet',res.fileId,res.viewUrl,res.nombre,res.tamaño);
        }catch(e){console.warn('Error escaneo carnet:',e.message);}
      }
      tempFotoCarnet=null;
      tempLicencias=[];

      // Backup a Sheets
      await apiCall({accion:'insertar',tabla:'empleados',valores:emp}).catch(e=>console.warn('Sheets backup:',e.message));
      await apiCall({accion:'actualizar',tabla:'empleados',id:emp.id,valores:emp}).catch(e=>console.warn('Sheets update:',e.message));

      // Actualizar Supabase con IDs de Drive si se obtuvieron
      if(emp.carpetaExpId||emp.fotoCarnetId) await sbUpsert('empleados',emp).catch(()=>{});

      STATE.documentos[id]=docData;
      saveState();
    }catch(e){console.warn('Background alta:',e);}
  })();

  addAuditLog('ALTA','Alta empleado: '+nombres+' '+apellidos+' ('+carnet+') — '+emp.departamento+'/'+emp.plaza);

  // Notificar a Jurídico que hay un nuevo empleado sin contrato
  if(!STATE.alertasJuridico) STATE.alertasJuridico=[];
  STATE.alertasJuridico.push({
    id:'AJ'+uid(),
    tipo:'NUEVO_EMPLEADO',
    empleadoId:id,
    empleadoNombre:nombres+' '+apellidos,
    fecha:new Date().toISOString().slice(0,10),
    mensaje:emp.departamento+' / '+emp.plaza+' — '+emp.tipoContrato+'. Pendiente de generar y firmar contrato.',
    leida:false
  });
  saveState();
  updateAlertaBadgeJur();

  showToast('Empleado registrado. Jurídico notificado para generar contrato.','success',5000);
  navigateTo('empleados');
}

async function guardarEdicionEmpleado(id){
  const emp=STATE.empleados.find(e=>e.id===id);
  if(!emp)return;
  const isRrhh=currentRole==='rrhh';

  function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}

  // Carnet validation only when admin (RRHH field is readonly)
  if(!isRrhh){
    const carnet=document.getElementById('a-carnet').value.trim();
    if(!/^\d{11}$/.test(carnet)){showToast('El carnet debe tener exactamente 11 dígitos','error');return}
    const existing=STATE.empleados.find(e=>e.carnet===carnet&&e.id!==id);
    if(existing){showToast('Ya existe otro empleado con ese carnet','error');return}
  }


  const canEditCuenta=currentRole==='admin'||currentRole==='contabilidad'||currentRole==='rrhh';
  const plazaAnterior=emp.plaza;
  Object.assign(emp,{
    fechaAlta:isRrhh?emp.fechaAlta:(val('a-fechaAlta')||emp.fechaAlta),
    nombres:isRrhh?emp.nombres:(val('a-nombres')||emp.nombres),
    apellidos:isRrhh?emp.apellidos:(val('a-apellidos')||emp.apellidos),
    carnet:isRrhh?emp.carnet:(document.getElementById('a-carnet').value.trim()||emp.carnet),
    telefono:val('a-telefono')||emp.telefono,
    provincia:val('a-provincia')||emp.provincia,
    municipio:val('a-municipio')||emp.municipio,
    fechaNacimiento:isRrhh?emp.fechaNacimiento:(val('a-fechaNacimiento')||emp.fechaNacimiento),
    direccion:val('a-direccion')||emp.direccion,
    cuenta:canEditCuenta?(val('a-cuenta')||emp.cuenta):emp.cuenta,
    tipoContrato:val('a-contrato')||emp.tipoContrato,
    jornada:val('a-jornada')||emp.jornada,
    departamento:val('a-departamento')||emp.departamento,
    plaza:val('a-plaza')||emp.plaza
  });
  // Auto-update salary when plaza changes
  if(emp.plaza!==plazaAnterior){
    const pz=getPlaza(emp.departamento,emp.plaza);
    if(pz&&pz.salarioBase){
      const regSal={id:'HS'+uid(),empleadoId:emp.id,fecha:new Date().toISOString(),anterior:emp.salarioBase,nuevo:pz.salarioBase,motivo:'Cambio de plaza: '+emp.plaza};
      STATE.historialSalarial.push(regSal);
      emp.salarioBase=pz.salarioBase;
      pushToSheets('historialSalarial','insertar',regSal);
    }
  }

  const docData=STATE.documentos[id]||{};
  saveState();
  showSyncIndicator('⏳ Guardando...','syncing');

  // Supabase primero (primario)
  try {
    await sbUpsert('empleados', emp);
    DB_ONLINE=true; updateSyncBadge(true);
    showSyncIndicator('✅ Guardado','ok');
  } catch(e){
    console.error('Error Supabase edición:',e);
    DB_PENDING_OPS.push({tabla:'empleados',accion:'actualizar',valores:emp,id:emp.id});
    saveState();
    DB_ONLINE=false; updateSyncBadge(false);
    showSyncIndicator('⚠️ Guardado local — se reintentará al sincronizar','offline');
  }

  // Drive y Sheets en segundo plano
  (async()=>{
    try{
      if(!emp.carpetaExpId){
        try{ await asegurarCarpetaEmpleado(emp); }
        catch(e){ console.warn('Carpeta no creada:',e.message); }
      }
      if(tempFotoCarnet&&tempFotoCarnet!=='__clear__'){
        try{
          if(emp.fotoCarnetId) await eliminarArchivoDrive(emp.fotoCarnetId);
          const carnetMime=tempFotoCarnet.match(/^data:([^;]+);/)?.[1]||'image/jpeg';
          const res=await subirBase64ADrive(tempFotoCarnet,carnetMime,'foto_carnet',id,emp.carpetaExpId||'','foto_carnet');
          emp.fotoCarnetId=res.fileId;
          docData.fotoCarnetThumb=res.thumbnailUrl;
          await registrarDocumentoSheets(id,'foto_carnet',res.fileId,res.viewUrl,res.nombre,res.tamaño);
        }catch(e){console.warn('Error escaneo carnet:',e.message);}
      } else if(tempFotoCarnet==='__clear__'){
        if(emp.fotoCarnetId) await eliminarArchivoDrive(emp.fotoCarnetId);
        emp.fotoCarnetId=''; delete docData.fotoCarnetThumb;
      }
      tempFotoCarnet=null;
      if(tempLicencias.length){
        for(const lic of tempLicencias){
          try{
            const blob=dataURLtoFile(lic.data,lic.nombre);
            const res=await subirArchivoDrive(blob,id,emp.carpetaExpId||'','licencia');
            await registrarDocumentoSheets(id,'licencia',res.fileId,res.viewUrl,lic.nombre,res.tamaño);
          }catch(e){console.warn('Error licencia:',e.message);}
        }
        tempLicencias=[];
      }
      await apiCall({accion:'actualizar',tabla:'empleados',id:emp.id,valores:emp}).catch(e=>console.warn('Sheets backup edición:',e.message));
      if(emp.carpetaExpId||emp.fotoCarnetId) await sbUpsert('empleados',emp).catch(()=>{});
      STATE.documentos[id]=docData;
      saveState();
    }catch(e){console.warn('Background edición:',e);}
  })();

  addAuditLog('EDICION','Edición empleado: '+emp.nombres+' '+emp.apellidos+' por '+getRoleName(currentRole));
  showToast('Empleado actualizado ✅','success');
  navigateTo('empleados');
}

// Helper: data URL a File object
function dataURLtoFile(dataurl, filename) {
  const arr = dataurl.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--){ u8arr[n]=bstr.charCodeAt(n); }
  return new File([u8arr], filename, {type:mime});
}

function renderExpedientesRows(lista){
  if(!lista.length)return`<tr><td colspan="7" class="text-center text-muted" style="padding:40px">Sin expedientes</td></tr>`;
  return lista.map(e=>`<tr onclick="verExpediente('${e.id}')" style="cursor:pointer"
    onmouseover="this.style.background='#f5f0e8'" onmouseout="this.style.background=''">
    <td><code style="font-size:13px;font-weight:700;color:var(--burgundy)">${e.carnet}</code></td>
    <td><b>${e.nombres} ${e.apellidos}</b></td>
    <td>${e.departamento||'—'}</td><td>${e.plaza||'—'}</td>
    <td>${fmtDate(e.fechaAlta)}</td>
    <td><span class="badge ${e.activo?'badge-active':'badge-inactive'}">${e.activo?'Activo':'Baja'}</span></td>
    <td onclick="event.stopPropagation()"><button class="btn btn-primary btn-xs" onclick="verExpediente('${e.id}')">📁 Abrir</button></td>
  </tr>`).join('');
}

function filtrarExpedientes(){
  const q=(document.getElementById('exp-q')||{}).value||'';
  const est=(document.getElementById('exp-estado')||{}).value||'';
  const lista=STATE.empleados.filter(e=>{
    const match=`${e.nombres} ${e.apellidos} ${e.carnet}`.toLowerCase().includes(q.toLowerCase());
    if(!match)return false;
    if(est==='Activo'&&!e.activo)return false;
    if(est==='Baja'&&e.activo)return false;
    return true;
  });
  const tbody=document.getElementById('exp-tbody');
  if(tbody)tbody.innerHTML=renderExpedientesRows(lista);
}

function updateTraslPlazas(){
  const dept=document.getElementById('tr-dept');const plaza=document.getElementById('tr-plaza');
  if(!dept||!plaza)return;
  const catalogo=getCatalogoPlazas();
  const opciones=[...new Set([
    ...Object.values(catalogo).filter(p=>p.departamento===dept.value).map(p=>p.nombre),
    ...(PLAZAS[dept.value]||[])
  ])].sort();
  plaza.innerHTML=opciones.map(p=>`<option>${p}</option>`).join('');
}

function guardarTraslado(){
  const empId=document.getElementById('tr-emp').value;
  const fecha=document.getElementById('tr-fecha').value;
  const motivo=document.getElementById('tr-motivo').value.trim();
  const deptNuevo=document.getElementById('tr-dept').value;
  const plazaNueva=document.getElementById('tr-plaza').value;
  const jornadaNueva=document.getElementById('tr-jornada').value;
  if(!empId||!fecha||!motivo){showToast('Complete los campos requeridos','warning');return;}
  const emp=STATE.empleados.find(function(e){return e.id===empId;});
  if(!emp)return;
  const jornadaAnterior=emp.jornada;
  const cambioJornada=jornadaNueva&&jornadaNueva!==jornadaAnterior;
  const traslado={
    id:'T'+uid(),empleadoId:empId,fecha,motivo,
    deptAnterior:emp.departamento,plazaAnterior:emp.plaza,
    deptNuevo,plazaNueva,
    jornadaAnterior:jornadaAnterior,
    jornadaNueva:jornadaNueva||jornadaAnterior,
    cambioJornada:cambioJornada
  };
  STATE.traslados.push(traslado);
  emp.departamento=deptNuevo;
  emp.plaza=plazaNueva;
  if(cambioJornada)emp.jornada=jornadaNueva;
  // Auto-update salary from new plaza
  const pzTraslado=getPlaza(deptNuevo,plazaNueva);
  if(pzTraslado&&pzTraslado.salarioBase&&pzTraslado.salarioBase!==emp.salarioBase){
    const regSalT={id:'HS'+uid(),empleadoId:empId,fecha:fecha,anterior:emp.salarioBase,nuevo:pzTraslado.salarioBase,motivo:'Traslado a plaza: '+plazaNueva};
    STATE.historialSalarial.push(regSalT);
    emp.salarioBase=pzTraslado.salarioBase;
    pushToSheets('historialSalarial','insertar',regSalT);
  }

  // Crear alerta para Jurídico si cambia departamento, plaza o jornada
  const requiereNuevoContrato = deptNuevo !== traslado.deptAnterior || plazaNueva !== traslado.plazaAnterior || cambioJornada;
  if(requiereNuevoContrato){
    if(!STATE.alertasJuridico)STATE.alertasJuridico=[];
    STATE.alertasJuridico.push({
      id:'AJ'+uid(),
      tipo:'TRASLADO',
      empleadoId:empId,
      empleadoNombre:emp.nombres+' '+emp.apellidos,
      fecha:fecha,
      mensaje:(traslado.deptAnterior!==deptNuevo?'Dept: '+traslado.deptAnterior+' → '+deptNuevo+' | ':'')
        +'Plaza: '+traslado.plazaAnterior+' → '+plazaNueva
        +(cambioJornada?' | Jornada: '+getLabelJornada(jornadaAnterior)+' → '+getLabelJornada(jornadaNueva):'')
        +'. Requiere nuevo contrato.',
      leida:false,
      traslado:traslado.id
    });
    updateAlertaBadgeJur();
  }

  saveState();
  pushToSheets('traslados','insertar', traslado);
  pushToSheets('empleados','actualizar', emp, emp.id);
  addAuditLog('TRASLADO','Traslado '+emp.nombres+' '+emp.apellidos+': '+traslado.deptAnterior+'→'+deptNuevo+'/'+plazaNueva+(cambioJornada?' | Cambio jornada:'+getLabelJornada(jornadaNueva):''));

  let msg='Traslado registrado ✅';
  if(cambioJornada) msg+=' — RRHH debe actualizar salario. Jurídico notificado.';
  if(deptNuevo!==traslado.deptAnterior||plazaNueva!==traslado.plazaAnterior||cambioJornada) {
    msg+=' ⚠️ Recuerde: debe firmarse un nuevo contrato de trabajo.';
  }
  showToast(msg,'success',6000);
  closeModal();
  renderTraslados(document.getElementById('app-content'));
}

function confirmarBaja(){
  const empId=document.getElementById('baja-emp').value;
  if(!empId){showToast('Seleccione un empleado','warning');return}
  const emp=STATE.empleados.find(e=>e.id===empId);
  confirmAction(`¿Confirma dar de baja a <b>${emp.nombres} ${emp.apellidos}</b>?`,async function(){
    const fecha=document.getElementById('baja-fecha').value;
    const motivo=document.getElementById('baja-motivo-tipo').value+' — '+(document.getElementById('baja-detalle').value||'');
    const baja={id:'B'+uid(),empleadoId:empId,fecha,motivo,registradoPor:getRoleName(currentRole)};
    STATE.bajas.push(baja);emp.activo=false;emp.fechaBaja=fecha;
    pushToSheets('bajas','insertar', baja);
    pushToSheets('empleados','actualizar', emp, emp.id);
    const pdfInput=document.getElementById('baja-pdf');
    if(pdfInput&&pdfInput.files[0]){try{const b64=await fileToBase64(pdfInput.files[0]);if(!STATE.documentos[empId])STATE.documentos[empId]={};STATE.documentos[empId].bajaPDF=b64}catch(e){}}
    saveState();addAuditLog('BAJA',`Baja: ${emp.nombres} ${emp.apellidos} — ${motivo}`);
    showToast('Empleado dado de baja','warning',4000);
    renderBajas(document.getElementById('app-content'));
  });
}

function restaurarEmpleado(empId){
  const emp=STATE.empleados.find(e=>e.id===empId);if(!emp)return;
  confirmAction(`¿Restaurar a <b>${emp.nombres} ${emp.apellidos}</b> como empleado activo?`,function(){
    emp.activo=true;emp.fechaBaja=null;
    const idx=STATE.bajas.findIndex(b=>b.empleadoId===empId);
    const bajaId=idx>-1?STATE.bajas[idx].id:null;
    if(idx>-1)STATE.bajas.splice(idx,1);
    saveState();
    pushToSheets('empleados','actualizar', emp, emp.id);
    if(bajaId) pushToSheets('bajas','eliminar', null, bajaId);
    addAuditLog('RESTAURACION',`Empleado restaurado: ${emp.nombres} ${emp.apellidos}`);
    showToast('Empleado restaurado','success');navigateTo('bajas');
  });
}

function exportBajas(){
  const data=STATE.bajas.map(b=>{const e=STATE.empleados.find(x=>x.id===b.empleadoId);return{Nombre:e?`${e.nombres} ${e.apellidos}`:'—',Carnet:(e?e.carnet:'—'),'Fecha Baja':fmtDate(b.fecha),Motivo:b.motivo,'Registrado por':b.registradoPor}});
  exportToExcel(data,'Bajas_LaCatedral');showToast('Exportado','success');
}

function filtrarPlazas(){

async function guardarPlaza(plazaId){
  const nombre=document.getElementById('mp-nombre').value.trim();
  const dept=document.getElementById('mp-dept').value;
  const jornada=document.getElementById('mp-jornada').value;
  const contrato=document.getElementById('mp-contrato').value;
  if(!nombre||!dept){showToast('Completa departamento y nombre','warning');return;}
  const id=plazaId||(dept+'||'+nombre);
  const existing=(STATE.plazas||{})[id]||{};
  const salario=currentRole==='admin'?(parseFloat(document.getElementById('mp-salario')?.value)||0):(existing.salarioBase||0);
  const plaza={...existing,id,departamento:dept,nombre,salarioBase:salario,jornada,tipoContrato:contrato,descripcion:existing.descripcion||'',
    funcionesPdfId:existing.funcionesPdfId||'',funcionesPdfUrl:existing.funcionesPdfUrl||''};

  // Subir PDF de funciones si se seleccionó
  const pdfInput=document.getElementById('mp-pdf');
  if(pdfInput&&pdfInput.files[0]){
    showSyncIndicator('⏳ Subiendo PDF...','syncing');
    try{
      // Obtener carpeta plazas en Drive
      let carpetaId=STATE.config?.plazasCarpetaId;
      if(!carpetaId){
        let cr;
        try{ cr=await apiCall({accion:'getCarpetaPlazasId'}); }
        catch(e2){ throw new Error('Carpeta Drive: '+e2.message+' — ¿Redesplegaste el Apps Script?'); }
        carpetaId=cr.carpetaId;
        if(!carpetaId) throw new Error('Apps Script no devolvió carpetaId — verifica el despliegue');
        if(!STATE.config)STATE.config={};
        STATE.config.plazasCarpetaId=carpetaId;
      }
      const b64=await fileToBase64(pdfInput.files[0]);
      const nombreArchivo=`${dept}_${nombre}_funciones.pdf`.replace(/[^a-zA-Z0-9_.-]/g,'_');
      if(plaza.funcionesPdfId){
        apiCall({accion:'eliminarDrive',fileId:plaza.funcionesPdfId}).catch(()=>{});
      }
      let res;
      try{ res=await apiCall({accion:'subirDrive',base64:b64,mimeType:'application/pdf',nombre:nombreArchivo,carpetaId}); }
      catch(e2){ throw new Error('Subida Drive: '+e2.message); }
      plaza.funcionesPdfId=res.fileId;
      plaza.funcionesPdfUrl=res.viewUrl;
      showSyncIndicator('✅ PDF subido','ok');
    }catch(e){
      showToast('❌ '+e.message,'error',8000);
      showSyncIndicator('⚠️ Error PDF','offline');
      console.error('guardarPlaza PDF error:',e);
    }
  }

  if(!STATE.plazas)STATE.plazas={};
  STATE.plazas[id]=plaza;
  saveState();
  let actualizados=0;
  if(currentRole==='admin'&&salario>0)actualizados=aplicarSalarioPlazaATodos(dept,nombre,salario);
  if(!PLAZAS[dept])PLAZAS[dept]=[];
  if(!PLAZAS[dept].includes(nombre))PLAZAS[dept].push(nombre);
  pushToSheets('plazas','actualizar',plaza,id);
  closeModal();
  addAuditLog('PLAZA',`Plaza "${nombre}" (${dept}) guardada por ${getRoleName(currentRole)}${currentRole==='admin'?'. Salario: '+fmtMoney(salario):''}${plaza.funcionesPdfId?'. PDF funciones adjunto':''}`);
  showToast(`Plaza guardada${actualizados>0?'. '+actualizados+' empleados actualizados':''} ✅`,'success');
  renderGestionPlazas(document.getElementById('app-content'));
}

function eliminarPlaza(plazaId){
  const p=(STATE.plazas||{})[plazaId];
  if(!p){showToast('Plaza no encontrada','error');return;}
  const afectados=STATE.empleados.filter(e=>e.activo&&e.departamento===p.departamento&&e.plaza===p.nombre);
  const aviso=afectados.length
    ?`<div style="margin-top:10px;padding:10px;background:#fff3cd;border-radius:8px;border-left:4px solid var(--gold)">⚠️ <b>${afectados.length} empleado${afectados.length>1?'s':''} activo${afectados.length>1?'s':''}</b> tiene${afectados.length>1?'n':''} esta plaza asignada.<br><small>Su campo plaza quedará vacío — deberás reasignarlos manualmente.</small></div>`:'';
  confirmAction(`¿Eliminar la plaza <b>"${p.nombre}"</b> del departamento <b>${p.departamento}</b>?${aviso}`, function(){
    // Limpiar plaza en empleados afectados
    afectados.forEach(emp=>{
      emp.plaza='';
      pushToSheets('empleados','actualizar',emp,emp.id);
    });
    // Eliminar del catálogo dinámico
    if(PLAZAS[p.departamento]){
      const idx=PLAZAS[p.departamento].indexOf(p.nombre);
      if(idx>-1)PLAZAS[p.departamento].splice(idx,1);
    }
    delete STATE.plazas[plazaId];
    saveState();
    pushToSheets('plazas','eliminar',null,plazaId);
    addAuditLog('ELIMINAR_PLAZA',`Plaza "${p.nombre}" (${p.departamento}) eliminada por ${getRoleName(currentRole)}. Afectados: ${afectados.length} emp.`);
    showToast(`Plaza eliminada${afectados.length?`. ${afectados.length} empleado${afectados.length>1?'s':''} sin plaza asignada`:''}`, afectados.length?'warning':'success');
    renderGestionPlazas(document.getElementById('app-content'));
  });
}

async function guardarContrato(empId){
  const pdfInput=document.getElementById('contr-pdf');
  if(!pdfInput.files[0]){showToast('Seleccione un archivo PDF','warning');return}
  try{
    const b64=await fileToBase64(pdfInput.files[0]);
    if(!STATE.documentos[empId])STATE.documentos[empId]={};
    // Intentar subir a Drive si el empleado tiene carpeta
    const _emp=STATE.empleados.find(x=>x.id===empId);
    if(_emp&&_emp.carpetaExpId){
      try{
        const _res=await subirBase64ADrive(b64,'application/pdf','contrato',empId,_emp.carpetaExpId,'contrato');
        _emp.contratoId=_res.fileId;
        STATE.documentos[empId].contratoUrl=_res.viewUrl;
        await registrarDocumentoSheets(empId,'contrato',_res.fileId,_res.viewUrl,'contrato.pdf',_res.tamaño);
        await apiCall({accion:'actualizar',tabla:'empleados',id:empId,valores:{contratoId:_res.fileId}});
      }catch(_e){
        STATE.documentos[empId].contrato=b64; // fallback local
        console.warn('Drive upload failed, using local:',_e.message);
      }
    } else {
      STATE.documentos[empId].contrato=b64; // fallback local
    }
    saveState();
    const emp=STATE.empleados.find(e=>e.id===empId);
    addAuditLog('CONTRATO',`Contrato adjuntado para ${emp.nombres} ${emp.apellidos}`);
    showToast('Contrato adjuntado','success');closeModal();renderContratos(document.getElementById('app-content'));
  }catch(e){showToast('Error al procesar el PDF','error')}
}

  if(tab==='historico')renderHistoricoNominas();
  if(tab==='asistencia')renderRevisionAsistencia();
}

    <td><b>${n.mesNombre} ${n.ano}</b></td>
    <td><span class="badge badge-${n.estado==='aprobada'?'approved':n.estado==='pendiente'?'pending':'draft'}">${n.estado}</span></td>

      <button class="btn btn-secondary btn-xs" onclick="verDetalleNomina('${n.id}')">👁️ Ver</button>

      ${currentRole==='admin'&&n.estado==='aprobada'?`<button class="btn btn-warning btn-xs" onclick="reabrirNomina('${n.id}')">🔓</button>`:''}

function cargarNomina(){
  const mes=parseInt(document.getElementById('nom-mes').value);
  const ano=parseInt(document.getElementById('nom-ano').value);
  const mesNombre=new Date(ano,mes-1).toLocaleString('es-ES',{month:'long'});
  const periodoKey=`${ano}-${String(mes).padStart(2,'0')}`;
  let nomina=STATE.nominas.find(n=>n.periodo===periodoKey);
  const canEdit=currentRole==='rrhh'||currentRole==='admin';
  const isReadOnly=(nomina&&nomina.estado==='aprobada'&&currentRole!=='admin')||(nomina&&nomina.estado==='pendiente'&&currentRole==='rrhh');
  // RRHH no puede editar ni enviar a aprobación mientras el mes esté en curso
  const hoy=new Date();
  const periodoActual=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
  const bloqueadoRRHH=currentRole==='rrhh'&&nomina&&nomina.periodo===periodoActual;
  const activos=getEmpleadosActivos();

  // Verificar si hay asistencia registrada en el período
  const hayAsistencia=STATE.asistencia.some(a=>a.cerrado&&a.fecha.startsWith(periodoKey));

  // Días trabajados: para admin → jornada completa; para otros → presentes reales si hay asistencia, sino jornada como fallback global
  const getDiasTrab=(e)=>{
    if(esDeptoAdmin(e.departamento)) return getDiasJornada(e.jornada);
    if(hayAsistencia) return getDiasPresentesMes(e.id,periodoKey);
    return getDiasJornada(e.jornada); // fallback solo si no existe ningún registro del mes
  };

  if(!nomina){
    nomina={id:'N'+uid(),periodo:periodoKey,mes,ano,mesNombre,estado:'borrador',lineas:[],totalDevengado:0,totalNeto:0};
    activos.forEach(e=>nomina.lineas.push({empleadoId:e.id,nominaId:nomina.id,diasTrabajados:getDiasTrab(e),horasExtras:0,fuenteDias:esDeptoAdmin(e.departamento)?'auto':'asistencia'}));
    STATE.nominas.push(nomina);saveState();
    const {lineas:_l,...nominaHeader}=nomina;
    pushToSheets('nominas','insertar',nominaHeader,null);
    nomina.lineas.forEach(l=>pushToSheets('nominaLineas','insertar',l,null));
  } else {
    const seen=new Set();
    // Eliminar duplicados y empleados dados de baja (solo en nóminas no aprobadas)
    const activosIds=new Set(activos.map(e=>e.id));
    nomina.lineas=nomina.lineas.filter(l=>{
      if(seen.has(l.empleadoId))return false;
      if(nomina.estado!=='aprobada'&&!activosIds.has(l.empleadoId))return false;
      seen.add(l.empleadoId);return true;
    });
    const newlyAdded=[];
    activos.forEach(e=>{
      if(!nomina.lineas.find(l=>l.empleadoId===e.id)){
        const nl={empleadoId:e.id,nominaId:nomina.id,diasTrabajados:getDiasTrab(e),horasExtras:0,fuenteDias:esDeptoAdmin(e.departamento)?'auto':'asistencia'};
        nomina.lineas.push(nl);newlyAdded.push(nl);
      }
    });
    saveState();
    if(newlyAdded.length) newlyAdded.forEach(l=>pushToSheets('nominaLineas','insertar',l,null));
  }

  // Solo recalcular días automáticamente si está en borrador (pendiente y aprobada se congelan)
  if(nomina.estado==='borrador'){
    nomina.lineas.forEach(l=>{
      const e=STATE.empleados.find(x=>x.id===l.empleadoId);
      if(e) l.diasTrabajados=getDiasTrab(e);
    });
    saveState();
  }

  const advertencia=!hayAsistencia&&!isReadOnly
    ?`<div style="background:#FFF3CD;border:1px solid #FBBF24;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#92400E;">
      ⚠️ No hay registros de asistencia cerrados para este período. Los días mostrados son los de jornada base. Registra la asistencia diaria antes de generar la nómina.
      </div>`:'';
  const avisoBloqueado=bloqueadoRRHH
    ?`<div style="background:#EFF6FF;border:1px solid #3B82F6;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#1D4ED8;display:flex;align-items:center;gap:8px">
      🔒 <span><b>Mes en curso.</b> Podrás enviar a aprobación a partir del 1 de ${new Date(hoy.getFullYear(),hoy.getMonth()+1,1).toLocaleDateString('es-ES',{month:'long'})}. Puedes recalcular para ver el estado actual.</span>
      </div>`:'';

  let html=`<div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h3>Pre-Nómina: ${mesNombre} ${ano}</h3>
      ${nomina.aprobadaFecha?`<div style="font-size:11px;color:#2D6A4F;background:#DCFCE7;border-radius:6px;padding:4px 10px">✅ Aprobada el ${new Date(nomina.aprobadaFecha).toLocaleDateString('es-ES')} a las ${new Date(nomina.aprobadaFecha).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})} por ${nomina.aprobadaPor||'Administración'}</div>`:''}
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="badge badge-${nomina.estado==='aprobada'?'approved':nomina.estado==='pendiente'?'pending':'draft'}">${nomina.estado}</span>
        <button class="btn btn-secondary btn-sm" onclick="imprimirNominaCompleta('${nomina.id}')">🖨️ Imprimir</button>
      </div>
    </div>
    ${advertencia}${avisoBloqueado}
    <div class="table-wrap"><table class="nomina-table"><thead><tr>
      <th>Nº</th><th>Nombre y Apellido</th><th>Plaza</th>
      <th data-tip="Días trabajados este mes según asistencia">Días</th>
      <th data-tip="Salario diario × días trabajados">Sal. Base</th>
      <th data-tip="Días de vacaciones a liquidar este período">Vac.</th>
      <th data-tip="Importe de vacaciones (días × salario diario)">Vac. Acum.</th>
      <th data-tip="Sal. Base + Vac. Acum.">Sal. Bruto</th>
    </tr></thead><tbody>`;

  let totBase=0,totVacAcum=0,totBruto=0;
  const canEditVac=(currentRole==='contabilidad'||currentRole==='admin')&&!isReadOnly&&nomina.estado==='borrador';
  nomina.lineas.forEach((l,idx)=>{
    const e=STATE.empleados.find(x=>x.id===l.empleadoId);if(!e)return;
    const salBase=e.salarioBase||0;
    const jornadaDias=getDiasJornada(e.jornada);
    const salDiario=jornadaDias>0?salBase/jornadaDias:0;
    const base=Math.round(salDiario*l.diasTrabajados*100)/100;
    // Días de vacaciones: primero desde vacPendientes confirmados, luego desde la línea misma
    const vpEntry=(STATE.vacPendientes||[]).find(v=>v.empleadoId===e.id&&v.periodo===nomina.periodo&&v.confirmado);
    const vacDias=l.diasVacaciones!=null?l.diasVacaciones:(vpEntry?vpEntry.diasLiquidar:0);
    if(vpEntry&&l.diasVacaciones==null)l.diasVacaciones=vpEntry.diasLiquidar; // sincronizar
    const vacAcum=Math.round(salDiario*vacDias*100)/100;
    const bruto=Math.round((base+vacAcum)*100)/100;
    l.totalDevengado=bruto;
    totBase+=base;totVacAcum+=vacAcum;totBruto+=bruto;

    const fuenteTag=esDeptoAdmin(e.departamento)
      ?'<span title="Administración - 100% automático" style="font-size:10px;color:#6B7280">⚙️</span>'
      :(getDiasPresentesMes(e.id,periodoKey)>0
        ?'<span title="Desde asistencia" style="font-size:10px;color:#2D9060">📋</span>'
        :'<span title="Jornada base (sin asistencia)" style="font-size:10px;color:#F59E0B">⚠️</span>');

    html+=`<tr onmouseover="this.style.background='#f5f0e8'" onmouseout="this.style.background=''">
      <td style="color:var(--text-mid)">${idx+1}</td>
      <td><b>${e.nombres} ${e.apellidos}</b><br><small style="color:var(--text-mid)">${e.departamento}</small></td>
      <td style="font-size:12px">${e.plaza||'—'}</td>
      <td style="text-align:center">
        ${!isReadOnly&&canEdit&&!bloqueadoRRHH
          ?`<input type="number" id="dt-${e.id}" value="${l.diasTrabajados}" min="0" max="${jornadaDias}" style="width:56px;text-align:center" onchange="updateNominaLine('${nomina.id}','${e.id}')">`
          :`<b>${l.diasTrabajados}</b>`}
        ${fuenteTag}
      </td>
      <td id="base-${e.id}" style="font-weight:600">${fmtMoney(base)}</td>
      <td style="text-align:center">
        ${canEditVac
          ?`<input type="number" id="vac-${e.id}" value="${vacDias}" min="0" max="365" style="width:56px;text-align:center" onchange="updateVacNomina('${nomina.id}','${e.id}')">`
          :`<span style="color:${vacDias>0?'#2D6A4F':'var(--text-light)'};font-weight:${vacDias>0?'700':'400'}">${vacDias>0?vacDias+'d':'—'}</span>`}
      </td>
      <td id="vac-acum-${e.id}" style="color:#1D4ED8;font-weight:${vacAcum>0?'700':'400'}">${vacAcum>0?fmtMoney(vacAcum):'—'}</td>
      <td id="bruto-${e.id}" style="font-weight:700;color:var(--burgundy)">${fmtMoney(bruto)}</td>
    </tr>`;
  });

  nomina.totalDevengado=totBruto;nomina.totalNeto=totBruto;saveState();
  html+=`</tbody>
    <tfoot>
      <tr style="background:#F9F5F0;font-weight:700;border-top:2px solid var(--gold)">
        <td colspan="4" class="text-right" style="font-size:12px">TOTAL SAL. BASE:</td>
        <td id="nom-tot-base" style="color:#374151">${fmtMoney(totBase)}</td>
        <td></td>
        <td id="nom-tot-vac" style="color:#1D4ED8">${totVacAcum>0?fmtMoney(totVacAcum):'—'}</td>
        <td></td>
      </tr>
      <tr style="background:#F0EBE3;font-weight:700;border-top:1px solid var(--gold)">
        <td colspan="4" class="text-right">TOTAL SAL. BRUTO:</td>
        <td colspan="3"></td>
        <td id="nom-tot-bruto" style="color:var(--burgundy);font-size:15px">${fmtMoney(totBruto)}</td>
      </tr>
    </tfoot>
  </table></div>`;

  if(canEdit&&!isReadOnly){
    html+=`<div class="card-footer" style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">
      ${nomina.estado==='borrador'?`
        <button class="btn btn-gold" onclick="calcularNomina('${nomina.id}')">🧮 Recalcular desde Asistencia</button>
        ${!bloqueadoRRHH?`<button class="btn btn-primary" onclick="solicitarAprobacion('${nomina.id}')">📤 Solicitar Aprobación</button>`:''}`:''}
      ${nomina.estado==='pendiente'&&currentRole==='admin'?`<button class="btn btn-success" onclick="aprobarNomina('${nomina.id}')">✅ Aprobar Pre-Nómina</button>`:''}
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('nomina-content').innerHTML=html;
}

function updateNominaLine(nomId,empId){
  const nomina=STATE.nominas.find(n=>n.id===nomId);if(!nomina)return;
  if(nomina.estado==='aprobada'&&currentRole!=='admin'){showToast('La pre-nómina ya fue aprobada','error');return;}
  if(nomina.estado==='pendiente'&&currentRole!=='admin'){showToast('Pre-nómina en revisión — no editable','error');return;}
  const linea=nomina.lineas.find(l=>l.empleadoId===empId);const e=STATE.empleados.find(x=>x.id===empId);if(!linea||!e)return;
  const dtEl=document.getElementById('dt-'+empId);
  if(dtEl)linea.diasTrabajados=parseFloat(dtEl.value)||0;
  const salBase=e.salarioBase||0;const jornadaDias=getDiasJornada(e.jornada);const salDiario=jornadaDias>0?salBase/jornadaDias:0;
  const base=Math.round(salDiario*linea.diasTrabajados*100)/100;
  const vacDias=linea.diasVacaciones||0;
  const vacAcum=Math.round(salDiario*vacDias*100)/100;
  const bruto=Math.round((base+vacAcum)*100)/100;
  linea.totalDevengado=bruto;
  const baseEl=document.getElementById('base-'+empId);if(baseEl)baseEl.innerHTML=fmtMoney(base);
  const vacAcumEl=document.getElementById('vac-acum-'+empId);if(vacAcumEl)vacAcumEl.innerHTML=vacAcum>0?fmtMoney(vacAcum):'—';
  const brutoEl=document.getElementById('bruto-'+empId);if(brutoEl)brutoEl.innerHTML=fmtMoney(bruto);
  const totBase=nomina.lineas.reduce((s,l)=>{const lE=STATE.empleados.find(x=>x.id===l.empleadoId);const jd=lE?getDiasJornada(lE.jornada):0;const sd=jd>0?(lE.salarioBase||0)/jd:0;return s+Math.round(sd*l.diasTrabajados*100)/100;},0);
  const totVac=nomina.lineas.reduce((s,l)=>{const lE=STATE.empleados.find(x=>x.id===l.empleadoId);const jd=lE?getDiasJornada(lE.jornada):0;const sd=jd>0?(lE.salarioBase||0)/jd:0;return s+Math.round(sd*(l.diasVacaciones||0)*100)/100;},0);
  const totBruto=nomina.lineas.reduce((s,l)=>s+(l.totalDevengado||0),0);
  nomina.totalDevengado=totBruto;nomina.totalNeto=totBruto;
  const totBaseEl=document.getElementById('nom-tot-base');if(totBaseEl)totBaseEl.innerHTML=fmtMoney(totBase);
  const totVacEl=document.getElementById('nom-tot-vac');if(totVacEl)totVacEl.innerHTML=totVac>0?fmtMoney(totVac):'—';
  const totEl=document.getElementById('nom-tot-bruto');if(totEl)totEl.innerHTML=fmtMoney(totBruto);
  saveState();
}

async function calcularNomina(nomId){
  const nomina=STATE.nominas.find(n=>n.id===nomId);if(!nomina)return;
  // Sincronizar asistencia desde Supabase antes de calcular para tener datos de todos los dispositivos
  showToast('Sincronizando asistencia...','info',2000);
  try{
    const dataAsist=await sbLeer('asistencia');
    if(Array.isArray(dataAsist)&&dataAsist.length>0){
      // Deduplicar por fecha: si hay varios registros del mismo día, preferir el cerrado
      const byFecha={};
      dataAsist.forEach(r=>{
        r=normalizeAsistencia(r);
        if(!byFecha[r.fecha]||r.cerrado)byFecha[r.fecha]=r;
      });
      STATE.asistencia=Object.values(byFecha);
      saveState();
    }
  }catch(e){showToast('Sin conexión — usando datos locales','warning',3000);}
  // Actualizar días desde asistencia
  nomina.lineas.forEach(l=>{
    const e=STATE.empleados.find(x=>x.id===l.empleadoId);if(!e)return;
    if(!esDeptoAdmin(e.departamento)){
      const presentes=getDiasPresentesMes(e.id,nomina.periodo);
      if(presentes>0)l.diasTrabajados=presentes;
    }
    const dtEl=document.getElementById('dt-'+e.id);if(dtEl)dtEl.value=l.diasTrabajados;
  });
  nomina.lineas.forEach(l=>updateNominaLine(nomId,l.empleadoId));
  saveState();
  const {lineas:_l,...nominaHeader}=nomina;
  pushToSheets('nominas','actualizar',nominaHeader,nomina.id);
  nomina.lineas.forEach(l=>{const lineaData={...l,nominaId:nomina.id};pushToSheets('nominaLineas','actualizar',lineaData,lineaData.id||null);});
  showToast('Pre-Nómina recalculada con asistencia actualizada ✅','success');
}

function solicitarAprobacion(nomId){
  const n=STATE.nominas.find(x=>x.id===nomId);if(!n)return;
  if(n.estado!=='borrador'){showToast('Solo se puede enviar una pre-nómina en estado borrador','error');return;}
  confirmAction('¿Enviar Pre-Nómina a revisión de Administración?',function(){
    n.estado='pendiente';saveState();
    const {lineas:_l,...nominaHeader}=n;pushToSheets('nominas','actualizar',nominaHeader,n.id);
    addAuditLog('PRENOMINA_PENDIENTE',`Pre-Nómina ${n.mesNombre} ${n.ano} enviada a aprobación por RRHH`);
    showToast('Pre-Nómina enviada a Administración','info');cargarNomina();
  });
}

function aprobarNomina(nomId){
  const n=STATE.nominas.find(x=>x.id===nomId);if(!n)return;
  openModal('🔐 Aprobar Pre-Nómina',
    `<p style="margin-bottom:14px;color:#555">Introduce el PIN de Administración para confirmar la aprobación de <b>Pre-Nómina ${n.mesNombre} ${n.ano}</b>.</p>
     <div class="pin-inputs" style="justify-content:center">
       <input class="pin-box" type="password" maxlength="1" id="ap0" inputmode="numeric">
       <input class="pin-box" type="password" maxlength="1" id="ap1" inputmode="numeric">
       <input class="pin-box" type="password" maxlength="1" id="ap2" inputmode="numeric">
       <input class="pin-box" type="password" maxlength="1" id="ap3" inputmode="numeric">
     </div>
     <div id="ap-error" style="color:#C0392B;font-size:12px;text-align:center;margin-top:8px;min-height:16px"></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-success" onclick="confirmarAprobacionNomina('${nomId}')">✅ Confirmar Aprobación</button>`,'sm');
  setTimeout(()=>{
    const boxes=['ap0','ap1','ap2','ap3'];
    boxes.forEach((id,i)=>{
      const el=document.getElementById(id);if(!el)return;
      el.addEventListener('input',()=>{if(el.value&&i<3)document.getElementById(boxes[i+1]).focus();});
    });
    document.getElementById('ap0')&&document.getElementById('ap0').focus();
  },120);
}

function confirmarAprobacionNomina(nomId){
  const pin=['ap0','ap1','ap2','ap3'].map(id=>(document.getElementById(id)||{}).value||'').join('');
  if(pin!==STATE.config.adminPin){
    const err=document.getElementById('ap-error');
    if(err)err.textContent='PIN incorrecto. Inténtalo de nuevo.';
    ['ap0','ap1','ap2','ap3'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('ap0')&&document.getElementById('ap0').focus();
    return;
  }
  const n=STATE.nominas.find(x=>x.id===nomId);if(!n)return;
  const ahora=new Date();
  n.estado='aprobada';
  n.aprobadaFecha=ahora.toISOString();
  n.aprobadaPor='Administración';
  // Registrar días de vacaciones pagados en vacacionesControl
  n.lineas.forEach(l=>{
    if(!l.diasVacaciones||l.diasVacaciones<=0)return;
    const ano=n.ano;
    let ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===l.empleadoId&&v.ano===ano);
    if(!ctrl){ctrl={id:'VC'+uid(),empleadoId:l.empleadoId,ano,diasTomados:0};STATE.vacacionesControl.push(ctrl);}
    ctrl.diasTomados=(ctrl.diasTomados||0)+l.diasVacaciones;
    pushToSheets('vacacionesControl',ctrl.id?'actualizar':'insertar',ctrl,ctrl.id);
  });
  // Marcar las solicitudes de este período como pagadas y limpiar confirmados
  STATE.vacPendientes=(STATE.vacPendientes||[]).map(v=>{
    if(v.periodo===n.periodo&&v.confirmado)return{...v,estado:'pagado',confirmado:false};
    return v;
  }).filter(v=>v.estado!=='pagado'); // limpiar pagados del array activo
  saveVacPendientes();
  saveState();closeModal();
  const {lineas:_l,...nominaHeader}=n;
  pushToSheets('nominas','actualizar',nominaHeader,n.id);
  addAuditLog('PRENOMINA_APROBADA',
    `Pre-Nómina ${n.mesNombre} ${n.ano} APROBADA por Administración — `+
    `${ahora.toLocaleDateString('es-ES')} ${ahora.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})} — `+
    `Devengado: ${fmtMoney(n.totalDevengado)} | Neto: ${fmtMoney(n.totalNeto)}`);
  showToast('Pre-Nómina aprobada ✅','success');
  renderHistoricoNominas();
}

function verDetalleNomina(nomId){
  const n=STATE.nominas.find(x=>x.id===nomId);if(!n)return;
  let totBase=0,totVac=0,totBruto=0;
  const rows=n.lineas.map(l=>{
    const e=STATE.empleados.find(x=>x.id===l.empleadoId);
    const jd=e?getDiasJornada(e.jornada):0;const sd=jd>0?(e.salarioBase||0)/jd:0;
    const base=Math.round(sd*l.diasTrabajados*100)/100;
    const vacDias=l.diasVacaciones||0;const vacAcum=Math.round(sd*vacDias*100)/100;
    const bruto=l.totalDevengado||0;
    totBase+=base;totVac+=vacAcum;totBruto+=bruto;
    return`<tr><td>${e?`${e.nombres} ${e.apellidos}`:'—'}</td><td>${e?e.plaza:'—'}</td><td style="text-align:center">${l.diasTrabajados}</td><td style="text-align:right">${fmtMoney(base)}</td><td style="text-align:center;color:#1D4ED8;font-weight:${vacDias>0?'700':'400'}">${vacDias>0?vacDias+'d':'—'}</td><td style="text-align:right;color:#1D4ED8">${vacAcum>0?fmtMoney(vacAcum):'—'}</td><td style="text-align:right;font-weight:700;color:var(--burgundy)">${fmtMoney(bruto)}</td></tr>`;
  }).join('');
  openModal(`Pre-Nómina: ${n.mesNombre} ${n.ano}`,
    `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">
      <span><b>Estado:</b> <span class="badge badge-${n.estado==='aprobada'?'approved':n.estado==='pendiente'?'pending':'draft'}">${n.estado}</span></span>
      <span><b>Sal. Bruto Total:</b> <span style="color:var(--burgundy);font-weight:700">${fmtMoney(totBruto)}</span></span>
      ${totVac>0?`<span><b>incl. Vac. Acum.:</b> <span style="color:#1D4ED8;font-weight:700">${fmtMoney(totVac)}</span></span>`:''}
    </div>
    <div class="table-wrap"><table><thead><tr><th>Nombre y Apellido</th><th>Plaza</th><th style="text-align:center">Días</th><th style="text-align:right">Sal. Base</th><th style="text-align:center">Vac.</th><th style="text-align:right">Vac. Acum.</th><th style="text-align:right">Sal. Bruto</th></tr></thead><tbody>
    ${rows}
    </tbody></table></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
     <button class="btn btn-secondary btn-sm" onclick="imprimirNominaCompleta('${nomId}')">🖨️ Imprimir</button>
     <button class="btn btn-gold btn-sm" onclick="exportNomina('${nomId}')">⬇️ Excel</button>`,'lg');
}

function exportNomina(nomId){
  const n=STATE.nominas.find(x=>x.id===nomId);if(!n)return;
  exportToExcel(n.lineas.map(l=>{
    const e=STATE.empleados.find(x=>x.id===l.empleadoId);
    const jd=e?getDiasJornada(e.jornada):0;const sd=jd>0?(e.salarioBase||0)/jd:0;
    const base=Math.round(sd*l.diasTrabajados*100)/100;
    const vacDias=l.diasVacaciones||0;const vacAcum=Math.round(sd*vacDias*100)/100;
    return{'Nombre':e?e.nombres:'—','Apellidos':e?e.apellidos:'—',CI:e?e.carnet:'—',Plaza:e?e.plaza:'—',Departamento:e?e.departamento:'—','Días Trabajados':l.diasTrabajados,'Sal. Base':base,'Vac. Días':vacDias,'Vac. Acum.':vacAcum,'Sal. Bruto':l.totalDevengado||0};
  }),`PreNomina_${n.mesNombre}_${n.ano}`);
  showToast('Exportado','success');
}

function exportNominaActual(){
  const mes=parseInt((document.getElementById('nom-mes')?document.getElementById('nom-mes').value:null)||new Date().getMonth()+1);
  const ano=parseInt((document.getElementById('nom-ano')?document.getElementById('nom-ano').value:null)||new Date().getFullYear());
  const n=STATE.nominas.find(x=>x.periodo===`${ano}-${String(mes).padStart(2,'0')}`);
  if(n)exportNomina(n.id);else showToast('No hay nómina cargada','warning');
}

function imprimirNominaCompleta(nomId){

  const rows=n.lineas.map((l,i)=>{
    const e=STATE.empleados.find(x=>x.id===l.empleadoId);if(!e)return'';

    const base=Math.round(sd*l.diasTrabajados*100)/100;
    const vacDias=l.diasVacaciones||0;const vacAcum=Math.round(sd*vacDias*100)/100;
    const bruto=l.totalDevengado||0;

function renderRevisionAsistencia(){
  const mesEl=document.getElementById('rev-mes');
  const anoEl=document.getElementById('rev-ano');
  if(!mesEl||!anoEl)return;
  const mes=parseInt(mesEl.value);const ano=parseInt(anoEl.value);
  const periodoKey=`${ano}-${String(mes).padStart(2,'0')}`;
  const mesNombre=new Date(ano,mes-1).toLocaleString('es-ES',{month:'long'});
  const activos=getEmpleadosActivos();
  // Registros cerrados del mes
  const regsDelMes=STATE.asistencia.filter(a=>a.cerrado&&a.fecha.startsWith(periodoKey));
  const totalDias=regsDelMes.length;
  const cont=document.getElementById('rev-asistencia-content');
  if(!cont)return;

  if(!totalDias){
    cont.innerHTML=`<div class="card"><div class="card-body" style="text-align:center;padding:40px;color:var(--text-mid)">
      <div style="font-size:40px;margin-bottom:12px">📅</div>
      <h4>Sin registros de asistencia para ${mesNombre} ${ano}</h4>
      <p>El jefe de turno aún no ha cerrado ningún turno de este período.</p>
    </div></div>`;
    return;
  }

  // Para admin: mostrar total días del mes
  const diasCalendario=getDiasCalendarioMes(ano,mes);
  // Tabla por empleado
  const noAdmin=activos.filter(e=>!esDeptoAdmin(e.departamento));
  const admin=activos.filter(e=>esDeptoAdmin(e.departamento));

  const buildRow=(e,esAdmin)=>{
    if(esAdmin){
      const jornadaDias=getDiasJornada(e.jornada);
      return`<tr>
        <td><b>${e.nombres} ${e.apellidos}</b><br><small>${e.departamento}</small></td>
        <td>${e.plaza||'—'}</td>
        <td style="text-align:center"><span style="color:#2D6A4F;font-weight:700">${jornadaDias}</span></td>
        <td style="text-align:center">—</td>
        <td style="text-align:center">—</td>
        <td><span style="background:#D8F3DC;color:#2D6A4F;padding:2px 8px;border-radius:10px;font-size:11px">⚙️ Admin (100%)</span></td>
      </tr>`;
    }
    const presentes=getDiasPresentesMes(e.id,periodoKey);
    const noReg=totalDias-presentes;
    const incMes=STATE.incidencias.filter(i=>i.empleadoId===e.id&&i.periodo===periodoKey);
    const incLabel=incMes.length?incMes.map(i=>`<span style="background:#EFF6FF;color:#1D4ED8;padding:1px 5px;border-radius:8px;font-size:10px;margin:1px">${i.tipo}</span>`).join(''):
      (noReg>0?`<span style="background:#FFF3CD;color:#92400E;padding:1px 5px;border-radius:8px;font-size:10px;">⚠️ ${noReg}d sin asignar</span>`:'');
    return`<tr>
      <td><b>${e.nombres} ${e.apellidos}</b><br><small>${e.departamento}</small></td>
      <td>${e.plaza||'—'}</td>
      <td style="text-align:center;color:#2D6A4F;font-weight:700">✅ ${presentes}</td>
      <td style="text-align:center;color:#6B7280">${noReg>0?noReg:'-'}</td>
      <td style="text-align:center">${totalDias}</td>
      <td>${incLabel}</td>
    </tr>`;
  };

  cont.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="card-body" style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
        <div style="background:#D8F3DC;border-radius:10px;padding:10px 18px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:#2D6A4F">${totalDias}</div>
          <div style="font-size:11px;color:#2D6A4F">Turnos cerrados</div>
        </div>
        <div style="background:#EFF6FF;border-radius:10px;padding:10px 18px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:#1D4ED8">${noAdmin.length}</div>
          <div style="font-size:11px;color:#1D4ED8">En turno rotativo</div>
        </div>
        <div style="background:#F3F4F6;border-radius:10px;padding:10px 18px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:#374151">${admin.length}</div>
          <div style="font-size:11px;color:#374151">Admin (100%)</div>
        </div>
        <div style="flex:1;font-size:12px;color:var(--text-mid)">
          ℹ️ Los días <b>sin asignar</b> corresponden a turnos donde el empleado no fue marcado como presente. Registra incidencias (vacaciones, enfermedad, etc.) desde el módulo de <b>Incidencias</b> para completar el historial.
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Resumen de Asistencia — ${mesNombre} ${ano}</h3></div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Empleado</th><th>Plaza</th>
          <th>✅ Presentes</th><th>— Sin registrar</th><th>Turnos totales</th><th>Incidencias</th>
        </tr></thead>
        <tbody>
          ${noAdmin.map(e=>buildRow(e,false)).join('')}
          ${admin.map(e=>buildRow(e,true)).join('')}
        </tbody>
      </table></div>
    </div>`;
}

function renderIncidencias(container){
  const canAdd=currentRole==='contabilidad'||currentRole==='admin';
  document.getElementById('topbar-actions').innerHTML=canAdd?`<button class="btn btn-primary btn-sm" onclick="openModalIncidencia()">➕ Nueva Incidencia</button>`:'';
  container.innerHTML=`<div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Empleado</th><th>Período</th><th>Tipo</th><th>Inicio</th><th>Fin</th><th>Días</th><th>Impacto</th>${currentRole==='admin'?'<th>Eliminar</th>':''}</tr></thead>
    <tbody>${STATE.incidencias.length?STATE.incidencias.slice().reverse().map(i=>{
      const e=STATE.empleados.find(x=>x.id===i.empleadoId);
      const imp=i.tipo==='Permiso no retribuido'||i.tipo==='Ausencia injustificada'?'⬇️ Descuenta':'ℹ️ Sin descuento';
      return`<tr><td>${e?`${e.nombres} ${e.apellidos}`:'—'}</td><td>${i.periodo||'—'}</td>
      <td><span class="badge badge-info">${i.tipo}</span></td>
      <td>${fmtDate(i.fechaInicio)}</td><td>${fmtDate(i.fechaFin)}</td>
      <td><b>${i.diasAfectados}</b></td><td><small>${imp}</small></td>
      ${currentRole==='admin'?`<td><button class="btn btn-danger btn-xs" onclick="eliminarIncidencia('${i.id}')">🗑️</button></td>`:''}</tr>`;
    }).join(''):`<tr><td colspan="8" class="text-center text-muted" style="padding:40px">Sin incidencias</td></tr>`}
    </tbody>
  </table></div></div>`;
}

function openModalIncidencia(){
  const activos=getEmpleadosActivos();
  const tipos=['Baja médica','Permiso retribuido','Permiso no retribuido','Ausencia injustificada','Vacaciones'];
  openModal('📅 Registrar Incidencia',
    `<div class="form-grid">
      <div class="form-group full"><label class="field-label required">Empleado</label><select id="inc-emp"><option value="">Seleccione...</option>${activos.map(e=>`<option value="${e.id}">${e.nombres} ${e.apellidos}</option>`).join('')}</select></div>
      <div class="form-group"><label class="field-label required">Tipo</label><select id="inc-tipo" onchange="updateImpactoInfo()">${tipos.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label class="field-label required" data-tip="Mes al que se imputa esta incidencia">Período (Año-Mes)</label><input type="month" id="inc-periodo" value="${new Date().toISOString().slice(0,7)}"></div>
      <div class="form-group"><label class="field-label required">Fecha Inicio</label><input type="date" id="inc-inicio" onchange="calcDiasInc()"></div>
      <div class="form-group"><label class="field-label required">Fecha Fin</label><input type="date" id="inc-fin" onchange="calcDiasInc()"></div>
      <div class="form-group"><label class="field-label" data-tip="Calculado automáticamente">Días Afectados</label><input type="number" id="inc-dias" readonly></div>
      <div class="form-group full" id="inc-impacto-info"><div class="input-hint">ℹ️ Seleccione tipo</div></div>
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarIncidencia()">Guardar</button>`);
  setTimeout(()=>updateImpactoInfo(),100);
}

function updateImpactoInfo(){
  const tipo=(document.getElementById('inc-tipo')?document.getElementById('inc-tipo').value:null);
  const info={'Baja médica':'Sin descuento en días trabajados','Permiso retribuido':'Sin descuento en días trabajados','Permiso no retribuido':'Descuenta días de nómina','Ausencia injustificada':'Descuenta días de nómina','Vacaciones':'Suma 15 días pagados por cada 7 días de descanso'};
  const div=document.getElementById('inc-impacto-info');
  if(div&&tipo)div.innerHTML=`<div class="input-hint">ℹ️ ${info[tipo]||''}</div>`;
}

function calcDiasInc(){
  const i=(document.getElementById('inc-inicio')?document.getElementById('inc-inicio').value:null);const f=(document.getElementById('inc-fin')?document.getElementById('inc-fin').value:null);
  const d=document.getElementById('inc-dias');if(!i||!f||!d)return;
  const diff=(new Date(f)-new Date(i))/(1000*60*60*24)+1;d.value=diff>0?diff:0;
}

function guardarIncidencia(){
  const empId=document.getElementById('inc-emp').value;const tipo=document.getElementById('inc-tipo').value;
  const periodo=document.getElementById('inc-periodo').value;const fechaInicio=document.getElementById('inc-inicio').value;
  const fechaFin=document.getElementById('inc-fin').value;const diasAfectados=parseInt(document.getElementById('inc-dias').value)||0;
  if(!empId||!fechaInicio||!fechaFin||!periodo){showToast('Complete todos los campos','warning');return}
  if(diasAfectados<=0){showToast('Las fechas deben generar al menos 1 día','warning');return}
  const inc={id:'I'+uid(),empleadoId:empId,tipo,periodo,fechaInicio,fechaFin,diasAfectados};
  if(tipo==='Permiso no retribuido'||tipo==='Ausencia injustificada'){
    const nomina=STATE.nominas.find(n=>n.periodo===periodo);
    if(nomina){
      const linea=nomina.lineas.find(l=>l.empleadoId===empId);
      if(linea){
        linea.diasTrabajados=Math.max(0,linea.diasTrabajados-diasAfectados);
        pushToSheets('nominaLineas','actualizar',{...linea,nominaId:nomina.id},linea.id||null);
        const {lineas:_l,...nominaHeader}=nomina;
        pushToSheets('nominas','actualizar',nominaHeader,nomina.id);
      }
    }
  }
  if(tipo==='Vacaciones'){
    let ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===empId&&v.ano===new Date(fechaInicio).getFullYear());
    if(!ctrl){ctrl={id:'VC'+uid(),empleadoId:empId,ano:new Date(fechaInicio).getFullYear(),diasTomados:0};STATE.vacacionesControl.push(ctrl);pushToSheets('vacacionesControl','insertar',ctrl,null);}
    else{ctrl.diasTomados+=diasAfectados;pushToSheets('vacacionesControl','actualizar',ctrl,ctrl.id);}
  }
  STATE.incidencias.push(inc);saveState();
  pushToSheets('incidencias','insertar', inc);
  const emp=STATE.empleados.find(e=>e.id===empId);
  addAuditLog('INCIDENCIA',`Incidencia (${tipo}) para ${emp.nombres} ${emp.apellidos}: ${diasAfectados} días`);
  showToast('Incidencia registrada','success');closeModal();renderIncidencias(document.getElementById('app-content'));
}

function eliminarIncidencia(id){
  confirmAction('¿Eliminar esta incidencia?',function(){
    const idx=STATE.incidencias.findIndex(i=>i.id===id);
    if(idx>-1){const incId=STATE.incidencias[idx].id;STATE.incidencias.splice(idx,1);saveState();pushToSheets('incidencias','eliminar',null,incId);addAuditLog('ELIMINAR_INCIDENCIA','Incidencia eliminada por Admin');showToast('Eliminada','info');renderIncidencias(document.getElementById('app-content'))}
  });
}
