function saveVacPendientes(){
  STATE.vacPendientes=STATE.vacPendientes||[];
  saveState();
  const val=JSON.stringify(STATE.vacPendientes);
  sbUpsert('config',[{clave:'vacPendientes',valor:val}]).catch(()=>{});
  backupToSheets('config','actualizar',{clave:'vacPendientes',valor:val},null);
}
function getVacPeriodoActual(){
  const h=new Date();return`${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}`;
}
function marcarVacacionesRRHH(empId,periodo){
  STATE.vacPendientes=STATE.vacPendientes||[];
  const idx=STATE.vacPendientes.findIndex(v=>v.empleadoId===empId&&v.periodo===periodo);
  if(idx>=0&&!STATE.vacPendientes[idx].confirmado){
    STATE.vacPendientes.splice(idx,1);showToast('Marca removida','info');
  } else if(idx<0){
    STATE.vacPendientes.push({id:'VP'+uid(),empleadoId:empId,periodo,diasLiquidar:0,marcadoRRHH:true,confirmado:false,estado:'marcado'});
    showToast('Empleado marcado para cobrar vacaciones','success');
  }
  saveVacPendientes();
  renderVacaciones(document.getElementById('app-content'));
}
function confirmarVacacionesCont(empId,periodo){
  STATE.vacPendientes=STATE.vacPendientes||[];
  const diasEl=document.getElementById('vac-inp-'+empId);
  const dias=parseInt(diasEl?diasEl.value:0)||0;
  if(dias<=0){showToast('Introduce los días a liquidar (> 0)','warning');return;}
  let vp=STATE.vacPendientes.find(v=>v.empleadoId===empId&&v.periodo===periodo);
  if(!vp){vp={id:'VP'+uid(),empleadoId:empId,periodo,diasLiquidar:0,marcadoRRHH:false,confirmado:false,estado:'marcado'};STATE.vacPendientes.push(vp);}
  vp.diasLiquidar=dias;vp.confirmado=true;vp.estado='confirmado';
  saveVacPendientes();
  showToast(`${dias} días de vacaciones confirmados para nómina de ${periodo}`,'success',4000);
  renderVacaciones(document.getElementById('app-content'));
}
function quitarVacCont(empId,periodo){
  STATE.vacPendientes=STATE.vacPendientes||[];
  const vp=STATE.vacPendientes.find(v=>v.empleadoId===empId&&v.periodo===periodo);
  if(!vp)return;
  if(vp.marcadoRRHH){vp.confirmado=false;vp.diasLiquidar=0;vp.estado='marcado';}
  else{STATE.vacPendientes=STATE.vacPendientes.filter(v=>!(v.empleadoId===empId&&v.periodo===periodo));}
  saveVacPendientes();
  renderVacaciones(document.getElementById('app-content'));
}
function updateVacNomina(nomId,empId){
  const nomina=STATE.nominas.find(n=>n.id===nomId);if(!nomina)return;
  const linea=nomina.lineas.find(l=>l.empleadoId===empId);if(!linea)return;
  const vacEl=document.getElementById('vac-'+empId);
  const dias=parseFloat(vacEl?vacEl.value:0)||0;
  linea.diasVacaciones=dias;
  STATE.vacPendientes=STATE.vacPendientes||[];
  let vp=STATE.vacPendientes.find(v=>v.empleadoId===empId&&v.periodo===nomina.periodo);
  if(dias>0){
    if(!vp){vp={id:'VP'+uid(),empleadoId:empId,periodo:nomina.periodo,diasLiquidar:0,marcadoRRHH:false,confirmado:false,estado:'marcado'};STATE.vacPendientes.push(vp);}
    vp.diasLiquidar=dias;vp.confirmado=true;vp.estado='confirmado';
  } else if(vp&&!vp.marcadoRRHH){
    STATE.vacPendientes=STATE.vacPendientes.filter(v=>!(v.empleadoId===empId&&v.periodo===nomina.periodo));
  } else if(vp){vp.diasLiquidar=0;vp.confirmado=false;vp.estado='marcado';}
  saveVacPendientes();
  updateNominaLine(nomId,empId);
}

function renderVacaciones(container){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-secondary btn-sm" onclick="exportVacaciones()">⬇️ Excel</button>`;
  const activos=getEmpleadosActivos().slice().sort((a,b)=>(a.departamento||'').localeCompare(b.departamento||'')||`${a.nombres} ${a.apellidos}`.localeCompare(`${b.nombres} ${b.apellidos}`));
  const anoActual=new Date().getFullYear();
  const periodoActual=getVacPeriodoActual();
  const vp=STATE.vacPendientes||[];
  const mesLabel=new Date(periodoActual+'-15').toLocaleDateString('es-ES',{month:'long',year:'numeric'});

  // Alerta fin de año (diciembre)
  const esdiciembre=new Date().getMonth()===11;
  const sinCobrar=activos.filter(e=>{const ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===e.id&&v.ano===anoActual);return !(ctrl&&ctrl.diasTomados>0);});
  const alertaFinAnio=esdiciembre&&sinCobrar.length>0
    ?`<div style="background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#991B1B;font-size:13px;">
       ⚠️ <b>Cierre de año:</b> ${sinCobrar.length} empleado(s) aún no han cobrado vacaciones en ${anoActual}. Por ley deben cobrar antes del 31 de diciembre.
       </div>`:' ';

  // ── VISTA RRHH ──
  if(currentRole==='rrhh'){
    const filas=activos.map(e=>{
      const ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===e.id&&v.ano===anoActual);
      const tomados=(ctrl?ctrl.diasTomados:0)||0;
      const vpEntry=vp.find(v=>v.empleadoId===e.id&&v.periodo===periodoActual);
      const marcado=!!vpEntry;
      const confirmado=vpEntry&&vpEntry.confirmado;
      const bg=confirmado?'#F0FDF4':marcado?'#FFFBEB':'';
      return`<tr style="background:${bg}">
        <td><b>${e.nombres} ${e.apellidos}</b><br><small style="color:var(--text-mid)">${e.departamento}</small></td>
        <td style="text-align:center">${tomados}</td>
        <td style="text-align:center">${confirmado?`<span style="color:#2D6A4F;font-weight:700">✅ Confirmado (${vpEntry.diasLiquidar}d)</span>`:marcado?'<span style="color:#B45309;font-weight:700">🕐 Pendiente Cont.</span>':'—'}</td>
        <td style="text-align:center">
          ${!confirmado
            ?`<button class="btn btn-sm ${marcado?'btn-secondary':'btn-gold'}" onclick="marcarVacacionesRRHH('${e.id}','${periodoActual}')">${marcado?'✕ Desmarcar':'✓ Marcar'}</button>`
            :`<span style="font-size:11px;color:#2D6A4F">Contabilidad confirmó</span>`}
        </td></tr>`;
    }).join('');
    const marcados=vp.filter(v=>v.periodo===periodoActual);
    container.innerHTML=`${alertaFinAnio}
    <div class="card" style="margin-bottom:16px">
      <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h3>🌴 Vacaciones — ${mesLabel}</h3>
        ${marcados.length>0?`<button class="btn btn-secondary btn-sm" onclick="exportVacacionesRRHH('${periodoActual}')">📄 Exportar lista para Contabilidad</button>`:''}
      </div>
      <p style="padding:0 20px 12px;font-size:13px;color:var(--text-mid)">Marca los empleados que deben cobrar vacaciones en la nómina de <b>${mesLabel}</b>. Contabilidad recibirá la lista y confirmará los días.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>Empleado</th><th style="text-align:center">Días cobrados ${anoActual}</th><th style="text-align:center">Estado</th><th style="text-align:center">Acción</th></tr></thead>
        <tbody>${filas}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>📊 Submayor ${anoActual}</h3></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Empleado</th><th>Dpto</th><th style="text-align:center">Días Cobrados</th></tr></thead>
        <tbody>${activos.map(e=>{
          const ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===e.id&&v.ano===anoActual);
          const tomados=(ctrl?ctrl.diasTomados:0)||0;
          return`<tr><td><b>${e.nombres} ${e.apellidos}</b></td><td>${e.departamento}</td>
            <td style="text-align:center">${tomados>0?`<b style="color:#2D6A4F">${tomados}d</b>`:`<span style="color:var(--text-light)">0d</span>`}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
    return;
  }

  // ── VISTA CONTABILIDAD ──
  if(currentRole==='contabilidad'){
    const pendCont=vp.filter(v=>v.periodo===periodoActual&&v.marcadoRRHH&&!v.confirmado);
    const confirmados=vp.filter(v=>v.periodo===periodoActual&&v.confirmado);
    const filasPend=pendCont.map(v=>{
      const e=STATE.empleados.find(x=>x.id===v.empleadoId);if(!e)return'';
      const ctrl=STATE.vacacionesControl.find(c=>c.empleadoId===e.id&&c.ano===anoActual);
      const tomados=(ctrl?ctrl.diasTomados:0)||0;
      const salDiario=(e.salarioBase||0)/getDiasJornada(e.jornada);
      return`<tr>
        <td><b>${e.nombres} ${e.apellidos}</b><br><small style="color:var(--text-mid)">${e.departamento}</small></td>
        <td style="text-align:center">${tomados}d cobrados en ${anoActual}</td>
        <td style="text-align:center"><input type="number" id="vac-inp-${e.id}" min="1" max="365" placeholder="días" style="width:70px;text-align:center" value="${v.diasLiquidar||''}"></td>
        <td style="text-align:center"><small style="color:var(--text-mid)" id="vac-est-${e.id}"></small></td>
        <td><button class="btn btn-success btn-sm" onclick="confirmarVacacionesCont('${e.id}','${periodoActual}')">✅ Confirmar</button></td>
      </tr>`;
    }).join('');
    const filasConf=confirmados.map(v=>{
      const e=STATE.empleados.find(x=>x.id===v.empleadoId);if(!e)return'';
      const salDiario=(e.salarioBase||0)/getDiasJornada(e.jornada);
      const monto=Math.round(salDiario*v.diasLiquidar*100)/100;
      return`<tr style="background:#F0FDF4">
        <td><b>${e.nombres} ${e.apellidos}</b></td>
        <td style="text-align:center">${v.diasLiquidar}d</td>
        <td style="text-align:right;font-weight:700">${fmtMoney(monto)}</td>
        <td><button class="btn btn-secondary btn-xs" onclick="quitarVacCont('${e.id}','${periodoActual}')">✕</button></td>
      </tr>`;
    }).join('');
    container.innerHTML=`${alertaFinAnio}
    ${pendCont.length>0?`<div class="card" style="margin-bottom:16px">
      <div class="card-header"><h3>📋 Solicitudes de RRHH — ${mesLabel}</h3></div>
      <p style="padding:0 20px 12px;font-size:13px;color:var(--text-mid)">RRHH marcó estos empleados para cobrar vacaciones. Introduce los días a liquidar y confirma.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>Empleado</th><th>Historial</th><th style="text-align:center">Días a liquidar</th><th></th><th>Acción</th></tr></thead>
        <tbody>${filasPend}</tbody>
      </table></div>
    </div>`:`<div class="card" style="margin-bottom:16px;padding:20px;text-align:center;color:var(--text-mid)"><p>No hay solicitudes de RRHH pendientes para ${mesLabel}.</p></div>`}
    ${confirmados.length>0?`<div class="card">
      <div class="card-header"><h3>✅ Confirmados para Pre-Nómina de ${mesLabel}</h3></div>
      <p style="padding:0 20px 12px;font-size:13px;color:#2D6A4F">Estos días aparecerán en la columna <b>Vac. Acum.</b> de la pre-nómina. Se registrarán al aprobar.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>Empleado</th><th style="text-align:center">Días</th><th style="text-align:right">Importe est.</th><th></th></tr></thead>
        <tbody>${filasConf}</tbody>
      </table></div>
    </div>`:''}`;
    return;
  }

  // ── VISTA ADMIN (y fallback) ──
  const confirmados=vp.filter(v=>v.periodo===periodoActual&&v.confirmado);
  const filasAdmin=activos.map(e=>{
    const ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===e.id&&v.ano===anoActual);
    const tomados=(ctrl?ctrl.diasTomados:0)||0;
    const vpE=vp.find(v=>v.empleadoId===e.id&&v.periodo===periodoActual);
    const salDiario=(e.salarioBase||0)/getDiasJornada(e.jornada);
    const diasPend=vpE&&vpE.confirmado?vpE.diasLiquidar:0;
    const monto=Math.round(salDiario*diasPend*100)/100;
    const estado=vpE?( vpE.confirmado?`<span style="color:#2D6A4F;font-weight:700">✅ ${vpE.diasLiquidar}d confirmados`:`<span style="color:#B45309">🕐 Marcado por RRHH</span>`):'—';
    return`<tr>
      <td><b>${e.nombres} ${e.apellidos}</b><br><small style="color:var(--text-mid)">${e.departamento}</small></td>
      <td style="text-align:center">${tomados}</td>
      <td style="text-align:center">${estado}</td>
      <td style="text-align:right;font-weight:700">${diasPend>0?fmtMoney(monto):'—'}</td>
    </tr>`;
  }).join('');
  container.innerHTML=`${alertaFinAnio}
  <div class="card" style="margin-bottom:16px">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
      <h3>🌴 Vacaciones — ${mesLabel}</h3>
      <span style="font-size:13px;color:var(--text-mid)">${confirmados.length} confirmado(s) para pre-nómina</span>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Empleado</th><th style="text-align:center">Días cobrados ${anoActual}</th><th style="text-align:center">Estado ${mesLabel}</th><th style="text-align:right">Importe est.</th></tr></thead>
      <tbody>${filasAdmin}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="card-header"><h3>📊 Submayor ${anoActual}</h3></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Empleado</th><th>Dpto</th><th style="text-align:center">Días Cobrados</th></tr></thead>
      <tbody>${activos.map(e=>{
        const ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===e.id&&v.ano===anoActual);
        const t=(ctrl?ctrl.diasTomados:0)||0;
        return`<tr><td><b>${e.nombres} ${e.apellidos}</b></td><td>${e.departamento}</td>
          <td style="text-align:center">${t>0?`<b style="color:#2D6A4F">${t}d</b>`:`<span style="color:var(--text-light)">0d</span>`}</td></tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

function exportVacacionesRRHH(periodo){
  const vp=(STATE.vacPendientes||[]).filter(v=>v.periodo===periodo);
  const data=vp.map(v=>{
    const e=STATE.empleados.find(x=>x.id===v.empleadoId);
    const anoActual=new Date().getFullYear();
    const ctrl=STATE.vacacionesControl.find(c=>c.empleadoId===v.empleadoId&&c.ano===anoActual);
    return{Empleado:e?`${e.nombres} ${e.apellidos}`:'—',Departamento:e?e.departamento:'—',Plaza:e?e.plaza:'—','Días Cobrados Año':(ctrl?ctrl.diasTomados:0)||0,'Estado':v.confirmado?`Confirmado (${v.diasLiquidar}d)`:'Pendiente Contabilidad'};
  });
  if(!data.length){showToast('No hay empleados marcados para este período','warning');return;}
  exportToExcel(data,`Vacaciones_Solicitud_${periodo}`);showToast('Lista exportada para Contabilidad','success');
}

function exportVacaciones(){
  const activos=getEmpleadosActivos();const anoActual=new Date().getFullYear();
  const periodo=getVacPeriodoActual();const vp=STATE.vacPendientes||[];
  const data=activos.map(e=>{
    const ctrl=STATE.vacacionesControl.find(v=>v.empleadoId===e.id&&v.ano===anoActual);
    const tomados=(ctrl?ctrl.diasTomados:0)||0;
    const vpE=vp.find(v=>v.empleadoId===e.id&&v.periodo===periodo);
    return{Empleado:`${e.nombres} ${e.apellidos}`,Departamento:e.departamento,'Días Cobrados Año':tomados,'Estado período':vpE?(vpE.confirmado?`Confirmado (${vpE.diasLiquidar}d)`:' Marcado'):'—'};
  });
  exportToExcel(data,`Vacaciones_${anoActual}`);showToast('Exportado','success');
}

function togglePinVis(id,btn){const inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';btn.textContent='🙈'}else{inp.type='password';btn.textContent='👁️'}}

function guardarConfiguracion(){
  const r=document.getElementById('cfg-pin-rrhh').value.trim();const j=document.getElementById('cfg-pin-jur').value.trim();const c=document.getElementById('cfg-pin-cont').value.trim();const jt=document.getElementById('cfg-pin-jt').value.trim();const a=document.getElementById('cfg-pin-admin').value.trim();
  if([r,j,c,jt,a].some(p=>!/^\d{4}$/.test(p))){showToast('Todos los PINs deben tener exactamente 4 dígitos','error');return}
  const allPins=[r,j,c,jt,a];if(new Set(allPins).size!==allPins.length){showToast('Cada rol debe tener un PIN único','error');return}
  STATE.config.pins.rrhh=r;STATE.config.pins.juridico=j;STATE.config.pins.contabilidad=c;STATE.config.pins.jefe_turno=jt;STATE.config.adminPin=a;
  STATE.config.bonificacion.anios1=parseInt(document.getElementById('cfg-bon-anos1').value)||5;
  STATE.config.bonificacion.nivel1=parseInt(document.getElementById('cfg-bon-pct1').value)||5;
  STATE.config.bonificacion.anios2=parseInt(document.getElementById('cfg-bon-anos2').value)||10;
  STATE.config.bonificacion.nivel2=parseInt(document.getElementById('cfg-bon-pct2').value)||10;
  STATE.config.recargoHorasExtras=parseFloat(document.getElementById('cfg-recargo').value)||50;
  STATE.config.diasVacaciones=parseInt(document.getElementById('cfg-vac-dias').value)||14;
  STATE.config.diasPagadosPeriodo=parseInt(document.getElementById('cfg-vac-pag').value)||15;
  saveState();
  // Sincronizar config con Sheets
  const cfgSheets = {
    pinRrhh: STATE.config.pins.rrhh,
    pinJuridico: STATE.config.pins.juridico,
    pinContabilidad: STATE.config.pins.contabilidad,
    pinJefeTurno: STATE.config.pins.jefe_turno,
    pinAdmin: STATE.config.adminPin,
    bonAnios1: STATE.config.bonificacion.anios1,
    bonNivel1: STATE.config.bonificacion.nivel1,
    bonAnios2: STATE.config.bonificacion.anios2,
    bonNivel2: STATE.config.bonificacion.nivel2,
    recargoHE: STATE.config.recargoHorasExtras,
    diasVacaciones: STATE.config.diasVacaciones,
    diasPagados: STATE.config.diasPagadosPeriodo
  };
  // Backup a Sheets
  apiCall({ accion: 'guardarConfig', tabla: 'config', valores: cfgSheets }).catch(() => {});
  // Sync a Supabase como filas clave-valor
  const cfgRows = Object.entries(cfgSheets).map(([clave,valor])=>({clave,valor:String(valor)}));
  sbUpsert('config', cfgRows).catch(()=>{});
  addAuditLog('CONFIG','Configuración actualizada por Admin');showToast('Configuración guardada','success');
}

function renderAuditoria(container){
  if(currentRole!=='admin'){container.innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><h4>Solo Administración</h4></div>';return}
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-secondary btn-sm" onclick="exportAuditoria()">⬇️ Exportar</button>`;
  container.innerHTML=`<div class="card">
    <div class="filters-bar"><input type="text" id="aud-q" placeholder="🔍 Buscar..." style="min-width:260px" oninput="filtrarAuditoria()"></div>
    <div class="table-wrap resp-table"><table>
      <thead><tr><th>Fecha y Hora</th><th>Rol</th><th>Tipo</th><th>Detalle</th></tr></thead>
      <tbody id="aud-tbody">${renderAuditoriaRows(STATE.auditLog)}</tbody>
    </table></div>

}

function renderAuditoriaRows(logs){
  if(!logs.length)return`<tr><td colspan="4" class="text-center text-muted" style="padding:40px">Sin registros</td></tr>`;
  return logs.slice(0,200).map(l=>`<tr>
    <td data-label="Fecha"><code style="font-size:12px">${new Date(l.fecha).toLocaleString('es-ES')}</code></td>
    <td data-label="Rol"><span class="badge badge-info">${l.rol}</span></td>
    <td data-label="Tipo"><span class="chip">${l.tipo}</span></td>
    <td data-label="Detalle">${l.detalle}</td></tr>`).join('');
}

function filtrarAuditoria(){
  const q=document.getElementById('aud-q').value.toLowerCase();
  const f=STATE.auditLog.filter(l=>l.tipo.toLowerCase().includes(q)||l.detalle.toLowerCase().includes(q)||l.rol.toLowerCase().includes(q));
  document.getElementById('aud-tbody').innerHTML=renderAuditoriaRows(f);
}

function exportAuditoria(){
  exportToExcel(STATE.auditLog.map(l=>({Fecha:new Date(l.fecha).toLocaleString('es-ES'),Rol:l.rol,Tipo:l.tipo,Detalle:l.detalle})),'AuditoriaLog_LaCatedral');
  showToast('Exportado','success');
}

function renderBackup(container){
  if(currentRole!=='admin'){container.innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><h4>Solo Administración</h4></div>';return}
  container.innerHTML=`<div class="card" style="max-width:600px">

    <div class="card-body">
      <div class="stats-grid" style="margin-bottom:24px">

        <div class="stat-card"><div class="stat-value">${STATE.nominas.length}</div><div class="stat-label">Pre-Nóminas</div></div>
        <div class="stat-card"><div class="stat-value">${STATE.sanciones.length}</div><div class="stat-label">Sanciones</div></div>
        <div class="stat-card"><div class="stat-value">${STATE.auditLog.length}</div><div class="stat-label">Logs</div></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div><h4 style="margin-bottom:8px;color:var(--burgundy)">⬇️ Exportar Copia de Seguridad</h4>
          <p class="text-muted">Descarga todos los datos en formato JSON.</p>
          <button class="btn btn-primary" style="margin-top:10px;width:auto" onclick="exportBackup()">💾 Descargar Backup</button></div>
        <div class="divider"></div>
        <div><h4 style="margin-bottom:8px;color:var(--burgundy)">⬆️ Restaurar desde Copia</h4>
          <p class="text-muted">⚠️ Esto reemplazará TODOS los datos actuales.</p>
          <div class="file-drop" style="margin-top:10px" onclick="document.getElementById('backup-file').click()">
            <div class="file-icon">📂</div><p>Seleccionar archivo .json de backup</p>
            <input type="file" id="backup-file" accept="application/json,.json" style="display:none" onchange="previewBackup(this)">
            <span id="backup-file-name" class="text-muted"></span>
          </div>
          <button class="btn btn-danger" style="margin-top:10px;width:auto" onclick="importBackup()">♻️ Restaurar Backup</button></div>
      </div>
    </div>
  </div>`;
}

function exportBackup(){
  const json=JSON.stringify(STATE,null,2);const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`LaCatedral_Backup_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  addAuditLog('BACKUP','Copia de seguridad exportada');showToast('Backup descargado','success');
}

function previewBackup(input){const l=document.getElementById('backup-file-name');if(input.files[0])l.textContent='✅ '+input.files[0].name}

function importBackup(){
  const input=document.getElementById('backup-file');
  if(!input.files[0]){showToast('Seleccione un archivo de backup','warning');return}
  confirmAction('⚠️ ¿Restaurar backup? Se perderán los datos actuales.',function(){
    const r=new FileReader();
    r.onload=function(e){
      try{const data=JSON.parse(e.target.result);if(!data.empleados||!data.config)throw new Error('Formato inválido');STATE=data;saveState();addAuditLog('RESTORE','Datos restaurados desde backup');showToast('Backup restaurado','success');renderBackup(document.getElementById('app-content'))}
      catch(err){showToast('Error al leer el backup: '+err.message,'error')}
    };r.readAsText(input.files[0]);
  });
}

const DEPTS_EXCLUIDOS_JEFE_TURNO = ['ADMINISTRACIÓN','LOGÍSTICA'];
const DEPT_ORDER_JT  = ['SALA','TIENDA','COCINA','ALMACÉN','CARNICERÍA'];
const DEPT_COLORS_JT = {
  'SALA':      {bg:'#DBEAFE',color:'#1D4ED8',light:'#EFF6FF',icon:'🍷'},
  'TIENDA':    {bg:'#DCFCE7',color:'#15803D',light:'#F0FDF4',icon:'🛒'},
  'COCINA':    {bg:'#FEF3C7',color:'#B45309',light:'#FFFBEB',icon:'👨‍🍳'},
  'ALMACÉN':   {bg:'#F3E8FF',color:'#7C3AED',light:'#FAF5FF',icon:'📦'},
  'CARNICERÍA':{bg:'#FCE7F3',color:'#BE185D',light:'#FDF2F8',icon:'🥩'},
};
let _jt_emps=[], _jt_estados={}, _jt_hoy='', _jt_readonly=false, _jt_nombre='', _jt_tab='sala_tienda', _jt_autoCloseTimer=null;

const JT_TABS=[
  {id:'sala_tienda',       label:'Sala + Tienda',        depts:['SALA','TIENDA']},
  {id:'cocina',            label:'Cocina',               depts:['COCINA']},
  {id:'almacen_carniceria',label:'Almacén + Carnicería', depts:['ALMACÉN','CARNICERÍA']},
];

function renderSeleccionJefeTurno(container, hoy){
  const fechaLabel=new Date(hoy+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let jefes=getEmpleadosActivos().filter(e=>e.plaza&&e.plaza.toLowerCase().includes('jefe de turno')&&e.departamento==='SALA');
  if(!jefes.length) jefes=getEmpleadosActivos().filter(e=>e.plaza&&e.plaza.toLowerCase().includes('jefe de turno'));
  if(!jefes.length) jefes=getEmpleadosActivos().filter(e=>e.plaza&&e.plaza.toLowerCase().includes('jefe'));
  if(!jefes.length) jefes=getEmpleadosActivos().slice(0,10);
  const opciones=jefes.map(e=>
    '<button onclick="seleccionarJefeTurno(\''+e.id+'\')" style="'
    +'width:100%;text-align:left;padding:16px 20px;border-radius:14px;margin-bottom:10px;'
    +'border:2px solid #E5E7EB;background:white;cursor:pointer;'
    +'display:flex;align-items:center;gap:14px;transition:border-color 0.15s"'
    +' onmouseover="this.style.borderColor=\'#2D6A4F\'" onmouseout="this.style.borderColor=\'#E5E7EB\'">'
    +'<span style="font-size:34px;flex-shrink:0">👤</span>'
    +'<div style="text-align:left"><div style="font-weight:700;font-size:15px;color:var(--text-dark)">'+e.nombres+' '+e.apellidos+'</div>'
    +'<div style="font-size:12px;color:var(--text-mid)">'+e.plaza+'</div></div>'
    +'</button>'
  ).join('');
  container.innerHTML=
    '<div style="max-width:380px;margin:0 auto;padding:16px 0">'
    +'<div style="text-align:center;margin-bottom:28px">'
    +'<div style="font-size:52px;margin-bottom:10px">👋</div>'
    +'<div style="font-size:20px;font-weight:800;color:var(--text-dark);margin-bottom:6px">¿Quién toma la asistencia?</div>'
    +'<div style="font-size:13px;color:var(--text-mid)">'+fechaLabel+'</div></div>'
    +opciones+'</div>';
}

function seleccionarJefeTurno(empId){
  const emp=getEmpleadosActivos().find(e=>e.id===empId);
  if(!emp)return;
  _jt_nombre=emp.nombres+' '+emp.apellidos;
  _jt_tab='sala_tienda';
  const container=document.getElementById('app-content');
  const hoy=new Date().toISOString().slice(0,10);
  const activos=getEmpleadosActivos().filter(e=>!DEPTS_EXCLUIDOS_JEFE_TURNO.includes(e.departamento));
  const registroHoy=STATE.asistencia.find(a=>a.fecha===hoy);
  renderAsistenciaJefeTurno(container,hoy,activos,registroHoy,false);
  // JT de SALA que toma → TRABAJA; el otro JT de SALA → DESCANSA
  const todosJT=_jt_emps.filter(e=>e.plaza&&e.plaza.toLowerCase().includes('jefe de turno')&&e.departamento==='SALA');
  todosJT.forEach(jt=>{ _jt_estados[jt.id]={estado:jt.id===empId?'P':'D',motivo:''}; });
  autoGuardarTurnoJT();
  renderListaJT(container);
  iniciarAutoCloseJT(hoy);
}

function renderAsistenciaJefeTurno(container, hoy, activos, registroHoy, yaGuardado){
  _jt_hoy=hoy; _jt_readonly=yaGuardado;
  _jt_emps=[...activos].sort((a,b)=>{
    const ai=DEPT_ORDER_JT.indexOf(a.departamento);
    const bi=DEPT_ORDER_JT.indexOf(b.departamento);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  _jt_estados={};
  if(registroHoy&&registroHoy.lineas)
    registroHoy.lineas.forEach(l=>{ _jt_estados[l.empleadoId]={estado:l.estado,motivo:l.motivo||''}; });
  renderListaJT(container);
  if(!yaGuardado) iniciarAutoCloseJT(hoy);
}

function renderListaJT(container){
  const fechaLabel=new Date(_jt_hoy+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const tab=JT_TABS.find(t=>t.id===_jt_tab)||JT_TABS[0];
  const tabEmps=_jt_emps.filter(e=>tab.depts.includes(e.departamento));
  const P=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='P').length;
  const D=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='D').length;
  const sinAsignar=_jt_emps.length-P-D;
  const cerrado=_jt_readonly;

  // Cabecera fecha
  let html='<div style="background:linear-gradient(135deg,#1B4332,#2D6A4F);color:white;border-radius:14px;padding:13px 16px;margin-bottom:12px;text-align:center">'
    +'<div style="font-size:10px;letter-spacing:2px;opacity:0.7;text-transform:uppercase">Asistencia del día</div>'
    +'<div style="font-size:16px;font-weight:800;margin-top:2px">'+fechaLabel+'</div>'
    +'<div style="font-size:11px;opacity:0.6;margin-top:1px">'+_jt_nombre+(cerrado?' · <b>Turno cerrado</b>':'')+'</div>'
    +'</div>';

  // Pestañas por grupo
  html+='<div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px">';
  JT_TABS.forEach(t=>{
    const te=_jt_emps.filter(e=>t.depts.includes(e.departamento));
    const td=te.filter(e=>_jt_estados[e.id]).length;
    const complete=te.length>0&&td===te.length;
    const active=t.id===_jt_tab;
    html+='<button id="jt-tab-'+t.id+'" onclick="switchTabJT(\''+t.id+'\')" style="'
      +'padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;'
      +'border:2px solid '+(active?'#2D6A4F':complete?'#22C55E':'#E5E7EB')+';'
      +'background:'+(active?'#2D6A4F':complete?'#DCFCE7':'#F3F4F6')+';'
      +'color:'+(active?'white':complete?'#166534':'#6B7280')+';cursor:pointer">'
      +(complete?'✓ ':'')+t.label+'&nbsp;'+td+'/'+te.length+'</button>';
  });
  html+='</div>';

  // Lista de empleados de la pestaña activa
  html+='<div style="background:white;border-radius:14px;overflow:hidden;border:1px solid #E5E7EB;margin-bottom:12px">';
  if(!tabEmps.length){
    html+='<div style="padding:24px;text-align:center;color:var(--text-mid)">Sin empleados en este grupo</div>';
  } else {
    tabEmps.forEach((emp,i)=>{
      const st=(_jt_estados[emp.id]||{}).estado||'';
      const last=i===tabEmps.length-1;
      html+='<div id="jt-row-'+emp.id+'" style="display:flex;align-items:center;padding:11px 14px;'
        +(last?'':'border-bottom:1px solid #F3F4F6;')
        +'background:'+(st==='P'?'#F0FDF4':st==='D'?'#EFF6FF':'white')+'">'
        // Nombre
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:14px;color:var(--text-dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+emp.nombres+' '+emp.apellidos+'</div>'
        +'<div style="font-size:11px;color:var(--text-mid)">'+emp.plaza+'</div>'
        +'</div>'
        // Botones o etiqueta
        +'<div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px">';
      if(cerrado){
        html+='<span style="padding:5px 11px;border-radius:16px;font-size:12px;font-weight:700;'
          +'background:'+(st==='P'?'#DCFCE7':st==='D'?'#DBEAFE':'#F3F4F6')+';'
          +'color:'+(st==='P'?'#166534':st==='D'?'#1D4ED8':'#9CA3AF')+'">'
          +(st==='P'?'✓ TRABAJA':st==='D'?'✓ DESCANSA':'—')+'</span>';
      } else {
        html+='<button id="jt-p-'+emp.id+'" onclick="setEstadoJT(\''+emp.id+'\',\'P\')" style="'
          +'padding:7px 11px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.12s;'
          +'border:2px solid '+(st==='P'?'#22C55E':'#BBF7D0')+';'
          +'background:'+(st==='P'?'#22C55E':'#F0FDF4')+';'
          +'color:'+(st==='P'?'white':'#166534')+'">'+( st==='P'?'✓ ':'')+'TRABAJA</button>'
          +'<button id="jt-d-'+emp.id+'" onclick="setEstadoJT(\''+emp.id+'\',\'D\')" style="'
          +'padding:7px 11px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.12s;'
          +'border:2px solid '+(st==='D'?'#3B82F6':'#BFDBFE')+';'
          +'background:'+(st==='D'?'#3B82F6':'#EFF6FF')+';'
          +'color:'+(st==='D'?'white':'#1D4ED8')+'">'+( st==='D'?'✓ ':'')+'DESCANSA</button>';
      }
      html+='</div></div>';
    });
  }
  html+='</div>';

  // Contadores globales
  html+='<div id="jt-counters" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'
    +'<div style="background:#DCFCE7;border-radius:10px;padding:9px;text-align:center"><div style="font-size:22px;font-weight:800;color:#166534">'+P+'</div><div style="font-size:10px;color:#166534;font-weight:600">✅ Trabajan</div></div>'
    +'<div style="background:#DBEAFE;border-radius:10px;padding:9px;text-align:center"><div style="font-size:22px;font-weight:800;color:#1D4ED8">'+D+'</div><div style="font-size:10px;color:#1D4ED8;font-weight:600">😴 Descansan</div></div>'
    +'<div style="background:#F3F4F6;border-radius:10px;padding:9px;text-align:center"><div style="font-size:22px;font-weight:800;color:#6B7280">'+sinAsignar+'</div><div style="font-size:10px;color:#6B7280;font-weight:600">— Sin marcar</div></div>'
    +'</div>';

  // Botón cerrar o mensaje despedida
  if(cerrado){
    html+='<div style="background:linear-gradient(135deg,#1B4332,#2D6A4F);color:white;border-radius:14px;padding:20px;text-align:center">'
      +'<div style="font-size:32px;margin-bottom:6px">🎉</div>'
      +'<div style="font-size:17px;font-weight:800;margin-bottom:4px">¡Hasta luego, '+(_jt_nombre.split(' ')[0]||'compañero')+'!</div>'
      +'<div style="font-size:12px;opacity:0.75">Turno cerrado. Que descanses.</div>'
      +'</div>';
  } else {
    html+='<button onclick="cerrarTurnoJT()" class="btn btn-success" style="width:100%;padding:13px;font-size:15px">🔒 Cerrar Turno</button>';
  }

  container.innerHTML='<div id="jt-lista-area">'+html+'</div>';
}

function switchTabJT(tabId){
  _jt_tab=tabId;
  const c=document.getElementById('app-content');
  if(c) renderListaJT(c);
}

function setEstadoJT(empId,estado){
  if(_jt_readonly)return;
  const cur=(_jt_estados[empId]||{}).estado||'';
  if(cur===estado) delete _jt_estados[empId]; // toca el mismo → quitar marca
  else _jt_estados[empId]={estado,motivo:''};
  autoGuardarTurnoJT();
  _updateRowJT(empId);
  _updateTabsJT();
  _updateCountersJT();
}

function _updateRowJT(empId){
  const st=(_jt_estados[empId]||{}).estado||'';
  const row=document.getElementById('jt-row-'+empId);
  const btnP=document.getElementById('jt-p-'+empId);
  const btnD=document.getElementById('jt-d-'+empId);
  if(row) row.style.background=st==='P'?'#F0FDF4':st==='D'?'#EFF6FF':'white';
  if(btnP){
    btnP.style.background=st==='P'?'#22C55E':'#F0FDF4';
    btnP.style.color=st==='P'?'white':'#166534';
    btnP.style.borderColor=st==='P'?'#22C55E':'#BBF7D0';
    btnP.textContent=(st==='P'?'✓ ':'')+'TRABAJA';
  }
  if(btnD){
    btnD.style.background=st==='D'?'#3B82F6':'#EFF6FF';
    btnD.style.color=st==='D'?'white':'#1D4ED8';
    btnD.style.borderColor=st==='D'?'#3B82F6':'#BFDBFE';
    btnD.textContent=(st==='D'?'✓ ':'')+'DESCANSA';
  }
}

function _updateTabsJT(){
  JT_TABS.forEach(t=>{
    const el=document.getElementById('jt-tab-'+t.id);
    if(!el)return;
    const te=_jt_emps.filter(e=>t.depts.includes(e.departamento));
    const td=te.filter(e=>_jt_estados[e.id]).length;
    const complete=te.length>0&&td===te.length;
    const active=t.id===_jt_tab;
    el.textContent=(complete?'✓ ':'')+t.label+' '+td+'/'+te.length;
    el.style.background=active?'#2D6A4F':complete?'#DCFCE7':'#F3F4F6';
    el.style.color=active?'white':complete?'#166534':'#6B7280';
    el.style.borderColor=active?'#2D6A4F':complete?'#22C55E':'#E5E7EB';
  });
}

function _updateCountersJT(){
  const el=document.getElementById('jt-counters');
  if(!el)return;
  const P=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='P').length;
  const D=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='D').length;
  const S=_jt_emps.length-P-D;
  el.innerHTML='<div style="background:#DCFCE7;border-radius:10px;padding:9px;text-align:center"><div style="font-size:22px;font-weight:800;color:#166534">'+P+'</div><div style="font-size:10px;color:#166534;font-weight:600">✅ Trabajan</div></div>'
    +'<div style="background:#DBEAFE;border-radius:10px;padding:9px;text-align:center"><div style="font-size:22px;font-weight:800;color:#1D4ED8">'+D+'</div><div style="font-size:10px;color:#1D4ED8;font-weight:600">😴 Descansan</div></div>'
    +'<div style="background:#F3F4F6;border-radius:10px;padding:9px;text-align:center"><div style="font-size:22px;font-weight:800;color:#6B7280">'+S+'</div><div style="font-size:10px;color:#6B7280;font-weight:600">— Sin marcar</div></div>';
}

function autoGuardarTurnoJT(){
  let reg=STATE.asistencia.find(a=>a.fecha===_jt_hoy);
  const lineas=_jt_emps.filter(e=>_jt_estados[e.id]).map(e=>({
    empleadoId:e.id, estado:_jt_estados[e.id].estado, motivo:_jt_estados[e.id].motivo||''
  }));
  if(!reg){reg={id:'AS'+uid(),fecha:_jt_hoy,cerrado:false,registradoPor:_jt_nombre||getRoleName(currentRole),lineas};STATE.asistencia.push(reg);}
  else reg.lineas=lineas;
  saveState();
}

function iniciarAutoCloseJT(hoy){
  if(_jt_autoCloseTimer) clearInterval(_jt_autoCloseTimer);
  _jt_autoCloseTimer=setInterval(()=>{
    const now=new Date();
    if(now.getHours()>=20 && _jt_hoy===hoy && !_jt_readonly){
      clearInterval(_jt_autoCloseTimer); _jt_autoCloseTimer=null;
      autoGuardarTurnoJT();
      const reg=STATE.asistencia.find(a=>a.fecha===_jt_hoy);
      if(reg&&!reg.cerrado){
        const P=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='P').length;
        const D=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='D').length;
        reg.cerrado=true; reg.horaCierre='20:00'; reg.cierreAutomatico=true;
        _jt_readonly=true; saveState();
        pushToSheets('asistencia','insertar',reg).then(()=>{
          showToast(DB_ONLINE?'✅ Turno cerrado automáticamente (20:00) — guardado en la nube':'⚠️ Turno cerrado (20:00) — guardado solo localmente',DB_ONLINE?'success':'warning',6000);
        });
        addAuditLog('ASISTENCIA','Turno '+hoy+' cerrado automáticamente a las 20:00. P:'+P+' D:'+D);
        const tb=document.getElementById('topbar-actions');
        if(tb) tb.innerHTML='<span class="badge badge-approved" style="padding:8px 16px;font-size:13px;">✅ Turno cerrado</span>';
        const c=document.getElementById('app-content');
        if(c&&currentRole==='jefe_turno') renderListaJT(c);
      }
    }
  },30000); // revisa cada 30 segundos
}

function cerrarTurnoJT(){
  autoGuardarTurnoJT();
  const reg=STATE.asistencia.find(a=>a.fecha===_jt_hoy);
  if(!reg){
    const newReg={id:'AS'+uid(),fecha:_jt_hoy,cerrado:false,registradoPor:_jt_nombre||getRoleName(currentRole),lineas:[]};
    STATE.asistencia.push(newReg); saveState(); return cerrarTurnoJT();
  }
  const P=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='P').length;
  const D=_jt_emps.filter(e=>(_jt_estados[e.id]||{}).estado==='D').length;
  const sinAsignar=_jt_emps.length-P-D;
  confirmAction('¿Confirmar cierre del turno? <b>'+P+' trabajan</b>, <b>'+D+' descansan</b>, '+sinAsignar+' sin marcar (Contabilidad gestionará). <b>No se podrá modificar.</b>',async function(){
    if(_jt_autoCloseTimer){clearInterval(_jt_autoCloseTimer);_jt_autoCloseTimer=null;}
    reg.cerrado=true;
    reg.horaCierre=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    _jt_readonly=true; saveState();
    showToast('Guardando turno en la nube...','info',2000);
    await pushToSheets('asistencia','insertar',reg);
    addAuditLog('ASISTENCIA','Turno '+_jt_hoy+' cerrado. P:'+P+' D:'+D+' Sin:'+sinAsignar);
    showToast(DB_ONLINE?'✅ Turno cerrado y guardado en la nube':'⚠️ Turno cerrado — guardado solo localmente (sin conexión)',DB_ONLINE?'success':'warning',5000);
    document.getElementById('topbar-actions').innerHTML='<span class="badge badge-approved" style="padding:8px 16px;font-size:13px;">✅ Turno cerrado</span>';
    const c=document.getElementById('app-content');
    if(c) renderListaJT(c);
  });
}

function renderAsistencia(container){
  const hoy = new Date().toISOString().slice(0,10);
  const todosActivos = getEmpleadosActivos();
  const activos = currentRole === 'jefe_turno'
    ? todosActivos.filter(e => !DEPTS_EXCLUIDOS_JEFE_TURNO.includes(e.departamento))
    : todosActivos;
  const registroHoy = STATE.asistencia.find(a => a.fecha === hoy);
  const yaGuardado = registroHoy && registroHoy.cerrado;

  document.getElementById('topbar-actions').innerHTML = yaGuardado
    ? '<span class="badge badge-approved" style="padding:8px 16px;font-size:13px;">✅ Turno cerrado</span>'
    : '<button class="btn btn-success" onclick="cerrarTurno(\''+hoy+'\')">🔒 Cerrar Turno</button>';

  // Interfaz de tarjetas para jefe de turno
  if(currentRole === 'jefe_turno'){
    document.getElementById('topbar-actions').innerHTML = yaGuardado
      ? '<span class="badge badge-approved" style="padding:8px 16px;font-size:13px;">✅ Turno cerrado</span>'
      : '';
    if(!yaGuardado && (!_jt_nombre || _jt_hoy !== hoy)){
      renderSeleccionJefeTurno(container, hoy);
    } else {
      renderAsistenciaJefeTurno(container, hoy, activos, registroHoy, yaGuardado);
    }
    return;
  }

  let estadosGuardados = {};
  let motivos = {};
  if(registroHoy && registroHoy.lineas){
    registroHoy.lineas.forEach(l => {
      estadosGuardados[l.empleadoId] = l.estado;
      motivos[l.empleadoId] = l.motivo||'';
    });

  const estadoConfig = {
    'P': {label:'Presente', color:'#2D6A4F', bg:'#D8F3DC', icon:'✅'},
    'A': {label:'Ausente',  color:'#8B1A1A', bg:'#FDDEDE', icon:'❌'},
    'T': {label:'Tardanza', color:'#B5642A', bg:'#FDEBD0', icon:'🕐'},
  };

  const fechaFmt = new Date(hoy+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const estadoBadge = yaGuardado

    : '<span class="badge" style="background:rgba(201,168,76,0.3);color:var(--gold-light);">En curso</span>';

  let rowsHtml = '';
  activos.forEach(function(e, i){
    const estadoActual = estadosGuardados[e.id] || 'P';
    const motivoActual = (motivos[e.id] || '').replace(/"/g,'&quot;');
    let btnsHtml = '';
    ['P','A','T'].forEach(function(est){
      const cfg = estadoConfig[est];
      const isActive = estadoActual === est;
      const borderCol = isActive ? cfg.color : 'var(--border)';
      const bgCol = isActive ? cfg.bg : 'var(--white)';
      const opacityVal = (yaGuardado && !isActive) ? '0.4' : '1';
      const cursorVal = yaGuardado ? 'not-allowed' : 'pointer';
      const onclickAttr = yaGuardado ? '' : 'onclick="setEstado(this,\''+e.id+'\')"';
      btnsHtml += '<button '+onclickAttr+' id="btn-'+e.id+'-'+est+'"'
        +' style="width:40px;height:40px;border-radius:8px;border:2px solid '+borderCol+';'
        +'background:'+bgCol+';font-size:18px;cursor:'+cursorVal+';opacity:'+opacityVal+';transition:all 0.15s;"'
        +' data-estado="'+est+'" data-emp="'+e.id+'" title="'+cfg.label+'">'+cfg.icon+'</button>';
    });

    const rowBg = i%2===0 ? 'var(--white)' : 'var(--cream)';
    const motPlaceholder = estadoActual==='P' ? '—' : 'Motivo...';
    const motReadonly = yaGuardado ? 'readonly' : '';
    const motStyle = yaGuardado ? 'background:var(--cream);color:var(--text-light);' : '';

    rowsHtml += '<div id="row-'+e.id+'" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border-light);background:'+rowBg+';">'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<div><div style="font-weight:700;font-size:14px;color:var(--text-dark);">'+e.nombres+' '+e.apellidos+'</div>'
      +'<div style="font-size:11px;color:var(--text-light);">'+e.plaza+' · '+e.departamento+'</div></div></div>'
      +'<div style="display:flex;justify-content:center;gap:6px;">'+btnsHtml+'</div>'
      +'<div style="display:flex;justify-content:center;">'
      +'<input type="text" id="motivo-'+e.id+'" value="'+motivoActual+'" placeholder="'+motPlaceholder+'"'
      +' style="width:100%;max-width:180px;padding:6px 10px;font-size:13px;border:1px solid var(--border);border-radius:6px;'+motStyle+'"'
      +' '+motReadonly+' oninput="autoGuardarLinea(\''+e.id+'\',\''+hoy+'\')">'

  container.innerHTML =
    '<div class="card" style="margin-bottom:16px;">'
    +'<div class="card-header" style="background:var(--burgundy);color:var(--gold-light);">'
    +'<h3 style="color:var(--gold-light);">📋 Turno del día — '+fechaFmt+'</h3>'
    +estadoBadge+'</div>'
    +'<div class="card-body" style="padding:0;">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--cream);padding:10px 20px;border-bottom:1px solid var(--border-light);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);">'
    +'<span>Empleado</span><span style="text-align:center;">Estado</span><span style="text-align:center;">Motivo</span></div>'

    +'<div class="stat-card burgundy"><span class="stat-icon">❌</span><div class="stat-value" id="cnt-A">—</div><div class="stat-label">Ausentes</div></div>'
    +'<div class="stat-card warning"><span class="stat-icon">🕐</span><div class="stat-value" id="cnt-T">—</div><div class="stat-label">Tardanzas</div></div>'
    +'</div>';

  actualizarContadores(hoy);
  if(!registroHoy) autoGuardarTurno(hoy);
}

function setEstado(btn, empId){
  const hoy = new Date().toISOString().slice(0,10);
  const estado = btn.dataset.estado;
  const estadoConfig = {
    'P': {color:'#2D6A4F', bg:'#D8F3DC'},
    'A': {color:'#8B1A1A', bg:'#FDDEDE'},
    'T': {color:'#B5642A', bg:'#FDEBD0'},
  };
  ['P','A','T'].forEach(function(est){
    const b = document.getElementById('btn-'+empId+'-'+est);
    if(b){
      b.style.borderColor = 'var(--border)';
      b.style.background = 'var(--white)';
      b.style.opacity = '1';
    }
  });
  btn.style.borderColor = estadoConfig[estado].color;
  btn.style.background = estadoConfig[estado].bg;
  const motivoInput = document.getElementById('motivo-'+empId);
  if(motivoInput) motivoInput.placeholder = estado==='P' ? '—' : 'Motivo...';
  autoGuardarLinea(empId, hoy);
  actualizarContadores(hoy);
}

function getEstadoActual(empId){
  const btns = ['P','A','T'];
  for(var i=0; i<btns.length; i++){
    const est = btns[i];
    const b = document.getElementById('btn-'+empId+'-'+est);
    if(b && b.style.borderColor !== 'var(--border)' && b.style.background !== 'var(--white)') return est;
  }
  return 'P';
}

function getActivosParaTurno(){
  const todos = getEmpleadosActivos();
  return currentRole === 'jefe_turno'
    ? todos.filter(e => !DEPTS_EXCLUIDOS_JEFE_TURNO.includes(e.departamento))
    : todos;
}

function actualizarContadores(hoy){
  const activos = getActivosParaTurno();
  var cP=0, cA=0, cT=0;
  activos.forEach(function(e){
    const est = getEstadoActual(e.id);
    if(est==='P') cP++;
    else if(est==='A') cA++;
    else if(est==='T') cT++;
  });
  const eP=document.getElementById('cnt-P');
  const eA=document.getElementById('cnt-A');
  const eT=document.getElementById('cnt-T');
  if(eP) eP.textContent=cP;
  if(eA) eA.textContent=cA;
  if(eT) eT.textContent=cT;
}

function autoGuardarLinea(empId, hoy){
  autoGuardarTurno(hoy);
}

function autoGuardarTurno(hoy){
  const activos = getActivosParaTurno();
  let registro = STATE.asistencia.find(function(a){ return a.fecha === hoy; });
  const lineas = activos.map(function(e){
    const motivoEl = document.getElementById('motivo-'+e.id);
    return {
      empleadoId: e.id,
      estado: getEstadoActual(e.id),
      motivo: motivoEl ? motivoEl.value.trim() : ''
    };
  });
  if(!registro){
    registro = {id:'AS'+uid(), fecha:hoy, cerrado:false, registradoPor:getRoleName(currentRole), lineas:lineas};
    STATE.asistencia.push(registro);
  } else {
    registro.lineas = lineas;
  }
  saveState();
}

function cerrarTurno(hoy){
  const activos = getActivosParaTurno();
  const ausentes = activos.filter(function(e){ return getEstadoActual(e.id) === 'A'; }).length;
  const tardanzas = activos.filter(function(e){ return getEstadoActual(e.id) === 'T'; }).length;
  const msg = '¿Confirmar cierre del turno? '+ausentes+' ausente(s), '+tardanzas+' tardanza(s). <b>No se podrá modificar.</b>';
  confirmAction(msg, async function(){
    autoGuardarTurno(hoy);
    const registro = STATE.asistencia.find(function(a){ return a.fecha === hoy; });
    if(registro){
      registro.cerrado = true;
      registro.horaCierre = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      saveState();
      showToast('Guardando turno en la nube...','info',2000);
      await pushToSheets('asistencia','insertar', registro);
      const presentes = activos.length - ausentes - tardanzas;
      addAuditLog('ASISTENCIA','Turno '+hoy+' cerrado. Presentes:'+presentes+' Ausentes:'+ausentes+' Tardanzas:'+tardanzas);
      showToast(DB_ONLINE?'✅ Turno cerrado y guardado en la nube':'⚠️ Turno cerrado — guardado solo localmente (sin conexión)',DB_ONLINE?'success':'warning',5000);
      renderAsistencia(document.getElementById('app-content'));
    }
  });
}

async function subirAsistenciaLocal(){
  const registros=STATE.asistencia.filter(r=>r.cerrado);
  if(!registros.length){showToast('No hay registros cerrados para subir','info');return;}
  showToast('Diagnosticando conexión con Supabase...','info',2000);
  // Test: read one row to verify auth+connectivity
  try{
    await sbFetch('GET','asistencia',null,'select=id&limit=1');
  }catch(connErr){
    showToast('❌ Sin conexión con Supabase: '+String(connErr.message||connErr).slice(0,120),'error',15000);
    return;
  }
  // Test: try inserting the first record directly to capture real column errors
  showToast('Subiendo '+registros.length+' registro(s)...','info',2000);
  let ok=0,fail=0,lastErr='';
  for(const r of registros){
    try{
      const res=await fetch(SUPABASE_URL+'/rest/v1/asistencia?on_conflict=id',{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
                 'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify([{id:r.id,fecha:r.fecha,cerrado:!!r.cerrado}])
      });
      if(!res.ok){const t=await res.text();throw new Error('HTTP '+res.status+': '+t.slice(0,200));}
      ok++;
    }catch(e){fail++;lastErr=String(e.message||e).slice(0,200);}
  }
  if(ok>0){DB_ONLINE=true;updateSyncBadge(true);saveState();}
  const msg=fail===0
    ?ok+' registro(s) subidos ✅'
    :(ok>0?ok+' subidos, ':'')+fail+' fallaron — ERROR: '+lastErr;
  showToast(msg,fail===0?'success':'error',15000);
  if(ok>0) renderHistorialAsistencia(document.getElementById('app-content'));
}
function renderHistorialAsistencia(container){
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn btn-primary btn-sm" onclick="subirAsistenciaLocal()" title="Sube registros cerrados del dispositivo actual a la nube">☁️ Subir local</button> '+
    '<button class="btn btn-secondary btn-sm" onclick="exportAsistencia()">⬇️ Excel</button>';

  // Siempre sincronizar asistencia desde Supabase al abrir el historial
  (async()=>{
    try{
      const dataAsist=await sbLeer('asistencia');
      if(Array.isArray(dataAsist)&&dataAsist.length>0){
        const byFecha={};
        dataAsist.forEach(r=>{
          r=normalizeAsistencia(r);
          if(!byFecha[r.fecha]||r.cerrado)byFecha[r.fecha]=r;
        });
        STATE.asistencia=Object.values(byFecha);
        saveState();
        // Re-renderizar con datos frescos
        _renderHistorialAsistenciaTabla(container);
      }
    }catch(e){}
  })();

  _renderHistorialAsistenciaTabla(container);
}

function _renderHistorialAsistenciaTabla(container){
  const historial = STATE.asistencia.slice().sort((a,b)=>b.fecha.localeCompare(a.fecha));

  if(!historial.length){
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><h4>Sin registros aún</h4><p class="text-muted">Los turnos cerrados aparecerán aquí.</p></div>';
    return;
  }

  let rowsHtml = '';
  historial.forEach(function(reg){
    const P = (reg.lineas||[]).filter(function(l){return l.estado==='P';}).length;
    const D = (reg.lineas||[]).filter(function(l){return l.estado==='D';}).length;
    const fechaFmt = new Date(reg.fecha+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    const estadoBadge = reg.cerrado
      ? '<span class="badge badge-approved">Cerrado</span>'
      : '<span class="badge badge-pending">En curso</span>';
    rowsHtml += '<tr>'
      +'<td><b>'+fechaFmt+'</b></td>'
      +'<td>'+estadoBadge+'</td>'
      +'<td><span style="color:#2D6A4F;font-weight:700;">✅ '+P+'</span></td>'
      +'<td><span style="color:#1D4ED8;font-weight:700;">💤 '+D+'</span></td>'
      +'<td>'+(reg.registradoPor||'—')+'</td>'
      +'<td>'+(reg.horaCierre||'—')+'</td>'
      +'<td><button class="btn btn-secondary btn-xs" onclick="verDetalleAsistencia(\''+reg.id+'\')">👁️ Ver</button></td>'
      +'</tr>';
  });

  container.innerHTML =
    '<div class="card">'
    +'<div class="card-header" style="display:flex;justify-content:space-between;align-items:center"><h3>📅 Historial de Asistencia</h3>'
    +'<span id="hist-sync-status" style="font-size:12px;color:var(--text-mid)">🔄 Actualizando...</span></div>'
    +'<div class="table-wrap"><table>'
    +'<thead><tr><th>Fecha</th><th>Estado</th><th>Presentes</th><th>Descansan</th><th>Registrado por</th><th>Cierre</th><th>Ver</th></tr></thead>'
    +'<tbody>'+rowsHtml+'</tbody>'
    +'</table></div></div>';
  setTimeout(()=>{const s=document.getElementById('hist-sync-status');if(s)s.textContent='';},3000);
}

function verDetalleAsistencia(regId){
  const reg = STATE.asistencia.find(function(a){return a.id===regId;});
  if(!reg) return;
  const fechaFmt = new Date(reg.fecha+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const estadoIcon = {P:'✅',D:'💤',A:'❌',T:'🕐'};
  const estadoLabel = {P:'Presente',D:'Descansando',A:'Ausente',T:'Tardanza'};
  const estadoColor = {P:'var(--success)',D:'#1D4ED8',A:'var(--danger)',T:'var(--warning)'};
  const lineasVisibles = (reg.lineas||[]).filter(function(l){
    if(currentRole !== 'jefe_turno') return true;
    const emp = STATE.empleados.find(function(e){return e.id===l.empleadoId;});
    return emp && !DEPTS_EXCLUIDOS_JEFE_TURNO.includes(emp.departamento);
  });
  const P = lineasVisibles.filter(function(l){return l.estado==='P';}).length;
  const D = lineasVisibles.filter(function(l){return l.estado==='D';}).length;

  let rowsHtml = '';
  const lineasFiltradas = (reg.lineas||[]).filter(function(l){
    if(currentRole !== 'jefe_turno') return true;
    const emp = STATE.empleados.find(function(e){return e.id===l.empleadoId;});
    return emp && !DEPTS_EXCLUIDOS_JEFE_TURNO.includes(emp.departamento);
  });
  lineasFiltradas.forEach(function(l){
    const emp = STATE.empleados.find(function(e){return e.id===l.empleadoId;});
    rowsHtml += '<tr>'
      +'<td><b>'+(emp ? emp.nombres+' '+emp.apellidos : '—')+'</b></td>'
      +'<td>'+(emp ? emp.departamento : '—')+'</td>'
      +'<td><span style="color:'+estadoColor[l.estado]+';font-weight:700;">'+estadoIcon[l.estado]+' '+estadoLabel[l.estado]+'</span></td>'
      +'<td>'+(l.motivo||'—')+'</td>'
      +'</tr>';
  });

  const body =
    '<div style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;">'
    +'<div class="badge badge-approved" style="padding:8px 16px;font-size:13px;">'+P+' Presentes</div>'
    +'<div class="badge" style="padding:8px 16px;font-size:13px;background:#DBEAFE;color:#1D4ED8;">'+D+' Descansan</div>'
    +'</div>'
    +'<div class="table-wrap"><table>'
    +'<thead><tr><th>Empleado</th><th>Departamento</th><th>Estado</th><th>Motivo</th></tr></thead>'
    +'<tbody>'+rowsHtml+'</tbody>'
    +'</table></div>';

  openModal('📋 Asistencia: '+fechaFmt, body,
    '<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>'
    +'<button class="btn btn-gold btn-sm" onclick="exportDetalleAsistencia(\''+regId+'\')">⬇️ Excel</button>','lg');
}

function exportAsistencia(){
  const rows = [];
  STATE.asistencia.forEach(reg => {
    const fecha = new Date(reg.fecha+'T12:00:00').toLocaleDateString('es-ES');
    (reg.lineas||[]).forEach(l => {
      const emp = STATE.empleados.find(e => e.id === l.empleadoId);
      rows.push({
        Fecha: fecha,
        Empleado: emp ? `${emp.nombres} ${emp.apellidos}` : '—',
        Departamento: emp ? emp.departamento : '—',
        Plaza: emp ? emp.plaza : '—',
        Estado: l.estado==='P'?'Presente':l.estado==='D'?'Descansando':l.estado==='A'?'Ausente':'Tardanza',
        Motivo: l.motivo||'—',
        'Registrado por': reg.registradoPor||'—',
        'Turno cerrado': reg.cerrado?'Sí':'No'
      });
    });
  });
  if(!rows.length){showToast('No hay datos de asistencia','warning');return;}
  exportToExcel(rows,'Asistencia_LaCatedral_'+new Date().toISOString().slice(0,10));
  showToast('Exportado a Excel','success');
}

function exportDetalleAsistencia(regId){

function getAusenciasDelPeriodo(empId, periodo){
  // Contar días ausentes registrados en el período dado (formato YYYY-MM)
  return STATE.asistencia.filter(reg => {
    if(!reg.cerrado) return false;
    if(!reg.fecha.startsWith(periodo)) return false;
    const linea = (reg.lineas||[]).find(l => l.empleadoId === empId);
    return linea && linea.estado === 'A';
  }).length;
}
function getTardanzasDelPeriodo(empId, periodo){
  return STATE.asistencia.filter(reg => {
    if(!reg.cerrado) return false;
    if(!reg.fecha.startsWith(periodo)) return false;
    const linea = (reg.lineas||[]).find(l => l.empleadoId === empId);
    return linea && linea.estado === 'T';
  }).length;
}

// Días marcados como Presente en asistencia para un periodo (YYYY-MM)
function getDiasPresentesMes(empId, periodo){
  return STATE.asistencia.filter(reg=>{
    if(!reg.cerrado) return false;
    if(!reg.fecha.startsWith(periodo)) return false;
    const linea=(reg.lineas||[]).find(l=>l.empleadoId===empId);

  }).length;
}

// Días calendario del mes
function getDiasCalendarioMes(ano,mes){

}

// IIP Cuba — Impuesto sobre los Ingresos Personales — escala progresiva mensual
function calcularIIP(salario){
  if(!salario||salario<=0) return 0;
  let iip=0;
  if(salario>3260)  iip+=Math.min(salario-3260,  6250)*0.03;   // IP3: 3,260–9,510   (máx 187.50)
  if(salario>9510)  iip+=Math.min(salario-9510,  5490)*0.05;   // IP5: 9,510–15,000  (máx 274.50)
  if(salario>15000) iip+=Math.min(salario-15000, 5000)*0.075;  // R1:  15,000–20,000 (máx 375.00)
  if(salario>20000) iip+=Math.min(salario-20000, 5000)*0.10;   // R2:  20,000–25,000 (máx 500.00)
  if(salario>25000) iip+=Math.min(salario-25000, 5000)*0.15;   // R3:  25,000–30,000 (máx 750.00)
  if(salario>30000) iip+=(salario-30000)*0.20;                  // R4:  >30,000 (variable)
  return Math.round(iip*100)/100;
}
// AES — Contribución Especial de Seguridad Social del Trabajador (progresiva)
// Socio (tipoContrato='Socio') no paga AES — cotiza por cuenta propia
function calcularAES(salario,socio){
  if(socio||!salario||salario<=0) return 0;
  if(salario<=15000) return Math.round(salario*0.05*100)/100;
  return Math.round((750+(salario-15000)*0.10)*100)/100;
}
// Desglose IIP por tramo — para cuadro resumen del contador
function calcularIIPDetalle(salario){
  const tramos=[
    {label:'IP3',desde:3260, hasta:9510, rate:0.03},
    {label:'IP5',desde:9510, hasta:15000,rate:0.05},
    {label:'R1', desde:15000,hasta:20000,rate:0.075},
    {label:'R2', desde:20000,hasta:25000,rate:0.10},
    {label:'R3', desde:25000,hasta:30000,rate:0.15},
    {label:'R4', desde:30000,hasta:null, rate:0.20},
  ];
  return tramos.reduce((acc,t)=>{
    if(salario<=t.desde) return acc;
    const base=t.hasta?Math.min(salario-t.desde,t.hasta-t.desde):salario-t.desde;
    const imp=Math.round(base*t.rate*100)/100;
    if(imp>0) acc.push({label:t.label,importe:imp});
    return acc;
  },[]);
}
// Identifica si el empleado es socio (no paga AES)
function esEmpleadoSocio(e){ return (e.tipoContrato||'')==='Socio'; }

// Departamento de administración (no registrado por jefe de turno → 100% asistencia)
function esDeptoAdmin(dept){
  return DEPTS_EXCLUIDOS_JEFE_TURNO.includes(dept);
}

  if(!STATE.preformas) STATE.preformas = {};

    +'<div class="form-grid">'
    +'<div class="form-group full">'
    +'<label class="field-label required">Cláusula VI — Disciplina de Trabajo</label>'
    +'<div style="font-size:11px;color:var(--text-light);margin-bottom:4px;">Use HTML básico: &lt;ul&gt;&lt;li&gt;...&lt;/li&gt;&lt;/ul&gt; para listas</div>'
    +'<textarea id="pf-disciplina" style="min-height:160px;font-family:monospace;font-size:12px;">'+actual.disciplina.replace(/</g,'<').replace(/>/g,'>')+'</textarea>'
    +'</div>'

    +'<button class="btn btn-danger btn-sm" onclick="restaurarPreformaDefault(\''+grupo+'\')">🔄 Restaurar Original</button>'
    +'<button class="btn btn-primary" onclick="guardarPreforma(\''+grupo+'\')">💾 Guardar Versión</button>',
    'lg'
  );

  // Decode HTML entities in textareas after modal renders
  setTimeout(function() {
    var d = document.getElementById('pf-disciplina');
    var c = document.getElementById('pf-caracteristicas');
    if(d) d.value = d.value.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
    if(c) c.value = c.value.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
  }, 100);
}

function guardarPreforma(grupo) {
  const disciplina = document.getElementById('pf-disciplina').value.trim();
  const caracteristicas = document.getElementById('pf-caracteristicas').value.trim();

  if(!disciplina || !caracteristicas) {
    showToast('Complete ambas cláusulas','warning');
    return;
  }

  if(!STATE.preformas) STATE.preformas = {};
  if(!STATE.historialPreformas) STATE.historialPreformas = {};
  if(!STATE.historialPreformas[grupo]) STATE.historialPreformas[grupo] = [];

  // Guardar versión actual en historial antes de sobreescribir
  const versionActual = STATE.preformas[grupo];
  if(versionActual) {
    STATE.historialPreformas[grupo].push({
      fecha: new Date().toLocaleString('es-ES'),
      usuario: getRoleName(currentRole),
      disciplina: versionActual.disciplina,
      caracteristicas: versionActual.caracteristicas
    });
    // Mantener máximo 10 versiones
    if(STATE.historialPreformas[grupo].length > 10) {
      STATE.historialPreformas[grupo].shift();
    }
  }

  STATE.preformas[grupo] = { disciplina, caracteristicas };
  saveState();
  pushToSheets('preformas','actualizar',{id:grupo,grupo,disciplina,caracteristicas},grupo);
  addAuditLog('PREFORMA', 'Preforma del grupo '+grupo+' actualizada por '+getRoleName(currentRole));
  showToast('Preforma guardada ✅ — Todos los contratos de este grupo usarán esta versión','success', 5000);
  closeModal();
}

function restaurarVersionPreforma(grupo, idx) {
  if(!STATE.historialPreformas || !STATE.historialPreformas[grupo]) return;
  const version = STATE.historialPreformas[grupo][idx];
  if(!version) return;
  confirmAction('¿Restaurar la versión del '+version.fecha+'? La versión actual se perderá.', function() {
    STATE.preformas[grupo] = { disciplina: version.disciplina, caracteristicas: version.caracteristicas };
    STATE.historialPreformas[grupo].splice(idx, 1);
    saveState();
    showToast('Versión restaurada ✅','success');
    closeModal();
  });
}

function restaurarPreformaDefault(grupo) {
  confirmAction('¿Restaurar la preforma original del grupo '+grupo+'? Se perderán todas las ediciones.', function() {
    if(!STATE.preformas) STATE.preformas = {};
    if(STATE.preformas[grupo]) {
      // Save current to historial
      if(!STATE.historialPreformas) STATE.historialPreformas = {};
      if(!STATE.historialPreformas[grupo]) STATE.historialPreformas[grupo] = [];
      STATE.historialPreformas[grupo].push({
        fecha: new Date().toLocaleString('es-ES'),
        usuario: getRoleName(currentRole)+' (antes de restaurar)',
        disciplina: STATE.preformas[grupo].disciplina,
        caracteristicas: STATE.preformas[grupo].caracteristicas
      });
    }
    delete STATE.preformas[grupo];
    saveState();
    showToast('Preforma restaurada a versión original','info');
    closeModal();
  });
}

    +'<div style="display:flex;gap:12px;align-items:flex-start;">'
    +'<span style="font-size:28px;">📋</span>'
    +'<div><b>Preformas de Contratos de Trabajo</b>'
    +'<p class="text-muted" style="margin:4px 0 0;">Las preformas son las plantillas base que se usan para generar automáticamente los contratos de cada empleado según su plaza y departamento. '
    +'Jurídico puede editar las cláusulas VI y VIII de cada grupo. Cada edición queda registrada con fecha, usuario y permite restaurar versiones anteriores. '
    +'El resto del contrato (partes, jornada, salario, SST con Resolución 39/2007) se genera automáticamente con los datos del empleado.</p>'
    +'</div></div></div></div>'
    + cardsHtml;
}

  const old=localStorage.getItem('lacatedral_v1');
  if(old&&!localStorage.getItem(STORAGE_KEY)){
    try{const parsed=JSON.parse(old);STATE=parsed;saveState();showToast('Datos migrados de versión anterior','info',5000)}catch(e){}
  }
  document.getElementById('p0').focus();
  tempLicencias=[];tempFotoCarnet=null;
  // Verificar conexión al cargar
  apiCall({accion:'ping'}).then(()=>{DB_ONLINE=true;updateSyncBadge(true);}).catch(()=>{DB_ONLINE=false;updateSyncBadge(false);});
  // Registrar Service Worker para PWA instalable

// PLANTILLA DE PERSONAL
// ══════════════════════════════════════════════════
function renderPlantilla(container){
  const showEco=currentRole==='admin'||currentRole==='contabilidad';
  const showCuenta=currentRole==='admin'||currentRole==='contabilidad';
  const depts=[...new Set([...Object.keys(PLAZAS),...Object.values(STATE.plazas||{}).map(p=>p.departamento)])].filter(Boolean).sort();

  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn btn-secondary btn-sm" onclick="imprimirPlantilla()">🖨️ Imprimir / PDF</button>`;

  container.innerHTML=`<div class="card">
    <div class="plantilla-controls">
      <div class="filter-group" style="flex:1"><input type="text" class="search-input" id="pl-q" placeholder="🔍 Buscar empleado..." oninput="filtrarPlantilla()"></div>
      <div class="filter-group"><label>Departamento</label>
        <select id="pl-dept" onchange="filtrarPlantilla()">
          <option value="">Todos</option>${depts.map(d=>`<option>${d}</option>`).join('')}
        </select></div>
      <div class="filter-group"><label>Estado</label>
        <select id="pl-estado" onchange="filtrarPlantilla()">
          <option value="activo">Activos</option>
          <option value="todos">Todos</option>
          <option value="baja">Bajas</option>
        </select></div>
    </div>
    <div class="plantilla-table-wrap" id="plantilla-wrap">
      ${_buildPlantillaTable(STATE.empleados.filter(e=>e.activo),showEco,showCuenta)}
    </div>
  </div>`;
}

const JERARQUIA_PLAZA={
  // 1 — Alta dirección
  'Socio Único':1,'Presidente':1,'Director General':1,'Gerente general':1,
  // 2 — Dirección por áreas
  'Gerente de RRHH':2,'Gerente jurídico':2,'Gerente financiero':2,
  'Gerente de Marketing':2,'Gerente Juridico y RRHH':2,'Gerente de logística':2,
  // 3 — Gerencia media / jefes de turno
  'Jefe de turno':3,'Jefe de almacén':3,'Jefe de carnicería':3,
  'Chef ejecutivo':3,'Jefe de partida':3,
  // 4 — Supervisores / coordinadores / técnicos
  'Cajero/a':4,'Salsero/Parrillero':4,'Lunchero':4,'Legumier':4,
  'Repostero':4,'Inventarista':4,'Comercial':4,'Custodio':4,
  'Carnicero':4,'Dependiente':4,'Chofer':4,
  // 5 — Personal operativo
};
function _jerarquiaPlaza(plaza){
  if(!plaza)return 5;
  const k=Object.keys(JERARQUIA_PLAZA).find(p=>plaza.toLowerCase()===p.toLowerCase());
  return k?JERARQUIA_PLAZA[k]:5;
}
function _buildPlantillaTable(emps,showEco,showCuenta){
  if(!emps.length)return '<div class="empty-state"><div class="empty-icon">👥</div><h4>Sin empleados</h4></div>';
  const sorted=emps.slice().sort((a,b)=>{
    const jA=_jerarquiaPlaza(a.plaza), jB=_jerarquiaPlaza(b.plaza);
    if(jA!==jB)return jA-jB;
    return (a.apellidos||'').localeCompare(b.apellidos||'');
  });
  return `<table class="plantilla-table" id="plantilla-table">
    <thead>
      <tr class="pt-group">
        <th colspan="3" class="pt-id">🪪 Identificación</th>
        <th colspan="4" class="pt-lab">📋 Relación Laboral</th>
        ${showEco?'<th colspan="1" class="pt-eco">💰 Datos Económicos</th>':''}
        ${showCuenta?'<th colspan="2" class="pt-con">🏦 Contacto y Pago</th>':''}
        <th colspan="1" class="pt-con">📞</th>
        <th colspan="2" class="pt-ges">🏢 Gestión Interna</th>
      </tr>
      <tr class="pt-cols">
        <th class="pt-id-cell">Apellidos y Nombre</th>
        <th class="pt-id-cell">Expediente</th>
        <th class="pt-id-cell">F. Nacimiento</th>
        <th class="pt-lab-cell">F. Antigüedad</th>
        <th class="pt-lab-cell">Nivel</th>
        <th class="pt-lab-cell">Puesto / Plaza</th>
        <th class="pt-lab-cell">Tipo Contrato</th>
        <th class="pt-lab-cell">Jornada</th>
        ${showEco?'<th class="pt-eco-cell">Salario Base</th>':''}
        ${showCuenta?'<th class="pt-con-cell">Banco</th><th class="pt-con-cell">N° Cuenta</th>':''}
        <th class="pt-con-cell">Email / Teléfono</th>
        <th class="pt-ges-cell">Departamento</th>
      </tr>
    </thead>
    <tbody>
      ${sorted.map(e=>`<tr data-activo="${e.activo?'1':'0'}" data-dept="${e.departamento||''}" data-nombre="${(e.apellidos+' '+e.nombres).toLowerCase()}">
        <td class="pt-id-cell" style="font-weight:600">${e.apellidos||''}, ${e.nombres||''}</td>
        <td class="pt-id-cell"><code style="font-size:11px">${e.carnet||'—'}</code></td>
        <td class="pt-id-cell">${fmtDate(e.fechaNacimiento)}</td>
        <td class="pt-lab-cell">${fmtDate(e.fechaAlta)}</td>
        <td class="pt-lab-cell" style="font-size:10px;color:#888">${['','Alta Dirección','Dirección','Gerencia','Supervisión','Operativo'][_jerarquiaPlaza(e.plaza)]}</td>
        <td class="pt-lab-cell">${e.plaza||'—'}</td>
        <td class="pt-lab-cell">${e.tipoContrato||'—'}</td>
        <td class="pt-lab-cell">${getLabelJornada(e.jornada)||e.jornada||'—'}</td>
        ${showEco?`<td class="pt-eco-cell" style="text-align:right;font-weight:600">${(()=>{const sal=e.salarioBase||(getPlaza(e.departamento,e.plaza)||{}).salarioBase;return sal?fmtMoney(sal):'—';})()}</td>`:''}
        ${showCuenta?`<td class="pt-con-cell">${e.banco||'—'}</td><td class="pt-con-cell"><span style="font-family:monospace;font-size:11px">${e.cuenta?e.cuenta.replace(/(.{4})/g,'$1 ').trim():'—'}</span></td>`:''}
        <td class="pt-con-cell"><div style="font-size:11px">${e.telefono||'—'}</div></td>
        <td class="pt-ges-cell">${e.departamento||'—'}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function filtrarPlantilla(){
  const q=(document.getElementById('pl-q')?.value||'').toLowerCase();
  const dept=document.getElementById('pl-dept')?.value||'';
  const estado=document.getElementById('pl-estado')?.value||'activo';
  const showEco=currentRole==='admin'||currentRole==='contabilidad';
  const showCuenta=currentRole==='admin'||currentRole==='contabilidad';
  let emps=STATE.empleados;
  if(estado==='activo')emps=emps.filter(e=>e.activo);
  else if(estado==='baja')emps=emps.filter(e=>!e.activo);
  if(dept)emps=emps.filter(e=>e.departamento===dept);
  if(q)emps=emps.filter(e=>((e.apellidos||'')+(e.nombres||'')+(e.carnet||'')).toLowerCase().includes(q));
  document.getElementById('plantilla-wrap').innerHTML=_buildPlantillaTable(emps,showEco,showCuenta);
}

function imprimirPlantilla(){
  const showEco=currentRole==='admin'||currentRole==='contabilidad';
  const showCuenta=currentRole==='admin'||currentRole==='contabilidad';
  const dept=document.getElementById('pl-dept')?.value||'';
  const estado=document.getElementById('pl-estado')?.value||'activo';
  let emps=STATE.empleados;
  if(estado==='activo')emps=emps.filter(e=>e.activo);
  else if(estado==='baja')emps=emps.filter(e=>!e.activo);
  if(dept)emps=emps.filter(e=>e.departamento===dept);
  const titulo=dept?`Plantilla — ${dept}`:'Plantilla de Personal';
  const fecha=new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'});
  const tableHtml=_buildPlantillaTable(emps,showEco,showCuenta);
  const w=window.open('','_blank','width=1200,height=800');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${titulo}</title><style>
    *{box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:9px;color:#000;padding:12px}
    h2{font-size:13px;margin:0 0 2px}p{font-size:9px;color:#555;margin:0 0 8px}
    table{width:100%;border-collapse:collapse}
    thead tr.pt-group th{font-size:8px;font-weight:700;text-transform:uppercase;padding:4px 5px;text-align:center;border:1px solid #999}
    thead tr.pt-cols th{font-size:8px;color:#333;padding:3px 5px;border:1px solid #bbb;text-align:left;white-space:nowrap}
    tbody td{padding:3px 5px;border:1px solid #ddd;vertical-align:middle;white-space:nowrap}
    tbody tr:nth-child(even){background:#f9f9f9}
    .pt-id{background:#eeeeee}.pt-lab{background:#d0e8f8}.pt-eco{background:#d0f0d0}.pt-con{background:#eeeeee}.pt-ges{background:#fff8cc}
    .pt-id-cell{background:#f7f7f7}.pt-lab-cell{background:#edf6fd}.pt-eco-cell{background:#edfaed}.pt-con-cell{background:#f5f5f5}.pt-ges-cell{background:#fffde7}
    code{font-family:monospace}.tag{border-radius:3px;padding:1px 4px;font-size:7px;font-weight:700}
    @media print{@page{size:landscape;margin:8mm}body{padding:0}}
  </style></head><body>
    <h2>🗂️ ${titulo}</h2><p>Generado el ${fecha} · ${emps.length} empleado${emps.length!==1?'s':''}</p>
    ${tableHtml}
  </body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),600);
}
</script>
