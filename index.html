<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SGI-La Catedral</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6B1A1A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SGI Catedral">
<link rel="apple-touch-icon" href="/icon-192.svg">
<link rel="icon" type="image/svg+xml" href="/icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --burgundy:#6B1A1A;--burgundy-dark:#4A0E0E;--burgundy-light:#8B2E2E;
    --gold:#C9A84C;--gold-light:#E2C97E;--gold-pale:#F5EDD5;
    --cream:#FAF6EE;--cream-dark:#F0E8D5;
    --charcoal:#1C1C1E;--charcoal-mid:#2C2C2E;
    --text-dark:#1A1A1A;--text-mid:#4A4A4A;--text-light:#7A7A7A;
    --white:#FFFFFF;--border:#D5C9A8;--border-light:#E8DFC8;
    --success:#2D6A4F;--success-light:#D8F3DC;
    --warning:#B5642A;--warning-light:#FDEBD0;
    --danger:#8B1A1A;--danger-light:#FDDEDE;
    --info:#1B4D6E;--info-light:#D6EAF8;
    --shadow:0 4px 24px rgba(107,26,26,0.12);
    --shadow-sm:0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg:0 8px 40px rgba(107,26,26,0.18);
    --radius:8px;--radius-lg:14px;--sidebar-w:260px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Crimson Pro',Georgia,serif;background:var(--cream);color:var(--text-dark);min-height:100vh;font-size:16px;line-height:1.6}

  /* LOGIN */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--burgundy-dark) 0%,var(--burgundy) 40%,var(--charcoal-mid) 100%);position:relative;overflow:hidden}
  #login-screen::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:0.3}
  .login-card{background:var(--white);border-radius:var(--radius-lg);padding:52px 48px;width:420px;max-width:95vw;box-shadow:var(--shadow-lg);position:relative;z-index:1;animation:fadeUp 0.5s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .login-logo{text-align:center;margin-bottom:32px}
  .login-logo .crown{font-size:42px;margin-bottom:8px;display:block}
  .login-logo h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--burgundy);letter-spacing:1px}
  .login-logo p{color:var(--text-light);font-size:14px;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
  .login-divider{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px 0}
  .login-roles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
  .role-btn{padding:14px 10px;border:2px solid var(--border);border-radius:var(--radius);background:var(--cream);cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Crimson Pro',serif;font-size:14px;color:var(--text-mid)}
  .role-btn:hover,.role-btn.selected{border-color:var(--burgundy);background:var(--burgundy);color:var(--white)}
  .role-btn .role-icon{font-size:22px;display:block;margin-bottom:4px}
  .role-btn .role-name{font-weight:600;font-size:13px}
  .pin-group{margin-bottom:20px}
  .pin-group label{display:block;font-size:13px;color:var(--text-mid);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:16px}
  .pin-dot{width:48px;height:56px;border:2px solid var(--border);border-radius:var(--radius);font-size:22px;text-align:center;font-family:'JetBrains Mono',monospace;background:var(--cream);color:var(--text-dark);outline:none;transition:border-color 0.2s}
  .pin-dot:focus{border-color:var(--burgundy);background:var(--white)}
  .btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:12px 24px;border:none;border-radius:var(--radius);font-family:'Crimson Pro',serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none}
  .btn-primary{background:var(--burgundy);color:var(--white);width:100%}
  .btn-primary:hover{background:var(--burgundy-dark);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .btn-secondary{background:var(--cream-dark);color:var(--text-dark);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--border)}
  .btn-gold{background:var(--gold);color:var(--charcoal)}
  .btn-gold:hover{background:var(--gold-light)}
  .btn-danger{background:var(--danger);color:var(--white)}
  .btn-danger:hover{background:var(--burgundy-dark)}
  .btn-success{background:var(--success);color:var(--white)}
  .btn-success:hover{opacity:0.9}
  .btn-info{background:var(--info);color:var(--white)}
  .btn-sm{padding:6px 14px;font-size:13px}
  .btn-xs{padding:4px 10px;font-size:12px}
  .login-error{background:var(--danger-light);color:var(--danger);border:1px solid #f5c6c6;border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;font-size:14px;text-align:center;display:none}

  /* APP */
  #app{display:flex;min-height:100vh}
  #sidebar{width:var(--sidebar-w);min-height:100vh;background:linear-gradient(180deg,var(--burgundy-dark) 0%,var(--charcoal) 100%);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;box-shadow:4px 0 20px rgba(0,0,0,0.25)}
  .sidebar-header{padding:28px 20px 20px;border-bottom:1px solid rgba(201,168,76,0.2)}
  .sidebar-logo{color:var(--gold);font-family:'Playfair Display',serif;font-size:20px;font-weight:700;letter-spacing:0.5px}
  .sidebar-logo span{display:block;color:rgba(255,255,255,0.5);font-size:11px;text-transform:uppercase;letter-spacing:2px;font-family:'Crimson Pro',serif;margin-top:2px}
  .sidebar-role-badge{margin:12px 0 0;display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:20px;padding:4px 12px;color:var(--gold-light);font-size:12px;font-weight:600;transition:background 0.2s,border-color 0.2s;}
  .sidebar-role-badge:hover{background:rgba(201,168,76,0.3);border-color:rgba(201,168,76,0.6);}
  .sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
  .nav-section{padding:0 12px;margin-bottom:4px}
  .nav-section-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);padding:12px 8px 6px;font-family:'Crimson Pro',serif}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);color:rgba(255,255,255,0.7);font-size:14px;cursor:pointer;transition:all 0.2s;margin-bottom:2px}
  .nav-item:hover{background:rgba(255,255,255,0.08);color:var(--white)}
  .nav-item.active{background:rgba(201,168,76,0.2);color:var(--gold-light);border-left:3px solid var(--gold);padding-left:9px}
  .nav-item .nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
  .sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.08)}
  .sidebar-footer .btn{width:100%;font-size:13px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.12)}
  .sidebar-footer .btn:hover{background:rgba(255,255,255,0.15);color:var(--white)}
  #main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
  .topbar{height:64px;background:var(--white);border-bottom:1px solid var(--border-light);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
  .topbar h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--burgundy);font-weight:700;flex:1}
  .topbar-actions{display:flex;align-items:center;gap:10px}
  .content{padding:28px;flex:1}

  /* CARDS */
  .card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border-light);box-shadow:var(--shadow-sm);overflow:hidden}
  .card-header{padding:18px 24px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px}
  .card-header h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--burgundy);font-weight:700;flex:1}
  .card-body{padding:24px}
  .card-footer{padding:16px 24px;border-top:1px solid var(--border-light);background:var(--cream)}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:var(--white);border-radius:var(--radius-lg);padding:20px;border:1px solid var(--border-light);box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}
  .stat-card.burgundy::after{background:var(--burgundy)}
  .stat-card.success::after{background:var(--success)}
  .stat-card.warning::after{background:var(--warning)}
  .stat-value{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--text-dark)}
  .stat-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-top:4px}
  .stat-icon{position:absolute;right:16px;top:16px;font-size:28px;opacity:0.15}

  /* FORMS */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group.full{grid-column:1/-1}
  label.field-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-mid)}
  .required::after{content:' *';color:var(--burgundy)}
  input[type="text"],input[type="number"],input[type="date"],input[type="email"],input[type="tel"],input[type="password"],input[type="month"],select,textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Crimson Pro',serif;font-size:15px;color:var(--text-dark);background:var(--white);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
  input:focus,select:focus,textarea:focus{border-color:var(--burgundy);box-shadow:0 0 0 3px rgba(107,26,26,0.08)}
  input:read-only{background:var(--cream);color:var(--text-light)}
  textarea{resize:vertical;min-height:80px}
  .input-hint{font-size:12px;color:var(--text-light);margin-top:2px}
  .form-section-title{grid-column:1/-1;font-family:'Playfair Display',serif;font-size:15px;color:var(--burgundy);font-weight:600;padding:8px 0 4px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
  .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap}

  /* TABLES */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{background:var(--burgundy);color:var(--gold-light);padding:11px 14px;text-align:left;font-family:'Crimson Pro',serif;font-size:12px;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;white-space:nowrap}
  tbody tr{border-bottom:1px solid var(--border-light);transition:background 0.15s}
  tbody tr:hover{background:var(--gold-pale)}
  tbody td{padding:10px 14px;vertical-align:middle;color:var(--text-dark)}
  tbody tr:last-child{border-bottom:none}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .badge-active{background:var(--success-light);color:var(--success)}
  .badge-inactive{background:var(--danger-light);color:var(--danger)}
  .badge-gold{background:rgba(201,168,76,0.15);color:var(--warning);border:1px solid rgba(201,168,76,0.4)}
  .badge-info{background:var(--info-light);color:var(--info)}
  .badge-warning{background:var(--warning-light);color:var(--warning)}
  .badge-draft{background:var(--cream-dark);color:var(--text-mid);border:1px solid var(--border)}
  .badge-pending{background:#FFF3CD;color:#856404}
  .badge-approved{background:var(--success-light);color:var(--success)}

  /* FILTERS */
  .filters-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:16px;background:var(--cream);border-bottom:1px solid var(--border-light)}
  .filter-group{display:flex;align-items:center;gap:6px}
  .filter-group label{font-size:12px;color:var(--text-light);white-space:nowrap}
  .filter-group select,.filter-group input{padding:7px 12px;font-size:13px;min-width:120px}
  .search-input{flex:1;min-width:200px}

  /* TABS */
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--border-light);margin-bottom:24px;overflow-x:auto}
  .tab{padding:12px 20px;cursor:pointer;font-family:'Crimson Pro',serif;font-size:14px;font-weight:600;color:var(--text-light);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.2s}
  .tab:hover{color:var(--burgundy)}
  .tab.active{color:var(--burgundy);border-bottom-color:var(--burgundy)}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(28,28,30,0.6);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
  .modal-overlay.open{display:flex;animation:fadeIn 0.2s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp 0.25s ease}
  .modal.modal-sm{max-width:440px}
  .modal.modal-lg{max-width:960px}
  .modal.modal-xl{max-width:1100px}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{padding:20px 24px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:1}
  .modal-header h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--burgundy);font-weight:700;flex:1}
  .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);padding:4px;line-height:1;transition:color 0.15s}
  .modal-close:hover{color:var(--text-dark)}
  .modal-body{padding:24px}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;gap:10px;justify-content:flex-end}

  /* TOOLTIPS */
  [data-tip]{position:relative;cursor:help}
  [data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--charcoal);color:var(--white);padding:8px 12px;border-radius:6px;font-size:12px;white-space:normal;max-width:240px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:999;box-shadow:var(--shadow);line-height:1.4;text-transform:none;letter-spacing:0;font-family:'Crimson Pro',serif;font-weight:400}
  [data-tip]:hover::after{opacity:1}

  /* TOAST */
  #toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
  .toast{padding:14px 18px;border-radius:var(--radius);font-size:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;animation:slideIn 0.3s ease;min-width:280px;font-family:'Crimson Pro',serif}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .toast-success{background:var(--success);color:var(--white)}
  .toast-error{background:var(--danger);color:var(--white)}
  .toast-warning{background:var(--warning);color:var(--white)}
  .toast-info{background:var(--info);color:var(--white)}

  /* MISC */
  .divider{height:1px;background:var(--border-light);margin:20px 0}
  .text-muted{color:var(--text-light);font-size:13px}
  .text-gold{color:var(--gold)}
  .text-burgundy{color:var(--burgundy)}
  .text-right{text-align:right}
  .text-center{text-align:center}
  .fw-bold{font-weight:700}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
  .empty-state .empty-icon{font-size:52px;margin-bottom:12px;opacity:0.4}
  .empty-state h4{font-family:'Playfair Display',serif;font-size:18px;color:var(--text-mid);margin-bottom:6px}
  .history-list{display:flex;flex-direction:column;gap:10px}
  .history-item{padding:12px 16px;background:var(--cream);border-radius:var(--radius);border-left:3px solid var(--gold);font-size:13px}
  .history-item .hi-date{color:var(--text-light);font-size:12px}
  .progress-bar-wrap{background:var(--border-light);border-radius:4px;height:6px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--burgundy),var(--gold));border-radius:4px;transition:width 0.3s}
  .chip{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;background:var(--cream-dark);color:var(--text-mid);border:1px solid var(--border)}
  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
  .chart-card{background:var(--white);border-radius:var(--radius-lg);padding:20px;border:1px solid var(--border-light)}
  .chart-card h4{font-family:'Playfair Display',serif;font-size:15px;color:var(--burgundy);margin-bottom:16px}
  .nomina-table{font-size:13px}
  .nomina-table th{padding:9px 10px;font-size:11px}
  .nomina-table td{padding:8px 10px}
  .nomina-table input[type="number"]{width:70px;padding:5px 8px;font-size:13px}
  .nomina-total-row td{background:var(--gold-pale);font-weight:700}
  .file-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--cream)}
  .file-drop:hover{border-color:var(--burgundy);background:var(--gold-pale)}
  .file-drop .file-icon{font-size:32px;margin-bottom:8px}
  .file-drop p{color:var(--text-light);font-size:14px}
  .file-drop-sm{padding:14px;display:flex;align-items:center;gap:10px;text-align:left}
  .file-drop-sm .file-icon{font-size:22px;margin-bottom:0}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--burgundy-light)}
  .section{display:none}
  .section.active{display:block}
  #login-screen.hidden{display:none}
  #app.hidden{display:none}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

  /* EXPEDIENTE TIMELINE */
  .timeline{position:relative;padding-left:28px}
  .timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border-light)}
  .timeline-item{position:relative;margin-bottom:20px}
  .timeline-dot{position:absolute;left:-22px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--gold);border:2px solid var(--white);box-shadow:0 0 0 2px var(--gold)}
  .timeline-dot.red{background:var(--danger);box-shadow:0 0 0 2px var(--danger)}
  .timeline-dot.green{background:var(--success);box-shadow:0 0 0 2px var(--success)}
  .timeline-dot.blue{background:var(--info);box-shadow:0 0 0 2px var(--info)}
  .timeline-dot.purple{background:#7B2D8B;box-shadow:0 0 0 2px #7B2D8B}
  .timeline-content{background:var(--cream);border-radius:var(--radius);padding:12px 16px;border:1px solid var(--border-light)}
  .timeline-content .tl-date{font-size:12px;color:var(--text-light);margin-bottom:4px}
  .timeline-content .tl-title{font-weight:700;color:var(--text-dark);font-size:14px}
  .timeline-content .tl-desc{font-size:13px;color:var(--text-mid);margin-top:4px}

  /* FOTO CARNET */
  .foto-carnet-preview{width:120px;height:150px;object-fit:cover;border-radius:var(--radius);border:2px solid var(--border);display:block}
  .foto-carnet-placeholder{width:120px;height:150px;background:var(--cream-dark);border-radius:var(--radius);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text-light);font-size:12px;cursor:pointer}

  /* ALERT SEMAFORO */
  .alert-semaforo{border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}
  .alert-semaforo-header{padding:14px 20px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
  .alert-semaforo-body{padding:0 20px 16px}
  .alert-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.15);font-size:14px}
  .alert-row:last-child{border-bottom:none}
  .semaforo-red{background:linear-gradient(135deg,#8B1A1A,#C0392B)}
  .semaforo-red .alert-semaforo-header,.semaforo-red .alert-row{color:var(--white)}
  .semaforo-yellow{background:linear-gradient(135deg,#B5642A,#E67E22)}
  .semaforo-yellow .alert-semaforo-header,.semaforo-yellow .alert-row{color:var(--white)}
  .semaforo-green{background:linear-gradient(135deg,#2D6A4F,#27AE60)}
  .semaforo-green .alert-semaforo-header,.semaforo-green .alert-row{color:var(--white)}

  /* ── FICHA UNIFICADA ── */
  .ficha-hero{background:linear-gradient(135deg,#3D0C11 0%,#6B1A22 60%,#8B2635 100%);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:28px 28px 0;color:#fff;position:relative;overflow:hidden}
  .ficha-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.04)}
  .ficha-hero-top{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px}
  .ficha-avatar{width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;flex-shrink:0;overflow:hidden;object-fit:cover}
  .ficha-hero-info{flex:1;min-width:0}
  .ficha-nombre{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;margin:0 0 4px;line-height:1.2}
  .ficha-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:10px}
  .ficha-chips{display:flex;flex-wrap:wrap;gap:6px}
  .ficha-chip{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:3px 10px;font-size:11px;color:#fff;font-weight:600}
  .ficha-chip.chip-activo{background:rgba(39,174,96,0.35);border-color:rgba(39,174,96,0.6)}
  .ficha-chip.chip-baja{background:rgba(192,57,43,0.35);border-color:rgba(192,57,43,0.6)}
  .ficha-expnum{text-align:right;flex-shrink:0}
  .ficha-expnum-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5)}
  .ficha-expnum-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:rgba(255,255,255,0.9)}
  .ficha-tabs{display:flex;gap:0;border-top:1px solid rgba(255,255,255,0.15);margin-top:4px}
  .ficha-tab{padding:12px 20px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,0.55);border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap}
  .ficha-tab:hover{color:rgba(255,255,255,0.9)}
  .ficha-tab.active{color:#fff;border-bottom-color:#fff}
  .ficha-pane{display:none}.ficha-pane.active{display:block}
  .ficha-section{border-radius:8px;padding:16px;margin-bottom:14px}
  .ficha-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;opacity:.7}
  .ficha-kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
  .ficha-kv-item{}
  .ficha-kv-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:2px}
  .ficha-kv-val{font-size:13px;font-weight:600;color:var(--text-dark)}
  .ficha-eco{background:#f0fbf0}.ficha-id{background:#f7f7f7}.ficha-lab{background:#edf6fd}.ficha-pago{background:#f9f9f9}.ficha-vac{background:#e8f4fd}
  .ficha-actions{display:flex;flex-wrap:wrap;gap:8px;padding:16px 0 4px}
  .doc-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:10px;border:1.5px solid var(--border-light);background:var(--white);cursor:pointer;text-decoration:none;transition:all 0.2s;text-align:center}
  .doc-card:hover{border-color:var(--burgundy);transform:translateY(-2px);box-shadow:var(--shadow)}
  .doc-card-missing{opacity:.5;cursor:default}.doc-card-missing:hover{transform:none;box-shadow:none;border-color:var(--border-light)}
  .doc-card-icon{font-size:28px}
  .doc-card-name{font-size:12px;font-weight:600;color:var(--text-dark)}
  .doc-card-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
  .doc-card-status.ok{background:#d4edda;color:#155724}
  .doc-card-status.miss{background:#f8d7da;color:#721c24}
  /* CONTRACT PRINT */
  @media print{
    #sidebar,#topbar,.topbar,.topbar-actions,.btn,nav,#toast-container,
    .plantilla-controls{display:none!important}
    #main{margin-left:0!important}
    .contract-print-area{display:block!important}
    body{background:white;font-family:serif}
    .plantilla-table-wrap{overflow:visible!important}
    .plantilla-table{font-size:9px!important}
    .plantilla-table th,.plantilla-table td{padding:3px 5px!important}
  }
  /* ── Plantilla de Personal ── */
  .plantilla-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .plantilla-table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
  .plantilla-table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
  .plantilla-table thead tr.pt-group th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;text-align:center;border:1px solid #ccc}
  .plantilla-table thead tr.pt-cols th{font-size:10px;color:#555;padding:5px 8px;border:1px solid #ddd;white-space:nowrap;text-align:left}
  .plantilla-table tbody tr:nth-child(even){background:#fafafa}
  .plantilla-table tbody tr:hover{background:#f0f0f0}
  .plantilla-table td{padding:6px 8px;border:1px solid #e0e0e0;vertical-align:middle;white-space:nowrap}
  .pt-id{background:#f5f5f5}
  .pt-lab{background:#e8f4fd}
  .pt-eco{background:#e8f8e8}
  .pt-con{background:#f5f5f5}
  .pt-ges{background:#fffde7}
  .pt-id-cell{background:#fafafa}
  .pt-lab-cell{background:#f0f8ff}
  .pt-eco-cell{background:#f0fbf0}
  .pt-con-cell{background:#f9f9f9}
  .pt-ges-cell{background:#fffdf0}
  .contract-print-area{font-family:'Times New Roman',serif;font-size:13px;line-height:1.8;color:#000;padding:40px;max-width:800px;margin:0 auto}
  .contract-print-area h1{text-align:center;font-size:16px;font-weight:bold;margin-bottom:24px;text-transform:uppercase}
  .contract-print-area p{margin-bottom:12px;text-align:justify}
  .contract-print-area .contract-section-title{font-weight:bold;margin:18px 0 8px;text-transform:uppercase}
  .contract-print-area .sign-area{display:flex;justify-content:space-between;margin-top:60px}
  .contract-print-area .sign-line{text-align:center;width:45%}
  .contract-print-area .sign-line div{border-top:1px solid #000;padding-top:8px;margin-top:40px}
  .contract-print-area ul{padding-left:24px;margin-bottom:12px}
  .contract-print-area ul li{margin-bottom:6px}
  .contract-print-area .contract-field{font-weight:bold;text-decoration:underline}

  /* IMAGE PREVIEW GRID */
  .img-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .img-thumb{position:relative;width:80px;height:80px}
  .img-thumb img{width:80px;height:80px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border)}
  .img-thumb .img-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--danger);color:white;border-radius:50%;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}

  /* CERT MEDICO STATUS */
  .cert-ok{color:var(--success);font-weight:600}
  .cert-warn{color:var(--warning);font-weight:600}
  .cert-exp{color:var(--danger);font-weight:600}

  /* HAMBURGER / MOBILE SIDEBAR */
  #hamburger-btn{display:none;background:none;border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;cursor:pointer;font-size:20px;color:var(--burgundy);align-items:center;justify-content:center;min-width:40px;min-height:40px;flex-shrink:0}
  #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:99}
  #sidebar-overlay.open{display:block}
  .grid-2-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;font-size:14px}
  .grid-4-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;font-size:14px}

  @media(max-width:768px){
    .col-hide-mobile{display:none!important}
    :root{--sidebar-w:0px}
    #sidebar{transform:translateX(-260px);transition:transform 0.25s ease;width:260px!important;display:flex;z-index:200}
    #sidebar.open{transform:translateX(0);box-shadow:6px 0 32px rgba(0,0,0,0.4)}
    #hamburger-btn{display:flex!important}
    #main{margin-left:0}
    .content{padding:12px}
    .form-grid{grid-template-columns:1fr}
    .chart-grid{grid-template-columns:1fr}
    .stats-grid{grid-template-columns:1fr 1fr}
    .topbar{padding:0 10px;gap:6px}
    .topbar h2{font-size:15px;margin-left:4px!important}
    .topbar-actions{gap:4px}
    .topbar-actions .btn-sm{padding:6px 10px;font-size:12px}
    .topbar-actions .btn-xs{padding:6px 8px;font-size:12px}
    .modal-overlay{padding:0;align-items:flex-end}
    .modal,.modal.modal-sm,.modal.modal-lg,.modal.modal-xl{max-width:100%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;max-height:92vh}
    #toast-container{right:8px;left:8px;top:auto;bottom:72px}
    .toast{min-width:unset;width:100%}
    .filters-bar{padding:8px 10px;gap:6px}
    .filter-group{flex:1 1 calc(50% - 6px)}
    .search-input{min-width:100%;order:-1;flex-basis:100%}
    .nav-item{padding:12px 16px;font-size:15px}
    .login-card{padding:36px 24px}
    .sync-indicator{bottom:68px}
  }
  @media(max-width:1023px){.col-hide-md{display:none!important}}
  @media(max-width:1279px){.col-hide-lg{display:none!important}}
  /* Tarjetas de empleado para móvil */
  .emp-cards-wrap{display:none!important}
  @media(max-width:768px){
    .emp-cards-wrap{display:block!important}
    #emp-table{display:none!important}
  }
  .emp-card{background:var(--white);border:1px solid var(--border-light);border-radius:10px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .emp-card-info{flex:1;min-width:0}
  .emp-card-name{font-weight:700;font-size:14px;color:var(--text-dark);line-height:1.3}
  .emp-card-sub{font-size:12px;color:var(--text-mid);margin-top:3px}
  .emp-card-foot{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
  .emp-card-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
  @media(max-width:480px){
    .stats-grid{grid-template-columns:1fr}
    .modal-body{padding:14px}
    .modal-footer{padding:12px 14px;flex-wrap:wrap}
    .modal-footer .btn{flex:1;min-width:120px;justify-content:center}
    .login-card{padding:28px 16px}
    .filter-group{flex:1 1 100%}
    .card-body{padding:14px}
    table{font-size:13px}
    thead th{padding:8px 10px}
    tbody td{padding:8px 10px}
  }

  /* ── Plaza cards (móvil) ───────────────────────────────── */
  .plaza-cards-wrap{display:none}
  @media(max-width:640px){
    .plaza-table-wrap{display:none!important}
    .plaza-cards-wrap{display:block}
  }
  .plaza-card{background:var(--white);border:1px solid var(--border-light);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
  .plaza-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
  .plaza-card-name{font-weight:700;font-size:15px;color:var(--text-dark)}
  .plaza-card-dept{font-size:11px;color:var(--burgundy);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:600}
  .plaza-card-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:12px;color:var(--text-mid);margin:8px 0 10px;border-top:1px solid var(--border-light);padding-top:8px}
  .plaza-card-meta span{display:flex;flex-direction:column;gap:1px}
  .plaza-card-meta span b{font-size:13px;color:var(--text-dark)}
  .plaza-card-actions{display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border-light);padding-top:10px}

  /* ── Tablas responsivas con etiquetas (.resp-table) ───── */
  @media(max-width:640px){
    .resp-table{overflow-x:unset!important}
    .resp-table table thead{display:none}
    .resp-table table tbody tr{display:block;border:1px solid var(--border-light);border-radius:10px;margin-bottom:10px;box-shadow:var(--shadow-sm);background:var(--white)}
    .resp-table table tbody td{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border-light);gap:10px;font-size:13px;min-height:38px}
    .resp-table table tbody td:last-child{border-bottom:none}
    .resp-table table tbody td::before{content:attr(data-label);font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;flex-shrink:0;min-width:80px}
    .resp-table table tbody td.td-act{flex-direction:column;align-items:flex-start;gap:6px}
    .resp-table table tbody td.td-act::before{display:none}
    .resp-table table tbody td.td-act .btn-wrap{display:flex;flex-wrap:wrap;gap:6px}
    .resp-table table tbody td:empty{display:none}
  }

  /* SYNC INDICATOR */
  .sync-indicator{position:fixed;bottom:16px;right:16px;z-index:9998;padding:8px 16px;border-radius:20px;font-size:13px;font-family:'Crimson Pro',serif;display:none;align-items:center;gap:8px;box-shadow:var(--shadow);transition:all 0.3s}
  .sync-syncing{background:var(--info);color:white}
  .sync-ok{background:var(--success);color:white}
  .sync-offline{background:var(--warning);color:white}
  .sync-status-bar{font-size:11px;color:rgba(255,255,255,0.5);padding:4px 8px;display:block;text-align:center}

</style>
</head>

<script>
// ══════════════════════════════════════════════════
// STATE & STORAGE

const STORAGE_KEY = 'lacatedral_v2';
const API_URL = 'https://script.google.com/macros/s/AKfycby9DnHw36GT9vD675svFyUxMDctnLeNe4Imwi_FEmGkdByV2lAWmFwqBhnAR8hDCzaS/exec';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxd21udXFmZmZnZG9vYmpsenVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTA1OTQsImV4cCI6MjA5MDYyNjU5NH0.2b1ly2NtuHl6JxUZZHbKEcIgZjDwWR3xxdM1uN3LaFw';

// ══════════════════════════════════════════════════
// SUPABASE REALTIME — cambios instantáneos
// ══════════════════════════════════════════════════
let _sbClient = null;
let _rtChannel = null;
let _rtRenderTimer = null;

function _initSupabaseClient() {
  if (_sbClient || !window.supabase) return;
  _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    realtime: { params: { eventsPerSecond: 20 } },
    auth: { persistSession: false, autoRefreshToken: false }
  });
}

function connectRealtime() {
  _initSupabaseClient();
  if (!_sbClient || !currentRole) return;
  disconnectRealtime();
  const TABLAS_RT = ['empleados','plazas','traslados','bajas','sanciones',
    'nominas','nominaLineas','incidencias','vacacionesControl','historialSalarial',
    'asistencia','alertasJuridico','auditLog','config','preformas'];
  _rtChannel = _sbClient.channel('sgi-catedral-rt');
  TABLAS_RT.forEach(tabla => {
    _rtChannel.on('postgres_changes', { event: '*', schema: 'public', table: tabla },
      payload => _applyRealtimeChange(payload));
  });
  _rtChannel.subscribe(status => {
    if (status === 'SUBSCRIBED') {
      showSyncIndicator('🔴 En tiempo real', 'ok');
      updateSyncBadge(true);
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
      showSyncIndicator('⚠️ Tiempo real caído — reconectando...', 'offline');
      setTimeout(connectRealtime, 5000);
    }
  });
}

function disconnectRealtime() {
  if (_rtChannel && _sbClient) {
    _sbClient.removeChannel(_rtChannel).catch(() => {});
    _rtChannel = null;
  }
}

function _applyRealtimeChange({ eventType, table, new: rec, old: oldRec }) {
  if (!currentRole) return;
  // Ignorar cambios originados por esta misma sesión (ya en STATE)
  // Los aplicamos igual para mantener consistencia entre pestañas/dispositivos
  switch (table) {
    case 'empleados': {
      if (eventType === 'DELETE') {
        STATE.empleados = STATE.empleados.filter(e => e.id !== oldRec?.id);
      } else {
        let jornada = rec.jornada;
        if (jornada === 24 || jornada === '24') jornada = '8x24';
        else if (jornada === 15 || jornada === '15') jornada = '12x15';
        else if (!jornada || !JORNADAS[jornada]) jornada = '8x24';
        const emp = { ...rec, jornada,
          activo: rec.activo === true || String(rec.activo) === 'true',
          salarioBase: rec.salarioBase ? parseFloat(rec.salarioBase) : null,
          fechaAlta: normalizarFecha(rec.fechaAlta),
          fotoEmpleadoId: rec.fotoEmpleadoId || '',
          contratoId: rec.contratoId || '',
          carpetaExpId: rec.carpetaExpId || ''
        };
        const idx = STATE.empleados.findIndex(e => e.id === rec.id);
        if (idx >= 0) STATE.empleados[idx] = emp; else STATE.empleados.push(emp);
      }
      break;
    }
    case 'plazas': {
      if (!STATE.plazas) STATE.plazas = {};
      if (eventType === 'DELETE') { delete STATE.plazas[oldRec?.id]; }
      else STATE.plazas[rec.id] = { ...rec, salarioBase: parseFloat(rec.salarioBase) || 0 };
      break;
    }
    case 'nominas': {
      if (eventType === 'DELETE') {
        STATE.nominas = STATE.nominas.filter(n => n.id !== oldRec?.id);
      } else {
        const nom = { ...rec, mes: parseInt(rec.mes)||1, ano: parseInt(rec.ano)||new Date().getFullYear(), totalDevengado: parseFloat(rec.totalDevengado)||0 };
        const idx = STATE.nominas.findIndex(n => n.id === rec.id);
        if (idx >= 0) { nom.lineas = STATE.nominas[idx].lineas || []; STATE.nominas[idx] = nom; }
        else { nom.lineas = []; STATE.nominas.push(nom); }
      }
      break;
    }
    case 'nominaLineas': {
      if (rec) {
        const nom = STATE.nominas.find(n => n.id === rec.nominaId);
        if (nom) {
          if (!nom.lineas) nom.lineas = [];
          const li = nom.lineas.findIndex(l => l.empleadoId === rec.empleadoId);
          const linea = { empleadoId: rec.empleadoId, diasTrabajados: parseFloat(rec.diasTrabajados)||0, horasExtras: parseFloat(rec.horasExtras)||0, totalDevengado: parseFloat(rec.totalDevengado)||0 };
          if (li >= 0) nom.lineas[li] = linea; else nom.lineas.push(linea);
        }
      }
      break;
    }
    case 'config': {
      if (eventType !== 'DELETE' && rec) {
        const v = rec.valor, k = rec.clave;
        if (k==='pinRrhh')           STATE.config.pins.rrhh = v;
        else if (k==='pinJuridico')  STATE.config.pins.juridico = v;
        else if (k==='pinContabilidad') STATE.config.pins.contabilidad = v;
        else if (k==='pinJefeTurno') STATE.config.pins.jefe_turno = v;
        else if (k==='pinAdmin')     STATE.config.adminPin = v;
        else if (k==='bonAnios1')    STATE.config.bonificacion.anios1 = parseInt(v)||5;
        else if (k==='bonNivel1')    STATE.config.bonificacion.nivel1 = parseInt(v)||5;
        else if (k==='bonAnios2')    STATE.config.bonificacion.anios2 = parseInt(v)||10;
        else if (k==='bonNivel2')    STATE.config.bonificacion.nivel2 = parseInt(v)||10;
        else if (k==='recargoHE')    STATE.config.recargoHorasExtras = parseFloat(v)||50;
        else if (k==='diasVacaciones') STATE.config.diasVacaciones = parseInt(v)||14;
        else if (k==='diasPagados')  STATE.config.diasPagadosPeriodo = parseInt(v)||15;
        else if (k==='vacPendientes'){try{STATE.vacPendientes=JSON.parse(v)||[];}catch{STATE.vacPendientes=[];}}
      }
      break;
    }
    case 'preformas': {
      if (!STATE.preformas) STATE.preformas = {};
      if (eventType === 'DELETE') delete STATE.preformas[oldRec?.grupo || oldRec?.id];
      else if (rec) STATE.preformas[rec.grupo || rec.id] = { disciplina: rec.disciplina||'', caracteristicas: rec.caracteristicas||'' };
      break;
    }
    case 'auditLog': {
      if (eventType === 'INSERT' && rec?.id) {
        if (!STATE.auditLog.some(e => e.id === rec.id)) {
          STATE.auditLog.unshift(rec);
          if (STATE.auditLog.length > 2000) STATE.auditLog.pop();
        }
      }
      break;
    }
    case 'vacacionesControl': {
      if (eventType === 'DELETE') {
        STATE.vacacionesControl = STATE.vacacionesControl.filter(r => r.id !== oldRec?.id);
      } else if (rec) {
        const item = { empleadoId: rec.empleadoId, ano: parseInt(rec.ano)||0, diasTomados: parseInt(rec.diasTomados)||0 };
        const idx = STATE.vacacionesControl.findIndex(r => r.empleadoId === rec.empleadoId && parseInt(r.ano) === item.ano);
        if (idx >= 0) STATE.vacacionesControl[idx] = item; else STATE.vacacionesControl.push(item);
      }
      break;
    }
    default: {
      // Tablas genéricas de array: traslados, bajas, sanciones, incidencias, historialSalarial, asistencia, alertasJuridico
      if (!Array.isArray(STATE[table])) break;
      if (eventType === 'DELETE') {
        STATE[table] = STATE[table].filter(r => r.id !== oldRec?.id);
      } else if (rec) {
        if (table === 'asistencia') {
          // Para asistencia: deduplicar por fecha además de por id, preferir cerrado
          rec.lineas = parseLineas(rec.lineas); // deserializar desde TEXT o JSONB
          if (rec.cerrado) STATE[table] = STATE[table].filter(r => r.fecha !== rec.fecha || r.id === rec.id);
          const idx = STATE[table].findIndex(r => r.id === rec.id);
          if (idx >= 0) STATE[table][idx] = rec; else STATE[table].unshift(rec);
        } else {
          const idx = STATE[table].findIndex(r => r.id === rec.id);
          if (idx >= 0) STATE[table][idx] = rec; else STATE[table].unshift(rec);
        }
      }
    }
  }
  saveState();
  // Re-render con debounce para no saturar si llegan varios cambios seguidos
  if (_rtRenderTimer) clearTimeout(_rtRenderTimer);
  _rtRenderTimer = setTimeout(() => {
    _rtRenderTimer = null;
    if (currentRole && currentSection) navigateTo(currentSection);
  }, 250);
}

function loadState() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    const pending = localStorage.getItem(STORAGE_KEY+'_pending');
    if (pending) { try { DB_PENDING_OPS = JSON.parse(pending); } catch(e){} }
    if(r) return JSON.parse(r);
  } catch(e){}
  return getDefaultState();
}
function saveState() {
  try {
    const data = JSON.stringify(STATE);
    localStorage.setItem(STORAGE_KEY, data);
    if (DB_PENDING_OPS.length > 0) localStorage.setItem(STORAGE_KEY+'_pending', JSON.stringify(DB_PENDING_OPS));
    else localStorage.removeItem(STORAGE_KEY+'_pending');
    // Advertir si el storage está cerca del límite (5MB típico)
    const kb = Math.round(data.length / 1024);
    if (kb > 4000) {
      console.warn('localStorage casi lleno: '+kb+'KB. Considere limpiar fotos antiguas.');
    }
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      showToast('⚠️ Almacenamiento local lleno. Intente eliminar fotos o documentos antiguos.','error', 8000);
    } else {
      showToast('Error al guardar: '+e.message,'error');
    }
  }
}

// ── SUPABASE (Primary DB) ─────────────────────────────────────
async function sbFetch(method, table, data, qs) {
  const url = SUPABASE_URL + '/rest/v1/' + table + (qs ? '?' + qs : '');
  const res = await fetch(url, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: data != null ? JSON.stringify(data) : undefined
  });
  if (!res.ok) { const t = await res.text(); throw new Error('SB ' + res.status + ': ' + t.slice(0, 200)); }
  if (method === 'GET') return res.json();
  return true;
}
async function sbLeer(tabla) {
  return await sbFetch('GET', tabla, null, 'select=*');
}
function sbIdField(tabla) {
  if (tabla === 'config') return 'clave';
  return 'id'; // auditLog, preformas, plazas y resto usan 'id'
}

// Tablas que existen en Supabase
const SUPABASE_TABLES = new Set(['empleados','plazas','traslados','bajas','sanciones',
  'nominas','nominaLineas','incidencias','vacacionesControl','historialSalarial','asistencia',
  'alertasJuridico','auditLog','config','preformas']);

// Columnas permitidas por tabla (evita error por campos viejos/desconocidos)
const EMPLEADOS_COLS = ['id','fechaAlta','nombres','apellidos','carnet','telefono',
  'fechaNacimiento','direccion','provincia','municipio','tipoContrato','jornada','departamento','plaza',
  'salarioBase','activo','fechaBaja','certMedicoFecha','fotoEmpleadoId','fotoCarnetId',
  'carpetaExpId','contratoId','obligacionesId','contratoFechaFirma','contratoObs',
  'banco','cuenta','observaciones'];

const AUDITLOG_COLS = ['id','fecha','rol','tipo','detalle'];
const PREFORMAS_COLS = ['id','grupo','disciplina','caracteristicas'];
const CONFIG_COLS    = ['clave','valor'];
const PLAZAS_COLS    = ['id','departamento','nombre','salarioBase','jornada','tipoContrato','descripcion','funcionesPdfId','funcionesPdfUrl'];

function cleanForSB(tabla, obj) {
  if (!obj || typeof obj !== 'object') return obj;
  const clean = {...obj};
  if (tabla === 'empleados') {
    const allowed = new Set(EMPLEADOS_COLS);
    Object.keys(clean).forEach(k => { if (!allowed.has(k)) delete clean[k]; });
  } else if (tabla === 'auditLog') {
    const allowed = new Set(AUDITLOG_COLS);
    Object.keys(clean).forEach(k => { if (!allowed.has(k)) delete clean[k]; });
  } else if (tabla === 'preformas') {
    const allowed = new Set(PREFORMAS_COLS);
    Object.keys(clean).forEach(k => { if (!allowed.has(k)) delete clean[k]; });
  } else if (tabla === 'config') {
    const allowed = new Set(CONFIG_COLS);
    Object.keys(clean).forEach(k => { if (!allowed.has(k)) delete clean[k]; });
  } else if (tabla === 'plazas') {
    const allowed = new Set(PLAZAS_COLS);
    Object.keys(clean).forEach(k => { if (!allowed.has(k)) delete clean[k]; });
  } else if (tabla === 'asistencia') {
    // Only include optional fields when they have values — avoids 42703 on missing columns
    const out = { id: clean.id, fecha: clean.fecha, cerrado: !!clean.cerrado };
    const lv = Array.isArray(clean.lineas) ? JSON.stringify(clean.lineas) : (clean.lineas || null);
    if (lv !== null) out.lineas = lv;
    const rp = clean.registradoPor || clean.registradopor || '';
    if (rp) out.registradopor = rp;
    const hc = clean.horaCierre || clean.horacierre || '';
    if (hc) out.horacierre = hc;
    if (clean.cierreAutomatico || clean.cierreautomatico) out.cierreautomatico = true;
    return out;
  }
  // Limpiar campos numéricos vacíos → null
  ['salarioBase','anterior','nuevo','totalDevengado','diasTrabajados','horasExtras','diasAfectados','diasTomados','mes','ano'].forEach(f => {
    if (f in clean && (clean[f] === '' || clean[f] === undefined)) clean[f] = null;
    if (f in clean && clean[f] !== null) clean[f] = isNaN(Number(clean[f])) ? null : Number(clean[f]);
  });
  return clean;
}

async function sbUpsert(tabla, valores) {
  if (!SUPABASE_TABLES.has(tabla)) return; // solo tablas registradas
  const idField = sbIdField(tabla);
  let arr = (Array.isArray(valores) ? valores : [valores]).map(v => cleanForSB(tabla, v));
  // Deduplicar por idField dentro del mismo batch
  const seen = new Map();
  arr.forEach(v => { if (v[idField] != null) seen.set(String(v[idField]), v); });
  arr = [...seen.values()];
  if (arr.length === 0) return;
  const url = SUPABASE_URL + '/rest/v1/' + tabla + '?on_conflict=' + idField;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(arr)
  });
  if (!res.ok) { const t = await res.text(); throw new Error('SB upsert ' + res.status + ': ' + t.slice(0, 200)); }
  return true;
}
async function sbEliminarDB(tabla, id) {
  if (!SUPABASE_TABLES.has(tabla)) return;
  const idField = sbIdField(tabla);
  return await sbFetch('DELETE', tabla, null, idField + '=eq.' + encodeURIComponent(id));
}

// ── SHEETS (Legacy API — Sheets backup) ──────────────────────
async function apiCall(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    redirect: 'follow', // Necesario para Google Apps Script
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.status === 'error') throw new Error(json.message);
  return json;
}
// Backup silencioso a Sheets (fire-and-forget, no bloquea)
function backupToSheets(tabla, accion, valores, id) {
  (async () => {
    try {
      let payload;
      if (accion === 'insertar')   payload = { accion: 'insertar', tabla, valores };
      else if (accion === 'actualizar') payload = { accion: 'actualizar', tabla, id, valores };
      else if (accion === 'eliminar')   payload = { accion: 'eliminar', tabla, id };
      else return;
      await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
    } catch (e) { /* Sheets backup falla silenciosamente */ }
  })();
}

// ── WRITE (Supabase primary + Sheets backup) ──────────────────
// Helper: parse lineas back from JSON string or return array as-is
function parseLineas(v) {
  if (Array.isArray(v)) return v;
  if (typeof v === 'string' && v.trim().startsWith('[')) {
    try { return JSON.parse(v); } catch { return []; }
  }
  return [];
}
// Normalize asistencia record from DB (lowercase cols) to camelCase for JS
function normalizeAsistencia(r) {
  return {
    ...r,
    lineas: parseLineas(r.lineas),
    registradoPor: r.registradoPor || r.registradopor || '',
    horaCierre: r.horaCierre || r.horacierre || '',
    cierreAutomatico: !!(r.cierreAutomatico || r.cierreautomatico || false)
  };
}
async function pushToSheets(tabla, accion, valores, id) {
  let ok = false;
  try {
    if (accion === 'eliminar') await sbEliminarDB(tabla, id);
    else await sbUpsert(tabla, valores);
    ok = true;
  } catch (err) {
    if (tabla === 'asistencia' && accion !== 'eliminar') {
      const e = String(err.message || '');
      if (e.includes('42703') || e.includes('PGRST204') || e.includes('column') || e.toLowerCase().includes('lineas')) {
        // Bypass cleanForSB entirely — raw POST with only guaranteed columns {id, fecha, cerrado}
        try {
          const v = Array.isArray(valores) ? valores[0] : valores;
          const raw = { id: v.id, fecha: v.fecha, cerrado: !!v.cerrado };
          const res = await fetch(SUPABASE_URL + '/rest/v1/asistencia?on_conflict=id', {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
                       'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
            body: JSON.stringify([raw])
          });
          if (!res.ok) { const t = await res.text(); throw new Error('HTTP ' + res.status + ': ' + t.slice(0,120)); }
          ok = true;
          showToast('⚠️ Asistencia guardada (básico) — faltan columnas en Supabase. Pide al admin ejecutar el SQL de configuración.','warning',10000);
        } catch(e2) { /* truly offline */ }
      }
    }
    if (!ok) {
      DB_ONLINE = false; updateSyncBadge(false);
      DB_PENDING_OPS.push({ tabla, accion, valores, id });
      showSyncIndicator('⚠️ Guardado local (BD no disponible)', 'offline');
    }
  }
  if (ok) { DB_ONLINE = true; updateSyncBadge(true); showSyncIndicator('✅ Guardado', 'ok'); }
  backupToSheets(tabla, accion, valores, id);
}
async function manualSync() {
  showSyncIndicator('⏳ Sincronizando...', 'syncing');
  try {
    await sincronizarDesdeSheets();
    await flushPendingOps();
  } catch(e) { showSyncIndicator('❌ Error de conexión', 'offline'); }
}

// ── RECUPERACIÓN DESDE SHEETS (solo admin) ──
async function recuperarDesdeSheets(){
  if(currentRole!=='admin'){showToast('Solo administración','error');return;}
  const btn=document.getElementById('btn-recuperar-sheets');
  if(btn)btn.disabled=true;

  showSyncIndicator('⏳ Consultando Sheets...','syncing');
  showToast('🔍 Leyendo Sheets y Supabase...','info',3000);

  let sheetsEmps=[];
  try{
    const res=await apiCall({accion:'leer',tabla:'empleados'});
    sheetsEmps=res.data||[];
  }catch(e){
    showToast('❌ Error leyendo Sheets: '+e.message,'error',10000);
    if(btn)btn.disabled=false; return;
  }

  let sbEmps=[];
  try{
    sbEmps=await sbFetch('GET','empleados',null,'select=id,nombres,apellidos,carnet');
  }catch(e){
    showToast('❌ Error leyendo Supabase: '+e.message,'error',10000);
    if(btn)btn.disabled=false; return;
  }

  // Clave de comparación: nombre+apellidos en minúscula sin espacios extra
  const clave=e=>(String(e.nombres||'').trim()+String(e.apellidos||'').trim()).toLowerCase().replace(/\s+/g,'');
  const sbClaves=new Set(sbEmps.map(clave));

  // Empleados en Sheets cuyo nombre+apellidos NO está en Supabase
  const vistos=new Set();
  const faltantes=sheetsEmps.filter(e=>{
    const k=clave(e);
    if(!k||sbClaves.has(k)||vistos.has(k))return false;
    vistos.add(k);
    return true;
  });

  const msg=`📊 Sheets: ${sheetsEmps.length} filas | Supabase: ${sbEmps.length} emp.\nNo encontrados por nombre: ${faltantes.length}`;

  if(!faltantes.length){
    showToast(`Sheets: ${sheetsEmps.length} filas | Supabase: ${sbEmps.length} emp. — Sin empleados nuevos por nombre. Los datos pueden haber estado solo en localStorage.`,'warning',12000);
    showSyncIndicator('⚠️ Sin datos recuperables','offline');
    if(btn)btn.disabled=false; return;
  }

  if(!confirm(msg+'\n\n¿Subir estos '+faltantes.length+' empleados a Supabase?\n(Se les asignará un ID nuevo si no tienen)')){
    if(btn)btn.disabled=false; return;
  }

  // Preparar empleados
  const FECHA_COLS=['fechaAlta','fechaNacimiento','fechaBaja','certMedicoFecha'];
  const preparados=faltantes.map((e,idx)=>{
    const clean={};
    EMPLEADOS_COLS.forEach(col=>{ clean[col]=e[col]!==undefined?e[col]:''; });
    if(!clean.id) clean.id='REC'+Date.now().toString(36)+idx;
    clean.activo=String(e.activo)==='true'||e.activo===true;
    FECHA_COLS.forEach(f=>{ if(!clean[f]||clean[f]==='0'||clean[f]==='undefined')clean[f]=null; });
    clean.salarioBase=clean.salarioBase&&!isNaN(Number(clean.salarioBase))?Number(clean.salarioBase):null;
    return clean;
  });

  showToast(`⏳ Subiendo ${preparados.length} empleados a Supabase...`,'info',5000);
  showSyncIndicator('⏳ Subiendo...','syncing');

  // Subida directa a Supabase con feedback completo
  let ok=0;
  for(const emp of preparados){
    try{
      const url=`${SUPABASE_URL}/rest/v1/empleados`;
      const res=await fetch(url,{
        method:'POST',
        headers:{
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Content-Type':'application/json',
          'Prefer':'resolution=merge-duplicates,return=minimal'
        },
        body:JSON.stringify(emp)
      });
      if(res.ok){ ok++; }
      else{
        const errBody=await res.text();
        showToast(`❌ Error ${res.status}: ${errBody.slice(0,120)}`,'error',15000);
        console.error('Supabase error',res.status,errBody,emp);
        break;
      }
    }catch(err){
      showToast('❌ Red: '+err.message,'error',15000);
      break;
    }
  }

  if(ok>0){
    showToast(`✅ ${ok}/${preparados.length} empleados subidos. Sincronizando...`,'success',7000);
    await sincronizarDesdeSheets();
    navigateTo('empleados');
  } else if(ok===0&&preparados.length>0){
    showToast('❌ No se subió ninguno — revisa el error de arriba','error',10000);
    showSyncIndicator('❌ Error','offline');
  }
  if(btn)btn.disabled=false;
}


async function flushPendingOps() {
  if (DB_PENDING_OPS.length === 0) return;
  const ops = [...DB_PENDING_OPS]; DB_PENDING_OPS = [];
  for (const op of ops) {
    try { await pushToSheets(op.tabla, op.accion, op.valores, op.id); }
    catch(e) { DB_PENDING_OPS.push(op); }
  }
  if (DB_PENDING_OPS.length === 0) showToast('Operaciones pendientes sincronizadas ✅', 'success');
}
async function sincronizarDesdeSheets() {
  showSyncIndicator('⏳ Conectando...', 'syncing');
  // Vaciar buffer de auditoría pendiente antes de sincronizar
  if(_auditBuffer.length > 0){
    const toSend=[..._auditBuffer]; _auditBuffer=[];
    setTimeout(()=>toSend.forEach(e=>backupToSheets('auditLog','insertar',e,null)),0);
  }
  try {
    await sbFetch('GET', 'empleados', null, 'select=id&limit=1');
    const tablas = ['empleados','traslados','bajas','sanciones','nominas','nominaLineas','incidencias','vacacionesControl','historialSalarial','asistencia','plazas','alertasJuridico','auditLog','preformas'];
    const resultados = await Promise.all(tablas.map(t => sbLeer(t).catch(() => null)));
    tablas.forEach((tabla, i) => {
      if (!Array.isArray(resultados[i])) return; // null = request falló, mantener local
      if (resultados[i].length === 0) {
        if (tabla === 'empleados') console.warn('[SGI] Supabase devolvió 0 empleados — se mantiene caché local');
        return; // no sobrescribir con vacío
      }
      const data = resultados[i];
      if (tabla === 'empleados') {
        STATE.empleados = data.map(r => {
          let jornada = r.jornada;
          if (jornada === 24 || jornada === '24' || jornada === 30 || jornada === '30') jornada = '8x24';
          else if (jornada === 15 || jornada === '15') jornada = '12x15';
          else if (!jornada || !JORNADAS[jornada]) jornada = '8x24';
          const empData = { ...r, jornada,
            fechaAlta: normalizarFecha(r.fechaAlta),
            fechaNacimiento: normalizarFecha(r.fechaNacimiento),
            certMedicoFecha: normalizarFecha(r.certMedicoFecha)||'',
            salarioBase: r.salarioBase ? parseFloat(r.salarioBase) : null,
            activo: String(r.activo)==='true'||r.activo===true,
            fotoEmpleadoId: r.fotoEmpleadoId||'',
            fotoCarnetId: r.fotoCarnetId||'',
            carpetaExpId: r.carpetaExpId||'',
            contratoId: r.contratoId||'',
            obligacionesId: r.obligacionesId||''
          };
          if (r.certMedicoFecha) {
            if (!STATE.documentos[r.id]) STATE.documentos[r.id] = {};
            STATE.documentos[r.id].certMedicoFecha = r.certMedicoFecha;
          }
          return empData;
        });
      } else if (tabla === 'nominas') {
        const existLineas = STATE.nominas.reduce((acc,n)=>{acc[n.id]=n.lineas||[];return acc},{});
        STATE.nominas = data.map(r => ({ ...r, mes:parseInt(r.mes)||1, ano:parseInt(r.ano)||new Date().getFullYear(), totalDevengado:parseFloat(r.totalDevengado)||0, lineas: existLineas[r.id]||[] }));
      } else if (tabla === 'nominaLineas') {
        data.forEach(linea => {
          const nom = STATE.nominas.find(n => n.id === linea.nominaId);
          if (nom) {
            if (!nom.lineas) nom.lineas = [];
            const existing = nom.lineas.find(l => l.empleadoId === linea.empleadoId);
            if (existing) {
              if (!existing.totalDevengado && parseFloat(linea.totalDevengado)) {
                existing.diasTrabajados = parseFloat(linea.diasTrabajados)||existing.diasTrabajados;
                existing.horasExtras = parseFloat(linea.horasExtras)||existing.horasExtras;
                existing.totalDevengado = parseFloat(linea.totalDevengado);
              }
            } else {
              nom.lineas.push({ empleadoId: linea.empleadoId, diasTrabajados: parseFloat(linea.diasTrabajados)||0, horasExtras: parseFloat(linea.horasExtras)||0, totalDevengado: parseFloat(linea.totalDevengado)||0 });
            }
          }
        });
      } else if (tabla === 'vacacionesControl') {
        STATE.vacacionesControl = data.map(r => ({ empleadoId: r.empleadoId, ano: parseInt(r.ano)||0, diasTomados: parseInt(r.diasTomados)||0 }));
      } else if (tabla === 'asistencia') {
        const byFecha = {};
        data.forEach(r => {
          r = normalizeAsistencia(r);
          if(!byFecha[r.fecha]||r.cerrado) byFecha[r.fecha]=r;
        });
        STATE.asistencia = Object.values(byFecha);
      } else if (tabla === 'plazas') {
        STATE.plazas = {};
        data.forEach(r=>{ if(r.id) STATE.plazas[r.id]={...r, salarioBase:parseFloat(r.salarioBase)||0}; });
      } else if (tabla === 'auditLog') {
        // Merge: combinar remoto + local, deduplicar por id, ordenar por fecha desc
        const remoteIds = new Set(data.map(e=>e.id).filter(Boolean));
        const soloLocales = STATE.auditLog.filter(e=>!e.id||!remoteIds.has(e.id));
        STATE.auditLog = [...data, ...soloLocales]
          .sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))
          .slice(0,2000);
      } else if (tabla === 'preformas') {
        if(!STATE.preformas) STATE.preformas = {};
        data.forEach(r=>{ if(r.grupo) STATE.preformas[r.grupo]={disciplina:r.disciplina||'',caracteristicas:r.caracteristicas||''}; });
      } else if (tabla === 'alertasJuridico') {
        // Merge: conservar alertas locales no leídas que aún no llegaron a Supabase
        if(!STATE.alertasJuridico) STATE.alertasJuridico=[];
        const remoteIds=new Set(data.map(a=>a.id).filter(Boolean));
        const soloLocales=STATE.alertasJuridico.filter(a=>a.id&&!remoteIds.has(a.id)&&!a.leida);
        STATE.alertasJuridico=[...data,...soloLocales];
      } else {
        STATE[tabla] = data;
      }
    });
    // Config desde Supabase (complementa lo de Sheets)
    try {
      const cfgSB = await sbLeer('config').catch(()=>[]);
      cfgSB.forEach(row => {
        const v = row.valor; const k = row.clave;
        if(k==='pinRrhh')         STATE.config.pins.rrhh          = v;
        else if(k==='pinJuridico') STATE.config.pins.juridico      = v;
        else if(k==='pinContabilidad') STATE.config.pins.contabilidad = v;
        else if(k==='pinJefeTurno')    STATE.config.pins.jefe_turno   = v;
        else if(k==='pinAdmin')        STATE.config.adminPin           = v;
        else if(k==='bonAnios1')   STATE.config.bonificacion.anios1 = parseInt(v)||5;
        else if(k==='bonNivel1')   STATE.config.bonificacion.nivel1 = parseInt(v)||5;
        else if(k==='bonAnios2')   STATE.config.bonificacion.anios2 = parseInt(v)||10;
        else if(k==='bonNivel2')   STATE.config.bonificacion.nivel2 = parseInt(v)||10;
        else if(k==='recargoHE')   STATE.config.recargoHorasExtras  = parseFloat(v)||50;
        else if(k==='diasVacaciones') STATE.config.diasVacaciones   = parseInt(v)||14;
        else if(k==='diasPagados') STATE.config.diasPagadosPeriodo  = parseInt(v)||15;
        else if(k==='vacPendientes'){try{STATE.vacPendientes=JSON.parse(v)||[];}catch{STATE.vacPendientes=[];}}
      });
    } catch(e) {}
    // Config desde Sheets
    try {
      const cfgRes = await apiCall({ accion: 'leerConfig', tabla: 'config' });
      const cfg = cfgRes.data || {};
      if (cfg.pinRrhh)        STATE.config.pins.rrhh          = cfg.pinRrhh;
      if (cfg.pinJuridico)    STATE.config.pins.juridico       = cfg.pinJuridico;
      if (cfg.pinContabilidad)STATE.config.pins.contabilidad   = cfg.pinContabilidad;
      if (cfg.pinJefeTurno)  STATE.config.pins.jefe_turno     = cfg.pinJefeTurno;
      if (cfg.pinAdmin)       STATE.config.adminPin            = cfg.pinAdmin;
      if (cfg.bonAnios1)      STATE.config.bonificacion.anios1 = parseInt(cfg.bonAnios1);
      if (cfg.bonNivel1)      STATE.config.bonificacion.nivel1 = parseInt(cfg.bonNivel1);
      if (cfg.bonAnios2)      STATE.config.bonificacion.anios2 = parseInt(cfg.bonAnios2);
      if (cfg.bonNivel2)      STATE.config.bonificacion.nivel2 = parseInt(cfg.bonNivel2);
      if (cfg.recargoHE)      STATE.config.recargoHorasExtras  = parseFloat(cfg.recargoHE);
      if (cfg.diasVacaciones) STATE.config.diasVacaciones      = parseInt(cfg.diasVacaciones);
      if (cfg.diasPagados)    STATE.config.diasPagadosPeriodo  = parseInt(cfg.diasPagados);
      if (cfg.vacPendientes)  {try{STATE.vacPendientes=JSON.parse(cfg.vacPendientes)||[];}catch{}}
    } catch(e) {}
    // Re-aplicar ops pendientes para TODAS las tablas sobre los datos recién sincronizados
    DB_PENDING_OPS.forEach(op => {
      if (!op.accion || !op.tabla) return;
      if (op.accion === 'actualizar' && op.id) {
        if (Array.isArray(STATE[op.tabla])) {
          const idx = STATE[op.tabla].findIndex(r => r.id === op.id);
          if (idx >= 0) Object.assign(STATE[op.tabla][idx], op.valores||{});
        } else if (op.tabla === 'plazas' && STATE.plazas && op.valores?.id) {
          STATE.plazas[op.id] = {...(STATE.plazas[op.id]||{}), ...op.valores};
        }
      } else if (op.accion === 'insertar' && op.valores?.id) {
        if (Array.isArray(STATE[op.tabla])) {
          if (!STATE[op.tabla].some(r => r.id === op.valores.id)) STATE[op.tabla].push(op.valores);
        } else if (op.tabla === 'plazas') {
          if (!STATE.plazas[op.valores.id]) STATE.plazas[op.valores.id] = op.valores;
        }
      }
    });
    saveState();
    // Propagar salarios de plazas a empleados que los tengan vacíos (silencioso)
    _propagarSalariosPlazas();
    DB_ONLINE = true; updateSyncBadge(true);
    const nEmp = STATE.empleados.length;
    if (nEmp === 0) {
      showSyncIndicator('⚠️ Sin empleados — verifica Supabase', 'offline');
      showToast('⚠️ Supabase conectado pero no devolvió empleados. Verifica permisos de la tabla o intenta de nuevo.', 'error', 12000);
    } else {
      showSyncIndicator('✅ Sincronizado — ' + nEmp + ' empleados', 'ok');
    }
    // No re-renderizar si el usuario está en un formulario con datos en curso
    const formsEnCurso=['alta','traslados','bajas','sanciones'];
    if (currentRole && currentSection && !formsEnCurso.includes(currentSection)) navigateTo(currentSection);
  } catch(err) {
    DB_ONLINE = false; updateSyncBadge(false);
    showSyncIndicator('⚠️ Sin conexión — datos locales (' + STATE.empleados.length + ' empl.)', 'offline');
    if (STATE.empleados.length === 0) {
      showToast('Sin conexión y sin datos locales. Conéctate a internet y pulsa Sincronizar.', 'error', 15000);
    }
  }
}

function selectRole(role,btn){
  selectedRole=role;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('p0').focus();

function pinNav(idx){
  const v=document.getElementById('p'+idx).value;
  if(v&&idx<3)document.getElementById('p'+(idx+1)).focus();
  if(idx===3&&v)setTimeout(doLogin,50);
}
function pinBack(e,idx){
  if(e.key==='Backspace'&&!document.getElementById('p'+idx).value&&idx>0)document.getElementById('p'+(idx-1)).focus();
  if(e.key==='Enter')doLogin();
}
function getPin(){return['p0','p1','p2','p3'].map(id=>(document.getElementById(id).value||'').trim()).join('')}
function clearPin(){['p0','p1','p2','p3'].forEach(id=>{document.getElementById(id).value=''});document.getElementById('p0').focus()}
function detectRoleByPin(pin){
  const v={admin:STATE.config.adminPin,rrhh:STATE.config.pins.rrhh,juridico:STATE.config.pins.juridico,contabilidad:STATE.config.pins.contabilidad,jefe_turno:STATE.config.pins.jefe_turno};
  for(const[role,p] of Object.entries(v)){if(pin===p)return role;}
  return null;
}
function doLogin(){
  const now=Date.now();
  if(now<_loginLockedUntil){
    const seg=Math.ceil((_loginLockedUntil-now)/1000);
    showToast(`Demasiados intentos. Espera ${seg}s.`,'error',4000);return;
  }
  const pin=getPin();
  if(pin.length!==4){showToast('Ingrese los 4 dígitos del PIN','warning');return}
  const role=detectRoleByPin(pin);
  if(role){
    _loginAttempts=0;_loginLockedUntil=0;
    currentRole=role;
    selectedRole=role;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    addAuditLog('LOGIN','Inicio de sesión como '+getRoleName(currentRole));
    renderSidebar();
    navigateTo('dashboard');
    setTimeout(function(){ updateAlertaBadgeJur(); }, 300);
    setTimeout(async () => { await sincronizarDesdeSheets(); await flushPendingOps(); connectRealtime(); }, 500);
  } else {
    _loginAttempts++;
    if(_loginAttempts>=5){_loginLockedUntil=Date.now()+30000;_loginAttempts=0;}
    document.getElementById('login-error').style.display='block';
    clearPin();
    setTimeout(()=>{document.getElementById('login-error').style.display='none'},3000);
  }
}
function doLogout(){
  disconnectRealtime();
  currentRole=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  selectedRole=null;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  clearPin();
}
function getRoleName(r){return{admin:'Administración',rrhh:'RRHH',juridico:'Jurídico',contabilidad:'Contabilidad',jefe_turno:'Jefe de Turno'}[r]||r}
function getRoleIcon(r){return{admin:'👑',rrhh:'👥',juridico:'⚖️',contabilidad:'📊',jefe_turno:'🕐'}[r]||'👤'}

function abrirSwitchRol(){
  const roles=[
    {id:'admin',icon:'👑',name:'Administración'},
    {id:'rrhh',icon:'👥',name:'RRHH'},
    {id:'juridico',icon:'⚖️',name:'Jurídico'},
    {id:'contabilidad',icon:'📊',name:'Contabilidad'},
    {id:'jefe_turno',icon:'🕐',name:'Jefe de Turno'}
  ];
  const body=`<p style="margin-bottom:16px;color:var(--text-mid);font-size:13px;">Seleccione el rol al que desea cambiar e ingrese su PIN de acceso.</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
    ${roles.map(r=>`<button class="role-btn switch-role-btn${r.id===currentRole?' selected':''}" onclick="document.querySelectorAll('.switch-role-btn').forEach(b=>b.classList.remove('selected'));this.classList.add('selected');document.getElementById('switch-role-target').value='${r.id}'">
      <span class="role-icon">${r.icon}</span>
      <span class="role-name">${r.name}</span>
    </button>`).join('')}
  </div>
  <input type="hidden" id="switch-role-target" value="">
  <div class="form-group">
    <label class="field-label">PIN del nuevo rol</label>
    <input type="password" id="switch-pin" maxlength="4" placeholder="4 dígitos" autocomplete="off"
      style="font-size:24px;letter-spacing:8px;text-align:center;max-width:180px;display:block;margin:0 auto;"
      oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)">
  </div>`;
  const footer=`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="confirmarSwitchRol()">🔄 Cambiar Rol</button>`;
  openModal('🔄 Cambiar Rol',body,footer);
}

function confirmarSwitchRol(){
  const targetRole=document.getElementById('switch-role-target').value;
  const pin=document.getElementById('switch-pin').value;
  if(!targetRole){showToast('Seleccione un rol','warning');return;}
  if(!pin||pin.length!==4){showToast('Ingrese el PIN de 4 dígitos','warning');return;}
  const detected=detectRoleByPin(pin);
  if(!detected){showToast('PIN incorrecto','error');return;}
  if(detected!==targetRole){showToast('El PIN no corresponde al rol seleccionado','error');return;}
  currentRole=detected;
  closeModal();
  // Actualizar UI
  const badge=document.getElementById('role-badge');
  if(badge)badge.textContent=getRoleIcon(currentRole)+' '+getRoleName(currentRole);
  navigateTo('dashboard');
  showToast('Rol cambiado a '+getRoleName(currentRole),'success');
  addAuditLog('CAMBIO_ROL','Cambio de rol a '+getRoleName(currentRole));
}

function getCatalogoPlazas(){
  const base={};
  Object.entries(PLAZAS).forEach(([dept,lista])=>{
    lista.forEach(nombre=>{
      const key=dept+'||'+nombre;
      if(!base[key])base[key]={id:key,departamento:dept,nombre,salarioBase:0,jornada:'8x24',tipoContrato:'Indefinido',descripcion:'',funcionesPdfId:'',funcionesPdfUrl:''};
    });
  });
  Object.values(STATE.plazas||{}).forEach(p=>{if(p.id)base[p.id]=p;});
  return base;
}
function getPlaza(departamento,nombre){
  if(!nombre)return null;
  const cat=getCatalogoPlazas();
  // 1. Exacto
  if(cat[departamento+'||'+nombre])return cat[departamento+'||'+nombre];
  // 2. Insensible a mayúsculas/espacios
  const dN=(departamento||'').trim().toLowerCase();
  const nN=(nombre||'').trim().toLowerCase();
  const hit=Object.values(cat).find(p=>
    (p.departamento||'').trim().toLowerCase()===dN &&
    (p.nombre||'').trim().toLowerCase()===nN
  );
  if(hit)return hit;
  // 3. Solo por nombre (ignora dept) como último recurso
  return Object.values(cat).find(p=>(p.nombre||'').trim().toLowerCase()===nN)||null;
}
function aplicarSalarioPlazaATodos(departamento,nombre,nuevoSalario){
  const deptN=departamento.trim().toLowerCase();
  const nomN=nombre.trim().toLowerCase();
  const afectados=STATE.empleados.filter(e=>
    (e.departamento||'').trim().toLowerCase()===deptN &&
    (e.plaza||'').trim().toLowerCase()===nomN &&
    e.activo
  );
  afectados.forEach(emp=>{
    if(emp.salarioBase===nuevoSalario)return;
    const anterior=emp.salarioBase;
    const reg={id:'HS'+uid(),empleadoId:emp.id,fecha:new Date().toISOString(),anterior,nuevo:nuevoSalario,motivo:'Actualización automática por cambio de tarifa plaza '+nombre};
    STATE.historialSalarial.push(reg);
    emp.salarioBase=nuevoSalario;
    pushToSheets('historialSalarial','insertar',reg);
    pushToSheets('empleados','actualizar',emp,emp.id);
  });
  saveState();
  return afectados.length;
}

// Propagación silenciosa: rellena salarioBase en empleados cuya plaza tiene salario definido
function _propagarSalariosPlazas(){
  if(!STATE.empleados||!STATE.plazas)return;
  let cambios=0;
  STATE.empleados.filter(e=>e.activo&&!e.salarioBase).forEach(emp=>{
    const pz=getPlaza(emp.departamento,emp.plaza);
    if(!pz||!pz.salarioBase)return;
    emp.salarioBase=pz.salarioBase;
    pushToSheets('empleados','actualizar',emp,emp.id);
    cambios++;
  });
  if(cambios>0)saveState();
}

function sincronizarSalariosDesidePlazas(){
  let actualizados=0;
  STATE.empleados.filter(e=>e.activo).forEach(emp=>{
    const pz=getPlaza(emp.departamento,emp.plaza);
    if(!pz||!pz.salarioBase)return;
    if(Number(emp.salarioBase)===Number(pz.salarioBase))return;
    const anterior=emp.salarioBase;
    const reg={id:'HS'+uid(),empleadoId:emp.id,fecha:new Date().toISOString(),anterior,nuevo:pz.salarioBase,motivo:'Sincronización de salario desde plaza '+emp.plaza};
    STATE.historialSalarial.push(reg);
    emp.salarioBase=pz.salarioBase;
    pushToSheets('historialSalarial','insertar',reg);
    pushToSheets('empleados','actualizar',emp,emp.id);
    actualizados++;
  });
  if(actualizados>0){saveState();showToast(`✅ ${actualizados} empleado(s) actualizados con salario de su plaza`,'success');}
  else showToast('Los salarios ya están sincronizados','info');
  return actualizados;
}

function normalizarFecha(f) {
  // Acepta DD/MM/YYYY, YYYY-MM-DD, timestamps, etc. → devuelve YYYY-MM-DD
  if (!f) return '';
  if (typeof f === 'number') {
    // Podría ser un número de serie de Excel/Sheets (días desde 1900-01-01)
    // o un timestamp JS
    if (f > 1000000000000) { // timestamp JS en ms
      return new Date(f).toISOString().slice(0,10);
    } else if (f > 40000 && f < 60000) { // número serie Sheets
      const d = new Date(Date.UTC(1899,11,30) + f*86400000);
      return d.toISOString().slice(0,10);
    }
    return '';
  }
  const s = String(f).trim();
  if (!s) return '';
  // Ya está en formato YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Formato DD/MM/YYYY
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    const [d,m,y] = s.split('/');
    return y+'-'+m+'-'+d;
  }
  // Intentar parsear como fecha genérica
  const dt = new Date(s);
  if (!isNaN(dt.getTime())) return dt.toISOString().slice(0,10);
  return '';
}
