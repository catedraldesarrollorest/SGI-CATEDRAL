<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- White background -->
  <rect width="512" height="512" fill="#FFFFFF"/>

  <!-- Templar cross (red) at top center -->
  <g fill="#C0392B">
    <!-- Vertical bar -->
    <rect x="234" y="22" width="44" height="118" rx="2"/>
    <!-- Horizontal bar -->
    <rect x="192" y="60" width="128" height="44" rx="2"/>
  </g>

  <!-- "LA" text -->
  <text x="256" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#111111" text-anchor="middle" letter-spacing="18">LA</text>

  <!-- "CATEDRAL" in large gothic-style text -->
  <text x="256" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="bold" fill="#111111" text-anchor="middle" letter-spacing="2">CATEDRAL</text>

  <!-- Decorative lines flanking BAR·RESTAURANTE -->
  <line x1="30" y1="318" x2="178" y2="318" stroke="#111111" stroke-width="1.5"/>
  <line x1="334" y1="318" x2="482" y2="318" stroke="#111111" stroke-width="1.5"/>

  <!-- "BAR·RESTAURANTE" -->
  <text x="256" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#111111" text-anchor="middle" letter-spacing="4">BAR·RESTAURANTE</text>
</svg>
