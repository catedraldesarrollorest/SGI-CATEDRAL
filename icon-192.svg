<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- White background -->
  <rect width="192" height="192" fill="#FFFFFF"/>

  <!-- Templar cross (red) at top center -->
  <g fill="#C0392B">
    <!-- Vertical bar -->
    <rect x="88" y="8" width="16" height="44" rx="1"/>
    <!-- Horizontal bar -->
    <rect x="72" y="22" width="48" height="16" rx="1"/>
  </g>

  <!-- "LA" text -->
  <text x="96" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#111111" text-anchor="middle" letter-spacing="6">LA</text>

  <!-- "CATEDRAL" in large gothic-style text -->
  <text x="96" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="#111111" text-anchor="middle" letter-spacing="1">CATEDRAL</text>

  <!-- Decorative lines flanking BAR·RESTAURANTE -->
  <line x1="14" y1="120" x2="72" y2="120" stroke="#111111" stroke-width="1"/>
  <line x1="120" y1="120" x2="178" y2="120" stroke="#111111" stroke-width="1"/>

  <!-- "BAR·RESTAURANTE" -->
  <text x="96" y="132" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#111111" text-anchor="middle" letter-spacing="2">BAR·RESTAURANTE</text>
</svg>
